<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>makro.</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="makro." />
  <meta name="theme-color" content="#0c0c0c" />
  <link rel="apple-touch-icon" href="icons/makro-icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script>
    // iOS PWA standalone: inputs sometimes don't focus on tap — force focus on touchend
    if (window.navigator.standalone) {
      document.addEventListener('touchend', function(e) {
        var t = e.target;
        if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA') {
          e.preventDefault();
          t.focus();
        }
      }, true);
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    input, textarea, button, select { font-family: inherit; }
    html, body, #root { height: 100%; height: -webkit-fill-available; background: #0c0c0c; }
    body { overflow: hidden; }
    textarea { resize: none; -webkit-appearance: none; }
    input { -webkit-appearance: none; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    @keyframes slideFromRight { from { transform:translateX(100%); } to { transform:translateX(0); } }
    @keyframes slideFromLeft  { from { transform:translateX(-100%); } to { transform:translateX(0); } }
    @keyframes slideToLeft    { from { transform:translateX(0); } to { transform:translateX(-100%); } }
    @keyframes slideToRight   { from { transform:translateX(0); } to { transform:translateX(100%); } }
    .fade-up { animation: fadeUp 0.25s ease forwards; }
    .pulsing { animation: pulse 1.4s ease infinite; }
    .slide-from-right { animation: slideFromRight 0.28s ease-out forwards; }
    .slide-from-left  { animation: slideFromLeft  0.28s ease-out forwards; }
    .slide-to-left    { animation: slideToLeft    0.28s ease-out forwards; }
    .slide-to-right   { animation: slideToRight   0.28s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>


  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const APP_VERSION = "1.6.0";
    const C = {
      bg: "#0c0c0c", card: "#161616", border: "#222", accent: "#f59e0b",
      text: "#efefef", muted: "#555", soft: "#2a2a2a",
      protein: "#60a5fa", carbs: "#34d399", fat: "#f472b6", kcal: "#f59e0b", weight: "#a78bfa", danger: "#f87171",
    };
    const MACROS = ["kcal", "protein", "carbs", "fat"];
    const LABELS = { kcal: "Kalorien", protein: "Eiweiß", carbs: "Kohlenhydrate", fat: "Fett" };
    const UNITS = { kcal: "kcal", protein: "g", carbs: "g", fat: "g" };
    const MC = { kcal: C.kcal, protein: C.protein, carbs: C.carbs, fat: C.fat };
    const DEFAULT_TARGETS = { kcal: 2500, protein: 180, carbs: 250, fat: 80 };

    const todayStr = () => new Date().toISOString().split("T")[0];
    const dayKey = (d) => `mk_day_${d}`;

    const store = {
      get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    // ── Backend-Konfiguration ──────────────────────────────────────
    const BACKEND_URL = "https://makro-backend-production.up.railway.app";

    // Auth-State (token + user)
    const getAuth  = () => store.get("mk_auth");
    const saveAuth = (data) => store.set("mk_auth", data);
    const clearAuth = () => localStorage.removeItem("mk_auth");

    // API-Call mit JWT (für alle /api/* außer /api/auth/*)
    async function apiCall(path, method = "GET", body = null) {
      const auth = getAuth();
      const opts = {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {}),
        },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(BACKEND_URL + path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // Auth-API-Call (kein Secret nötig — Backend nutzt Rate Limiting)
    async function authApiCall(path, method = "GET", body = null) {
      const opts = {
        method,
        headers: { "Content-Type": "application/json" },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(BACKEND_URL + path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    async function resendVerification(email) {
      return authApiCall("/api/auth/resend-verification", "POST", { email });
    }

    // Freitext analysieren → Makros vom Backend
    async function analyzeMeal(text, recipes) {
      return apiCall("/api/analyze", "POST", { text, recipes });
    }

    // Rezept-Zutaten analysieren → Makros vom Backend
    async function analyzeRecipe(text) {
      return apiCall("/api/analyze-recipe", "POST", { text });
    }

    async function lookupBarcode(barcode) {
      return apiCall("/api/barcode", "POST", { barcode });
    }

    // Rezepte vom Server laden (userId kommt aus JWT)
    async function loadRecipes() {
      return apiCall("/api/recipes");
    }

    // Rezept auf Server speichern
    async function saveRecipeToServer(recipe) {
      return apiCall("/api/recipes", "POST", recipe);
    }

    // Rezept auf Server aktualisieren
    async function updateRecipeOnServer(id, recipe) {
      return apiCall(`/api/recipes/${id}`, "PUT", recipe);
    }

    // Rezept vom Server löschen
    async function deleteRecipeFromServer(id) {
      return apiCall(`/api/recipes/${id}`, "DELETE");
    }

    // Diary entries
    async function loadDiaryEntries(date) {
      return apiCall(`/api/diary?date=${date}`);
    }
    async function loadDiaryRange(from, to) {
      return apiCall(`/api/diary?from=${from}&to=${to}`);
    }
    async function saveDiaryEntry(date, entry) {
      return apiCall("/api/diary", "POST", { date, entry });
    }
    async function updateDiaryEntry(id, entry) {
      return apiCall(`/api/diary/${id}`, "PATCH", { entry });
    }
    async function deleteDiaryEntry(id) {
      return apiCall(`/api/diary/${id}`, "DELETE");
    }

    // Mealprep archive
    async function loadArchive() {
      return apiCall("/api/archive");
    }

    // Persönliche Lebensmittel-Datenbank
    async function loadUserFoods()        { return apiCall("/api/user-foods"); }
    async function addUserFoodAPI(food)   { return apiCall("/api/user-foods", "POST", food); }
    async function updateUserFoodAPI(id, food) { return apiCall(`/api/user-foods/${id}`, "PATCH", food); }
    async function deleteUserFoodAPI(id)  { return apiCall(`/api/user-foods/${id}`, "DELETE"); }

    // Körpergewicht
    async function loadBodyWeightRange(from, to) { return apiCall(`/api/body-weight?from=${from}&to=${to}`); }
    async function saveBodyWeightAPI(date, weight_kg, burned_kcal) {
      const body = { date };
      if (weight_kg != null) body.weight_kg = weight_kg;
      if (burned_kcal != null) body.burned_kcal = burned_kcal;
      return apiCall("/api/body-weight", "POST", body);
    }

    // Passwort zurücksetzen (kein Auth nötig)
    async function forgotPassword(email) { return authApiCall("/api/auth/forgot-password", "POST", { email }); }
    async function resetPassword(token, password) { return authApiCall("/api/auth/reset-password", "POST", { token, password }); }

    // Account löschen
    async function deleteAccount() { return apiCall("/api/account", "DELETE"); }
    async function saveToArchive(recipe) {
      return apiCall("/api/archive", "POST", { recipe });
    }

    // User settings
    async function loadSettings() {
      return apiCall("/api/settings");
    }
    async function saveSettings(targets, extra = {}) {
      return apiCall("/api/settings", "POST", { targets, ...extra });
    }

    function sumEntries(entries) {
      return entries.reduce((a, e) => ({
        kcal: a.kcal + e.totals.kcal, protein: a.protein + e.totals.protein,
        carbs: a.carbs + e.totals.carbs, fat: a.fat + e.totals.fat,
      }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
    }

    const Mono = ({ children, size = 15, color = C.text, bold }) => (
      <span style={{ fontFamily: "Inter, sans-serif", fontSize: size, color, fontWeight: bold ? 500 : 400, fontVariantNumeric: "tabular-nums" }}>
        {children}
      </span>
    );

    const MacroBar = ({ label, current, target, color, unit }) => {
      const pct = Math.min((current / target) * 100, 100);
      const over = current > target;
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, alignItems: "baseline" }}>
            <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>{label}</span>
            <div style={{ display: "flex", gap: 4, alignItems: "baseline" }}>
              <Mono size={14} color={over ? C.danger : color} bold>{Math.round(current)}</Mono>
              <Mono size={10} color={C.muted}> / {target}{unit}</Mono>
            </div>
          </div>
          <div style={{ height: 3, background: "#1e1e1e", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", background: over ? C.danger : color, borderRadius: 2, transition: "width 0.5s ease" }} />
          </div>
        </div>
      );
    };

    const Btn = ({ children, onClick, variant = "primary", disabled, small, full, style: sx }) => {
      const base = { fontFamily: "Syne", fontWeight: 700, borderRadius: 8, border: "none", cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.45 : 1, padding: small ? "8px 14px" : "12px 20px", fontSize: small ? 13 : 14, width: full ? "100%" : undefined, transition: "opacity 0.15s", ...sx };
      const v = { primary: { background: C.accent, color: "#000" }, ghost: { background: "transparent", color: C.text, border: `1px solid ${C.border}` }, danger: { background: "transparent", color: C.danger, border: `1px solid #f8717128` } };
      return <button onClick={onClick} disabled={disabled} style={{ ...base, ...v[variant] }}>{children}</button>;
    };

    const Card = ({ children, accent, style: sx, onClick }) => (
      <div onClick={onClick} style={{ background: C.card, borderRadius: 12, border: `1px solid ${accent ? C.accent + "35" : C.border}`, ...sx }}>
        {children}
      </div>
    );

    const SectionLabel = ({ children }) => (
      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10 }}>{children}</div>
    );

    function BarcodeScanner({ onScan, onClose }) {
      const scannerRef = useRef(null);
      const [err, setErr] = useState(null);

      useEffect(() => {
        let done = false;
        let scanner;
        try {
          scanner = new Html5Qrcode("bc-div");
          scannerRef.current = scanner;
        } catch { onClose(); return; }

        // QR_CODE=0, CODE_39=3, CODE_128=5, EAN_13=9, EAN_8=10, UPC_A=14, UPC_E=15
        const formats = [0, 3, 5, 9, 10, 14, 15];

        scanner.start(
          { facingMode: "environment" },
          { fps: 15, qrbox: (vw, vh) => ({ width: Math.round(Math.min(vw, vh) * 0.85), height: Math.round(Math.min(vw, vh) * 0.35) }), formatsToSupport: formats },
          (text) => {
            if (done) return;
            done = true;
            onScan(text);
          },
          () => {}
        ).then(() => {
          // Kontinuierlichen Autofokus erzwingen (Makro-Modus für Nahaufnahmen)
          const video = document.querySelector("#bc-div video");
          if (video?.srcObject) {
            const track = video.srcObject.getVideoTracks()[0];
            if (track) {
              const caps = track.getCapabilities?.() || {};
              const constraints = { advanced: [] };
              if (caps.focusMode?.includes("continuous")) constraints.advanced.push({ focusMode: "continuous" });
              if (caps.zoom) constraints.advanced.push({ zoom: caps.zoom.min ?? 1 });
              if (constraints.advanced.length) track.applyConstraints(constraints).catch(() => {});
            }
          }
        }).catch(() => {
          if (!done) setErr("Kamera-Zugriff verweigert oder nicht verfügbar.");
        });

        return () => {
          done = true;
          try { scannerRef.current?.stop().catch(() => {}); } catch {}
        };
      }, []);

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "#000" }}>
          {/* Scanner-Div: füllt gesamten Screen, html5-qrcode braucht explizite Größe */}
          <div id="bc-div" style={{ position: "absolute", inset: 0 }} />
          {/* Overlay: Header */}
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "52px 16px 16px", background: "linear-gradient(#000e, transparent)", zIndex: 1, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: "#fff" }}>Barcode scannen</span>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "#fff", fontSize: 26, cursor: "pointer", padding: 4 }}>✕</button>
          </div>
          {/* Overlay: Footer */}
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "16px 16px 36px", background: "linear-gradient(transparent, #000e)", zIndex: 1, textAlign: "center" }}>
            <span style={{ fontFamily: "Syne", fontSize: 13, color: err ? "#f87171" : "#aaa" }}>
              {err || "Halte den Barcode in den Rahmen"}
            </span>
          </div>
        </div>
      );
    }

    function InputTab({ recipes, onSave, voiceLang, userFoods }) {
      const [text, setText] = useState("");
      const [loading, setLoading] = useState(false);
      const [items, setItems] = useState([]);
      const [err, setErr] = useState(null);
      const [listening, setListening] = useState(false);
      const [transcribing, setTranscribing] = useState(false);
      const mediaRecorderRef = useRef(null);
      const chunksRef = useRef([]);
      const [scanning, setScanning] = useState(false);
      const [barcodeLoading, setBarcodeLoading] = useState(false);
      const [scannedProduct, setScannedProduct] = useState(null);
      const [barcodeWeight, setBarcodeWeight] = useState("100");
      const [barcodeErr, setBarcodeErr] = useState(null);
      const textareaRef = useRef(null);
      const [breakdownModal, setBreakdownModal] = useState(null); // { itemIdx, scaledItems }

      // Autocomplete: extract the current word at cursor position
      const getCurrentWord = () => {
        const el = textareaRef.current;
        if (!el) return "";
        const pos = el.selectionStart;
        const before = text.slice(0, pos);
        const match = before.match(/([a-zA-ZäöüÄÖÜß]+)$/);
        return match ? match[1] : "";
      };

      const acWord = items.length === 0 && !loading ? getCurrentWord() : "";
      const acSuggestions = acWord.length >= 2 && userFoods
        ? userFoods.filter(f => f.name.toLowerCase().startsWith(acWord.toLowerCase())).slice(0, 5)
        : [];

      const applySuggestion = (food) => {
        const el = textareaRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = text.slice(0, pos);
        const after = text.slice(pos);
        const newBefore = before.replace(/([a-zA-ZäöüÄÖÜß]+)$/, food.name);
        const newText = newBefore + after;
        setText(newText);
        setTimeout(() => {
          el.focus();
          el.setSelectionRange(newBefore.length, newBefore.length);
        }, 0);
      };

      const toggleVoice = async () => {
        if (listening) {
          mediaRecorderRef.current?.stop();
          setListening(false);
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
          const recorder = new MediaRecorder(stream, { mimeType: mime });
          chunksRef.current = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          recorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(chunksRef.current, { type: mime });
            setTranscribing(true);
            try {
              const auth = getAuth();
              const form = new FormData();
              const ext = mime.includes("mp4") ? "mp4" : "webm";
              form.append("audio", blob, `rec.${ext}`);
              form.append("language", voiceLang || "de");
              const res = await fetch(BACKEND_URL + "/api/transcribe", {
                method: "POST",
                headers: auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {},
                body: form,
              });
              const data = await res.json();
              if (data.text) setText(p => (p ? p + " " + data.text : data.text).slice(0, 200));
              else if (data.error) setErr("Spracheingabe: " + data.error);
            } catch (e) { setErr("Spracheingabe fehlgeschlagen"); }
            setTranscribing(false);
          };
          mediaRecorderRef.current = recorder;
          recorder.start();
          setListening(true);
        } catch { setErr("Mikrofon-Zugriff verweigert"); }
      };

      const handleBarcodeScan = async (barcode) => {
        setScanning(false);
        setBarcodeLoading(true);
        try {
          const data = await lookupBarcode(barcode);
          if (data.found) {
            setScannedProduct(data);
            setBarcodeWeight(data.serving_g ? String(data.serving_g) : "100");
          } else {
            setBarcodeErr(`Produkt nicht gefunden (${barcode})`);
          }
        } catch (e) {
          setBarcodeErr("Suche fehlgeschlagen: " + e.message);
        }
        setBarcodeLoading(false);
      };

      const addBarcodeItem = () => {
        if (!scannedProduct) return;
        const w = parseFloat(barcodeWeight);
        if (!w || w <= 0) return;
        const line = `${w}g ${scannedProduct.name_de}`;
        setText(prev => prev.trim() ? prev.trim() + "\n" + line : line);
        setScannedProduct(null);
        setBarcodeWeight("100");
      };

      const analyze = async () => {
        if (!text.trim()) return;
        setLoading(true); setErr(null); setItems([]);
        try {
          const data = await analyzeMeal(text, recipes);
          const enriched = (data.items || []).map(item => {
            if (item.source === "recipe" && item.recipe_name) {
              const r = recipes.find(r => r.name === item.recipe_name);
              if (r) {
                const storedItems = r.items ? (typeof r.items === "string" ? JSON.parse(r.items) : r.items) : [];
                return { ...item, recipeItems: storedItems, recipeTotalWeight: parseFloat(r.total_weight) };
              }
            }
            return item;
          });
          setItems(enriched);
        } catch (e) { setErr("Analyse fehlgeschlagen: " + e.message); }
        setLoading(false);
      };

      const update = (i, field, val) => setItems(p => p.map((it, idx) => {
        if (idx !== i) return it;
        if (field === "weight_g") {
          const w = parseFloat(val) || 0;
          if (w > 0) {
            if (it.kcal_100 != null) {
              return { ...it, weight_g: w, kcal: Math.round(it.kcal_100 * w / 100), protein: Math.round(it.protein_100 * w / 100 * 10) / 10, carbs: Math.round(it.carbs_100 * w / 100 * 10) / 10, fat: Math.round(it.fat_100 * w / 100 * 10) / 10 };
            } else if (it.weight_g > 0) {
              const r = w / it.weight_g;
              return { ...it, weight_g: w, kcal: Math.round(it.kcal * r), protein: Math.round(it.protein * r * 10) / 10, carbs: Math.round(it.carbs * r * 10) / 10, fat: Math.round(it.fat * r * 10) / 10 };
            }
          }
          return { ...it, weight_g: w };
        }
        return { ...it, [field]: parseFloat(val) || 0 };
      }));
      const totals = items.reduce((a, it) => ({ kcal: a.kcal + (it.kcal || it.calories || 0), protein: a.protein + (it.protein || 0), carbs: a.carbs + (it.carbs || it.carbohydrates || 0), fat: a.fat + (it.fat || 0) }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

      const save = () => {
        onSave({ id: Date.now(), raw_input: text, items, totals, timestamp: new Date().toISOString() });
        setText(""); setItems([]);
      };

      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "9px 10px", color: C.text, fontFamily: "Syne", fontSize: 14, outline: "none", width: "100%" };

      const mainContent = (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
          <Card>
            <textarea
              ref={textareaRef}
              value={text} onChange={e => setText(e.target.value.slice(0, 200))}
              placeholder={"Was hast du gegessen?"}
              maxLength={200}
              style={{ width: "100%", minHeight: 120, background: "transparent", border: "none", outline: "none", padding: "16px 16px 6px", color: C.text, fontFamily: "Syne", fontSize: 15, lineHeight: 1.7 }}
            />
            {acSuggestions.length > 0 && (
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", padding: "0 12px 10px" }}>
                {acSuggestions.map(f => (
                  <button key={f.id} onMouseDown={e => { e.preventDefault(); applySuggestion(f); }}
                    style={{ fontFamily: "Syne", fontSize: 12, fontWeight: 600, padding: "4px 10px", borderRadius: 16, background: "#1a1a2e", border: `1px solid ${C.accent}44`, color: C.accent, cursor: "pointer" }}>
                    {f.name}
                    <span style={{ fontFamily: "Inter", fontSize: 10, color: C.muted, marginLeft: 5 }}>{Math.round(f.kcal_100)} kcal</span>
                  </button>
                ))}
              </div>
            )}
            {transcribing && <div style={{ padding: "2px 16px 6px", fontFamily: "Syne", fontSize: 13, color: C.muted, fontStyle: "italic" }} className="pulsing">Whisper erkennt Sprache…</div>}
            <div style={{ textAlign: "right", padding: "0 16px 10px", fontFamily: "Inter", fontSize: 10, color: text.length >= 180 ? (text.length >= 200 ? C.danger : C.accent) : C.muted }}>{text.length}/200</div>
            <div style={{ padding: "8px 12px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${C.border}`, gap: 8 }}>
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                <button onClick={toggleVoice} disabled={transcribing} style={{ background: listening ? "#f8717122" : transcribing ? "#f59e0b22" : "transparent", border: `1px solid ${listening ? C.danger : transcribing ? C.accent : C.border}`, borderRadius: 8, padding: "8px 12px", color: listening ? C.danger : transcribing ? C.accent : C.muted, display: "flex", alignItems: "center", gap: 6 }}>
                  <svg className={listening || transcribing ? "pulsing" : ""} width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round"/><line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                  {listening && <Mono size={11} color={C.danger}>Aufnahme…</Mono>}
                  {transcribing && <Mono size={11} color={C.accent}>Erkennt…</Mono>}
                </button>
                <button onClick={() => setScanning(true)} disabled={barcodeLoading} style={{ background: barcodeLoading ? "#f59e0b22" : "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: C.muted, display: "flex", alignItems: "center" }}>
                  {barcodeLoading
                    ? <span className="pulsing" style={{ fontSize: 16 }}>⬛</span>
                    : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="8" y="4" width="2" height="16"/><rect x="12" y="4" width="1" height="16"/><rect x="15" y="4" width="2" height="16"/><rect x="19" y="4" width="1" height="16"/><rect x="22" y="4" width="1" height="16"/></svg>
                  }
                </button>
              </div>
              <Btn onClick={analyze} disabled={loading || !text.trim()} small>{loading ? "…" : "Analysieren →"}</Btn>
            </div>
          </Card>

          {loading && <div className="pulsing" style={{ textAlign: "center", padding: 24, fontFamily: "Syne", fontSize: 14, color: C.muted }}>Claude analysiert deine Mahlzeit…</div>}
          {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}

          {recipes.length > 0 && !loading && (
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>Mealprep:</span>
              {recipes.map(r => (
                <button key={r.id} onClick={() => {
                  const w = parseFloat(r.total_weight) || 100;
                  const k100 = parseFloat(r.kcal_100) || 0;
                  const p100 = parseFloat(r.protein_100) || 0;
                  const c100 = parseFloat(r.carbs_100) || 0;
                  const f100 = parseFloat(r.fat_100) || 0;
                  const kcal    = parseFloat(r.kcal_total)    || Math.round(k100 * w / 100);
                  const protein = parseFloat(r.protein_total) || Math.round(p100 * w / 100 * 10) / 10;
                  const carbs   = parseFloat(r.carbs_total)   || Math.round(c100 * w / 100 * 10) / 10;
                  const fat     = parseFloat(r.fat_total)     || Math.round(f100 * w / 100 * 10) / 10;
                  const recipeItemsStored = r.items ? (typeof r.items === "string" ? JSON.parse(r.items) : r.items) : [];
                  const newItem = { name_de: r.name, weight_g: w, kcal, protein, carbs, fat, kcal_100: k100, protein_100: p100, carbs_100: c100, fat_100: f100, source: "recipe", recipeItems: recipeItemsStored, recipeTotalWeight: w };
                  setText(p => p.trim() ? p.trim() + "\n" + r.name : r.name);
                  setItems(p => [...p, newItem]);
                }}
                  style={{ fontFamily: "Syne", fontSize: 12, fontWeight: 600, padding: "5px 12px", borderRadius: 20, background: C.card, border: `1px solid ${C.border}`, color: C.text, cursor: "pointer" }}>
                  {r.name}
                </button>
              ))}
            </div>
          )}

          {items.length > 0 && (
            <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <SectionLabel>Erkannte Lebensmittel — tippen zum Bearbeiten</SectionLabel>
              {items.map((item, i) => (
                <Card key={i} style={{ padding: "12px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={{ flex: 1 }}>
                      {item.source === "recipe" && item.recipeItems && item.recipeItems.length > 0 ? (
                        <button onClick={() => {
                          const ratio = parseFloat(item.weight_g) / (parseFloat(item.recipeTotalWeight) || parseFloat(item.weight_g));
                          const scaled = item.recipeItems.map(ri => ({ ...ri, weight_g: Math.round(ri.weight_g * ratio * 10) / 10, kcal: Math.round((ri.kcal||0) * ratio * 10) / 10, protein: Math.round((ri.protein||0) * ratio * 10) / 10, carbs: Math.round((ri.carbs||0) * ratio * 10) / 10, fat: Math.round((ri.fat||0) * ratio * 10) / 10 }));
                          setBreakdownModal({ itemIdx: i, scaledItems: scaled });
                        }} style={{ background: "none", border: "none", padding: 0, color: C.text, fontFamily: "Syne", fontSize: 14, fontWeight: 700, cursor: "pointer", textAlign: "left", textDecoration: "underline", textDecorationColor: C.border }}>
                          {item.name_de || item.name}
                        </button>
                      ) : (
                        <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text }}>{item.name_de || item.name}</span>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontFamily: "Inter", fontSize: 10, padding: "2px 7px", borderRadius: 4, background: item.found ? "#34d39918" : "#f8717118", color: item.found ? C.carbs : C.danger }}>{item.source === "recipe" ? "rezept" : item.source === "personal" ? "eigen" : item.source === "cache" || item.source === "off" ? "db" : item.found ? "ki" : "?"}</span>
                      <button onClick={() => setItems(p => p.filter((_, idx) => idx !== i))} style={{ background: "none", border: "none", color: "#f8717150", fontSize: 16, padding: "2px 4px" }}>✕</button>
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 8 }}>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>Gramm</div>
                      <input type="text" inputMode="decimal" value={item.weight_g} onChange={e => update(i, "weight_g", e.target.value)} style={{ ...inputStyle, fontFamily: "Inter", fontSize: 13, color: C.text, padding: "6px 8px" }} />
                    </div>
                    {MACROS.map(m => (
                      <div key={m}>
                        <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>{m}</div>
                        <input type="text" inputMode="decimal" value={item[m] ? Math.round(item[m] * 10) / 10 : ""} placeholder="0" onChange={e => update(i, m, e.target.value)} style={{ ...inputStyle, fontFamily: "Inter", fontSize: 13, color: MC[m], padding: "6px 8px" }} />
                      </div>
                    ))}
                  </div>
                </Card>
              ))}
              <Card accent style={{ padding: "12px 14px" }}>
                <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                  {MACROS.map(m => (
                    <div key={m} style={{ textAlign: "center" }}>
                      <Mono size={18} color={MC[m]} bold>{Math.round(totals[m])}</Mono>
                      <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted, marginTop: 2 }}>{UNITS[m]}</div>
                    </div>
                  ))}
                </div>
              </Card>
              <Btn onClick={save} full>Eintrag speichern</Btn>
            </div>
          )}

        </div>
      );

      // Alle Barcode-Overlays via Portal direkt in document.body (iOS overflow:auto fix)
      const portal = ReactDOM.createPortal(
        <>
          {scanning && <BarcodeScanner onScan={handleBarcodeScan} onClose={() => setScanning(false)} />}

          {barcodeLoading && (
            <div style={{ position: "fixed", inset: 0, background: "#000d", zIndex: 190, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <div className="pulsing" style={{ fontFamily: "Syne", fontSize: 15, color: C.accent }}>Produkt wird gesucht…</div>
            </div>
          )}

          {barcodeErr && (
            <div style={{ position: "fixed", inset: 0, background: "#000d", zIndex: 190, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, gap: 16 }}>
              <div style={{ fontFamily: "Syne", fontSize: 14, color: C.danger, textAlign: "center" }}>{barcodeErr}</div>
              <Btn onClick={() => setBarcodeErr(null)} small>OK</Btn>
            </div>
          )}

          {scannedProduct && (
            <div onClick={() => setScannedProduct(null)} style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", zIndex: 190 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: "#181818", borderRadius: "20px 20px 0 0", padding: "20px 16px", width: "100%", maxWidth: 500, margin: "0 auto", border: `1px solid ${C.border}`, paddingBottom: "calc(20px + env(safe-area-inset-bottom))" }}>
                <div style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 4 }}>{scannedProduct.name_de}</div>
                <div style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, marginBottom: 20 }}>
                  Pro 100g: {Math.round(scannedProduct.kcal_100)} kcal · {Math.round(scannedProduct.protein_100 * 10) / 10}g E · {Math.round(scannedProduct.carbs_100 * 10) / 10}g KH · {Math.round(scannedProduct.fat_100 * 10) / 10}g F
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontFamily: "Syne", fontSize: 12, color: C.muted }}>Wie viel hast du gegessen?</div>
                  {scannedProduct.serving_g && (
                    <button onClick={() => setBarcodeWeight(String(scannedProduct.serving_g))}
                      style={{ fontFamily: "Syne", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: parseFloat(barcodeWeight) === scannedProduct.serving_g ? C.accent : C.soft, color: parseFloat(barcodeWeight) === scannedProduct.serving_g ? "#000" : C.muted, border: `1px solid ${C.border}`, cursor: "pointer" }}>
                      {scannedProduct.serving_g}g (1 Portion)
                    </button>
                  )}
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16 }}>
                  <input type="text" inputMode="decimal" value={barcodeWeight} onChange={e => setBarcodeWeight(e.target.value)} autoFocus
                    style={{ flex: 1, background: "#111", border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", color: C.text, fontFamily: "Inter", fontSize: 18, outline: "none", textAlign: "center" }} />
                  <span style={{ fontFamily: "Syne", fontSize: 16, color: C.muted }}>g</span>
                </div>
                {barcodeWeight && parseFloat(barcodeWeight) > 0 && (
                  <div style={{ background: "#34d39910", borderRadius: 8, padding: "8px 12px", fontFamily: "Syne", fontSize: 12, color: C.carbs, marginBottom: 14 }}>
                    = {Math.round(scannedProduct.kcal_100 * parseFloat(barcodeWeight) / 100)} kcal · {Math.round(scannedProduct.protein_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g E · {Math.round(scannedProduct.carbs_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g KH · {Math.round(scannedProduct.fat_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g F
                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn onClick={addBarcodeItem} disabled={!barcodeWeight || parseFloat(barcodeWeight) <= 0} style={{ flex: 1 }}>Hinzufügen →</Btn>
                  <Btn onClick={() => setScannedProduct(null)} variant="ghost">Abbrechen</Btn>
                </div>
              </div>
            </div>
          )}
          {breakdownModal && (() => {
            const { itemIdx, scaledItems } = breakdownModal;
            const updateScaled = (si, field, val) => {
              const newVal = parseFloat(val) || 0;
              setBreakdownModal(p => ({ ...p, scaledItems: p.scaledItems.map((it, idx) => {
                if (idx !== si) return it;
                if (field === "weight_g") {
                  if (newVal <= 0) return { ...it, weight_g: newVal }; // nur Gramm auf 0, Makros unangetastet
                  if (it.kcal_100 != null) {
                    // per-100g vorhanden → immer korrekt skalieren, auch nach Null-Zustand
                    return { ...it, weight_g: newVal, kcal: Math.round((it.kcal_100||0)*newVal/100*10)/10, protein: Math.round((it.protein_100||0)*newVal/100*10)/10, carbs: Math.round((it.carbs_100||0)*newVal/100*10)/10, fat: Math.round((it.fat_100||0)*newVal/100*10)/10 };
                  }
                  if (it.weight_g > 0) {
                    const ratio = newVal / it.weight_g;
                    return { ...it, weight_g: newVal, kcal: Math.round((it.kcal||0)*ratio*10)/10, protein: Math.round((it.protein||0)*ratio*10)/10, carbs: Math.round((it.carbs||0)*ratio*10)/10, fat: Math.round((it.fat||0)*ratio*10)/10 };
                  }
                  return { ...it, weight_g: newVal };
                }
                return { ...it, [field]: newVal };
              }) }));
            };
            const applyBreakdown = () => {
              const t = scaledItems.reduce((a, it) => ({ kcal: a.kcal+(it.kcal||0), protein: a.protein+(it.protein||0), carbs: a.carbs+(it.carbs||0), fat: a.fat+(it.fat||0) }), {kcal:0,protein:0,carbs:0,fat:0});
              setItems(p => p.map((it, idx) => idx === itemIdx ? { ...it, kcal: Math.round(t.kcal*10)/10, protein: Math.round(t.protein*10)/10, carbs: Math.round(t.carbs*10)/10, fat: Math.round(t.fat*10)/10 } : it));
              setBreakdownModal(null);
            };
            const bInStyle = { width: "100%", background: "#111", border: `1px solid ${C.border}`, borderRadius: 5, padding: "5px 6px", fontFamily: "Inter", fontSize: 12, outline: "none" };
            return (
              <div onClick={() => setBreakdownModal(null)} style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", zIndex: 190 }}>
                <div onClick={e => e.stopPropagation()} style={{ background: "#181818", borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 500, margin: "0 auto", border: `1px solid ${C.border}`, maxHeight: "85vh", display: "flex", flexDirection: "column", paddingBottom: "env(safe-area-inset-bottom)" }}>
                  <div style={{ padding: "18px 16px 12px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text }}>Zutaten anteilig</span>
                    <button onClick={() => setBreakdownModal(null)} style={{ background: "none", border: "none", color: C.muted, fontSize: 20, cursor: "pointer" }}>✕</button>
                  </div>
                  <div style={{ overflowY: "auto", flex: 1, padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
                    {scaledItems.map((si, idx) => (
                      <div key={idx} style={{ background: C.card, borderRadius: 8, padding: "10px 12px", border: `1px solid ${C.border}` }}>
                        <div style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 8 }}>{si.name_de || si.name}</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 5 }}>
                          <div>
                            <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", marginBottom: 2 }}>Gramm</div>
                            <input type="text" inputMode="decimal" value={si.weight_g} onChange={e => updateScaled(idx, "weight_g", e.target.value)} style={{ ...bInStyle, color: C.text }} />
                          </div>
                          {MACROS.map(m => (
                            <div key={m}>
                              <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", marginBottom: 2 }}>{m}</div>
                              <input type="text" inputMode="decimal" value={Math.round((si[m]||0)*10)/10} onChange={e => updateScaled(idx, m, e.target.value)} style={{ ...bInStyle, color: MC[m] }} />
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ padding: "12px 16px", borderTop: `1px solid ${C.border}`, display: "flex", gap: 8 }}>
                    <Btn onClick={applyBreakdown} style={{ flex: 1 }}>Übernehmen →</Btn>
                    <Btn onClick={() => setBreakdownModal(null)} variant="ghost">Abbrechen</Btn>
                  </div>
                </div>
              </div>
            );
          })()}
        </>,
        document.body
      );

      return <>{mainContent}{portal}</>;
    }

    function EditEntryModal({ entry, onSave, onClose }) {
      const [items, setItems] = useState(() => (entry.items || []).map(it => ({ ...it })));
      const [saving, setSaving] = useState(false);
      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 8px", color: C.text, fontFamily: "Inter", fontSize: 13, outline: "none", width: "100%" };

      const update = (i, field, val) => setItems(p => p.map((it, idx) => {
        if (idx !== i) return it;
        if (field === "weight_g") {
          const w = parseFloat(val) || 0;
          if (w > 0 && it.kcal_100 != null) {
            return { ...it, weight_g: w, kcal: Math.round(it.kcal_100 * w / 100), protein: Math.round(it.protein_100 * w / 100 * 10) / 10, carbs: Math.round(it.carbs_100 * w / 100 * 10) / 10, fat: Math.round(it.fat_100 * w / 100 * 10) / 10 };
          } else if (w > 0 && it.weight_g > 0) {
            const r = w / it.weight_g;
            return { ...it, weight_g: w, kcal: Math.round(it.kcal * r), protein: Math.round(it.protein * r * 10) / 10, carbs: Math.round(it.carbs * r * 10) / 10, fat: Math.round(it.fat * r * 10) / 10 };
          }
          return { ...it, weight_g: w };
        }
        return { ...it, [field]: parseFloat(val) || 0 };
      }));

      const totals = items.reduce((a, it) => ({
        kcal: a.kcal + (it.kcal || 0), protein: a.protein + (it.protein || 0),
        carbs: a.carbs + (it.carbs || 0), fat: a.fat + (it.fat || 0),
      }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

      const save = async () => {
        setSaving(true);
        try { await onSave({ ...entry, items, totals }); } finally { setSaving(false); }
      };

      return ReactDOM.createPortal(
        <div style={{ position: "fixed", inset: 0, background: "#000e", zIndex: 200, display: "flex", flexDirection: "column", maxWidth: 500, margin: "0 auto" }}>
          <div style={{ background: C.bg, borderBottom: `1px solid ${C.border}`, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: "calc(12px + env(safe-area-inset-top))", flexShrink: 0 }}>
            <div style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: C.text }}>Eintrag bearbeiten</div>
            <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, fontSize: 22, padding: 4 }}>✕</button>
          </div>
          <div style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ fontFamily: "Syne", fontSize: 12, color: C.muted, lineHeight: 1.5, marginBottom: 2 }}>{entry.raw_input}</div>
            {items.map((item, i) => (
              <Card key={i} style={{ padding: "12px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text, flex: 1 }}>{item.name_de || item.name}</span>
                  <button onClick={() => setItems(p => p.filter((_, idx) => idx !== i))} style={{ background: "none", border: "none", color: "#f8717150", fontSize: 16, padding: "2px 4px" }}>✕</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 8 }}>
                  <div>
                    <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>Gramm</div>
                    <input type="text" inputMode="decimal" value={item.weight_g} onChange={e => update(i, "weight_g", e.target.value)} style={{ ...inputStyle, color: C.text }} />
                  </div>
                  {MACROS.map(m => (
                    <div key={m}>
                      <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>{m}</div>
                      <input type="text" inputMode="decimal" value={item[m] ? Math.round(item[m] * 10) / 10 : ""} placeholder="0" onChange={e => update(i, m, e.target.value)} style={{ ...inputStyle, color: MC[m] }} />
                    </div>
                  ))}
                </div>
              </Card>
            ))}
            <Card accent style={{ padding: "12px 14px" }}>
              <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                {MACROS.map(m => (
                  <div key={m} style={{ textAlign: "center" }}>
                    <Mono size={18} color={MC[m]} bold>{Math.round(totals[m])}</Mono>
                    <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted, marginTop: 2 }}>{UNITS[m]}</div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
          <div style={{ background: C.bg, borderTop: `1px solid ${C.border}`, padding: "12px 16px", paddingBottom: "calc(12px + env(safe-area-inset-bottom))", display: "flex", gap: 8, flexShrink: 0 }}>
            <Btn onClick={save} disabled={saving || items.length === 0} style={{ flex: 1 }}>{saving ? "Speichert…" : "Speichern ✓"}</Btn>
            <Btn onClick={onClose} variant="ghost">Abbrechen</Btn>
          </div>
        </div>,
        document.body
      );
    }

    function TodayTab({ entries, targets, onDelete, onEdit, burnedKcal, onSaveBurned }) {
      const totals = sumEntries(entries);
      const burned = burnedKcal || 0;
      const netKcal = totals.kcal - burned;
      const kcalRest = targets.kcal - netKcal;
      const rest = Object.fromEntries(MACROS.map(m => [m, m === "kcal" ? kcalRest : targets[m] - totals[m]]));
      const [burnedInput, setBurnedInput] = useState(burned > 0 ? String(burned) : "");
      const [burnedSaving, setBurnedSaving] = useState(false);
      const [burnedSaved, setBurnedSaved] = useState(false);
      const saveBurned = async () => {
        const v = parseFloat(burnedInput) || 0;
        setBurnedSaving(true);
        try { await onSaveBurned(v); setBurnedSaved(true); setTimeout(() => setBurnedSaved(false), 2000); } catch {}
        setBurnedSaving(false);
      };
      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: "Inter", fontSize: 15, outline: "none", width: 90 };
      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
          <Card style={{ padding: 16 }}>
            <SectionLabel>Tagesfortschritt</SectionLabel>
            {MACROS.map(m => <MacroBar key={m} label={LABELS[m]} current={m === "kcal" ? netKcal : totals[m]} target={targets[m]} color={MC[m]} unit={UNITS[m]} />)}
            {burned > 0 && (
              <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, gap: 6, alignItems: "center" }}>
                <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted }}>gegessen</span>
                <Mono size={11} color={C.kcal}>{Math.round(totals.kcal)}</Mono>
                <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted }}>− verbrannt</span>
                <Mono size={11} color={C.carbs}>{Math.round(burned)}</Mono>
                <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted }}>= netto</span>
                <Mono size={11} color={C.text} bold>{Math.round(netKcal)}</Mono>
              </div>
            )}
          </Card>
          <Card style={{ padding: "12px 14px" }}>
            <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Aktiv verbrannte kcal</div>
            <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
              <input type="text" inputMode="decimal" value={burnedInput} onChange={e => { setBurnedInput(e.target.value); setBurnedSaved(false); }} placeholder="0" min="0" max="5000" style={inputStyle} />
              <span style={{ fontFamily: "Syne", fontSize: 13, color: C.muted }}>kcal</span>
              <Btn small onClick={saveBurned} disabled={burnedSaving}>{burnedSaving ? "…" : "Speichern"}</Btn>
              {burnedSaved && <Mono size={11} color={C.carbs}>✓</Mono>}
            </div>
          </Card>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {MACROS.map(m => (
              <Card key={m} style={{ padding: "10px 12px" }}>
                <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Rest {LABELS[m]}</div>
                <Mono size={20} color={rest[m] < 0 ? C.danger : MC[m]} bold>{rest[m] > 0 ? "+" : ""}{Math.round(rest[m])}</Mono>
                <Mono size={10} color={C.muted}> {UNITS[m]}</Mono>
              </Card>
            ))}
          </div>
          <div>
            <SectionLabel>Einträge heute ({entries.length})</SectionLabel>
            {entries.length === 0
              ? <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.8 }}>Noch keine Einträge.<br />Geh zur Eingabe ✦</div>
              : <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {[...entries].reverse().map(e => (
                    <Card key={e.id} onClick={() => onEdit(e)} style={{ padding: "12px 14px", cursor: "pointer" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                        <div style={{ flex: 1, marginRight: 8 }}>
                          <div style={{ fontFamily: "Syne", fontSize: 13, color: C.text, marginBottom: 3, lineHeight: 1.4 }}>{e.raw_input}</div>
                          <Mono size={11} color={C.muted}>{new Date(e.timestamp).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })} Uhr</Mono>
                        </div>
                        <button onClick={ev => { ev.stopPropagation(); onDelete(e.id); }} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 18, padding: 4 }}>✕</button>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                        {MACROS.map(m => (
                          <div key={m} style={{ textAlign: "center" }}>
                            <Mono size={13} color={MC[m]} bold>{Math.round(e.totals[m])}</Mono>
                            <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>{UNITS[m]}</div>
                          </div>
                        ))}
                      </div>
                    </Card>
                  ))}
                </div>
            }
          </div>
        </div>
      );
    }

    function MealprepTab({ recipes, onAdd, onEdit, onDelete, onArchive, archive, voiceLang, userFoods }) {
      const STEP = { idle: "idle", entering: "entering", analyzing: "analyzing", naming: "naming", editing: "editing" };
      const [step, setStep] = useState(STEP.idle);
      const [editingRecipe, setEditingRecipe] = useState(null); // { recipe, items, name, cookedWeight }
      const [editSaving, setEditSaving] = useState(false);
      const [subTab, setSubTab] = useState("aktiv");
      const [ingredientText, setIngredientText] = useState("");
      const mpTextareaRef = useRef(null);
      const [items, setItems] = useState([]);
      const [mealName, setMealName] = useState("");
      const [cookedWeight, setCookedWeight] = useState("");
      const [err, setErr] = useState(null);
      const [mpListening, setMpListening] = useState(false);
      const [mpTranscribing, setMpTranscribing] = useState(false);
      const mpMediaRecorderRef = useRef(null);
      const mpChunksRef = useRef([]);
      const [mpScanning, setMpScanning] = useState(false);
      const [mpBarcodeLoading, setMpBarcodeLoading] = useState(false);
      const [mpBarcodeErr, setMpBarcodeErr] = useState(null);
      const [mpScannedProduct, setMpScannedProduct] = useState(null);
      const [mpBarcodeWeight, setMpBarcodeWeight] = useState("100");
      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "9px 10px", color: C.text, fontFamily: "Syne", fontSize: 14, outline: "none", width: "100%" };

      const getMpWord = () => {
        const el = mpTextareaRef.current;
        if (!el) return "";
        const before = ingredientText.slice(0, el.selectionStart);
        const match = before.match(/([a-zA-ZäöüÄÖÜß]+)$/);
        return match ? match[1] : "";
      };
      const mpAcWord = step === STEP.entering && !mpTranscribing && userFoods ? getMpWord() : "";
      const mpSuggestions = mpAcWord.length >= 2
        ? userFoods.filter(f => f.name.toLowerCase().startsWith(mpAcWord.toLowerCase())).slice(0, 5)
        : [];
      const applyMpSuggestion = (food) => {
        const el = mpTextareaRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = ingredientText.slice(0, pos);
        const after = ingredientText.slice(pos);
        const newBefore = before.replace(/([a-zA-ZäöüÄÖÜß]+)$/, food.name);
        setIngredientText(newBefore + after);
        setTimeout(() => { el.focus(); el.setSelectionRange(newBefore.length, newBefore.length); }, 0);
      };

      const analyze = async () => {
        if (!ingredientText.trim()) return;
        setStep(STEP.analyzing); setErr(null);
        try {
          const data = await analyzeRecipe(ingredientText);
          setItems(data.items);
          setCookedWeight(String(Math.round(data.raw_weight_g * 0.85)));
          setStep(STEP.naming);
        } catch (e) { setErr("Analyse fehlgeschlagen: " + e.message); setStep(STEP.entering); }
      };

      const updateItem = (i, field, val) => setItems(p => p.map((it, idx) => idx === i ? { ...it, [field]: parseFloat(val) || 0 } : it));
      const totals = items.reduce((a, it) => ({ kcal: a.kcal + (it.kcal || 0), protein: a.protein + (it.protein || 0), carbs: a.carbs + (it.carbs || 0), fat: a.fat + (it.fat || 0) }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

      const saveMealprep = () => {
        if (!mealName.trim() || !cookedWeight) return;
        const tw = parseFloat(cookedWeight);
        const r = { id: Date.now(), name: mealName.trim(), total_weight: tw, kcal_total: Math.round(totals.kcal), protein_total: Math.round(totals.protein * 10) / 10, carbs_total: Math.round(totals.carbs * 10) / 10, fat_total: Math.round(totals.fat * 10) / 10, ingredients: ingredientText, items };
        r.kcal_100 = r.kcal_total / tw * 100; r.protein_100 = r.protein_total / tw * 100;
        r.carbs_100 = r.carbs_total / tw * 100; r.fat_100 = r.fat_total / tw * 100;
        onAdd(r);
        setStep(STEP.idle); setIngredientText(""); setItems([]); setMealName(""); setCookedWeight("");
      };

      const startEditRecipe = (r) => {
        const storedItems = r.items ? (typeof r.items === "string" ? JSON.parse(r.items) : r.items) : [];
        setEditingRecipe({ recipe: r, items: storedItems, name: r.name, cookedWeight: String(parseFloat(r.total_weight)) });
        setStep(STEP.editing);
        setSubTab("aktiv");
      };

      const saveEditRecipe = async () => {
        if (!editingRecipe || !editingRecipe.name.trim() || !editingRecipe.cookedWeight) return;
        setEditSaving(true);
        const tw = parseFloat(editingRecipe.cookedWeight);
        const t = editingRecipe.items.reduce((a, it) => ({ kcal: a.kcal + (it.kcal||0), protein: a.protein + (it.protein||0), carbs: a.carbs + (it.carbs||0), fat: a.fat + (it.fat||0) }), { kcal:0, protein:0, carbs:0, fat:0 });
        const data = { name: editingRecipe.name.trim(), total_weight: tw, kcal_total: Math.round(t.kcal), protein_total: Math.round(t.protein*10)/10, carbs_total: Math.round(t.carbs*10)/10, fat_total: Math.round(t.fat*10)/10, ingredients: editingRecipe.recipe.ingredients, items: editingRecipe.items };
        await onEdit(editingRecipe.recipe.id, data);
        setEditSaving(false);
        setEditingRecipe(null);
        setStep(STEP.idle);
      };

      const cancel = () => { setStep(STEP.idle); setIngredientText(""); setItems([]); setErr(null); setMealName(""); };

      const recookFromArchive = (archived) => {
        setSubTab("aktiv");
        setIngredientText(archived.ingredients || "");
        setMealName(archived.name);
        setStep(STEP.entering);
      };

      const toggleMpVoice = async () => {
        if (mpListening) { mpMediaRecorderRef.current?.stop(); setMpListening(false); return; }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
          const recorder = new MediaRecorder(stream, { mimeType: mime });
          mpChunksRef.current = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) mpChunksRef.current.push(e.data); };
          recorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(mpChunksRef.current, { type: mime });
            setMpTranscribing(true);
            try {
              const auth = getAuth();
              const form = new FormData();
              const ext = mime.includes("mp4") ? "mp4" : "webm";
              form.append("audio", blob, `rec.${ext}`);
              form.append("language", voiceLang || "de");
              const res = await fetch(BACKEND_URL + "/api/transcribe", {
                method: "POST",
                headers: auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {},
                body: form,
              });
              const data = await res.json();
              if (data.text) setIngredientText(p => p.trim() ? p.trim() + "\n" + data.text : data.text);
              else if (data.error) setErr("Spracheingabe: " + data.error);
            } catch { setErr("Spracheingabe fehlgeschlagen"); }
            setMpTranscribing(false);
          };
          mpMediaRecorderRef.current = recorder;
          recorder.start();
          setMpListening(true);
        } catch { setErr("Mikrofon-Zugriff verweigert"); }
      };

      const handleMpBarcodeScan = async (barcode) => {
        setMpScanning(false); setMpBarcodeLoading(true);
        try {
          const data = await lookupBarcode(barcode);
          if (data.found) {
            setMpScannedProduct(data);
            setMpBarcodeWeight(data.serving_g ? String(data.serving_g) : "100");
          } else {
            setMpBarcodeErr(`Produkt nicht gefunden (${barcode})`);
          }
        } catch (e) { setMpBarcodeErr("Barcode-Suche fehlgeschlagen: " + e.message); }
        setMpBarcodeLoading(false);
      };

      const addMpBarcodeItem = () => {
        if (!mpScannedProduct) return;
        const w = parseFloat(mpBarcodeWeight);
        if (!w || w <= 0) return;
        const line = `${w}g ${mpScannedProduct.name_de}`;
        setIngredientText(p => p.trim() ? p.trim() + "\n" + line : line);
        setMpScannedProduct(null);
        setMpBarcodeWeight("100");
      };

      const mpContent = (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", gap: 0, background: C.card, borderRadius: 10, padding: 3, border: `1px solid ${C.border}` }}>
            {[["aktiv", "Aktiv"], ["archiv", `Archiv (${archive.length})`]].map(([id, label]) => (
              <button key={id} onClick={() => setSubTab(id)} style={{ flex: 1, padding: "7px 0", borderRadius: 8, border: "none", background: subTab === id ? C.accent : "transparent", color: subTab === id ? "#000" : C.muted, fontFamily: "Syne", fontSize: 12, fontWeight: 700, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5 }}>
                {label}
              </button>
            ))}
          </div>

          {subTab === "aktiv" && <>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <SectionLabel>Aktive Mealpreps ({recipes.length})</SectionLabel>
              {step === STEP.idle && <Btn onClick={() => setStep(STEP.entering)} small variant="ghost">+ Neu kochen</Btn>}
            </div>

            {step === STEP.entering && (
              <Card accent style={{ display: "flex", flexDirection: "column" }}>
                <div style={{ padding: "12px 14px 0", fontFamily: "Syne", fontSize: 12, color: C.accent, marginBottom: 6 }}>Zutaten eingeben (roh, vor dem Kochen)</div>
                <textarea ref={mpTextareaRef} value={ingredientText} onChange={e => setIngredientText(e.target.value)}
                  placeholder={"1000g rohes Hühnchen\n1 Dose gehackte Tomaten\n1 EL Olivenöl\n1 Packung Sahne 20%\nSalz, Pfeffer, Knoblauch"}
                  style={{ width: "100%", minHeight: 140, background: "transparent", border: "none", outline: "none", padding: "8px 14px 12px", color: C.text, fontFamily: "Syne", fontSize: 15, lineHeight: 1.7 }} />
                {mpSuggestions.length > 0 && (
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", padding: "0 12px 10px" }}>
                    {mpSuggestions.map(f => (
                      <button key={f.id} onMouseDown={e => { e.preventDefault(); applyMpSuggestion(f); }}
                        style={{ fontFamily: "Syne", fontSize: 12, fontWeight: 600, padding: "4px 10px", borderRadius: 16, background: "#1a1a2e", border: `1px solid ${C.accent}44`, color: C.accent, cursor: "pointer" }}>
                        {f.name}
                        <span style={{ fontFamily: "Inter", fontSize: 10, color: C.muted, marginLeft: 5 }}>{Math.round(parseFloat(f.kcal_100))} kcal</span>
                      </button>
                    ))}
                  </div>
                )}
                {mpTranscribing && <div style={{ padding: "2px 14px 6px", fontFamily: "Syne", fontSize: 13, color: C.muted, fontStyle: "italic" }} className="pulsing">Whisper erkennt Sprache…</div>}
                <div style={{ padding: "8px 12px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${C.border}`, gap: 8 }}>
                  <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                    <button onClick={toggleMpVoice} disabled={mpTranscribing} style={{ background: mpListening ? "#f8717122" : mpTranscribing ? "#f59e0b22" : "transparent", border: `1px solid ${mpListening ? C.danger : mpTranscribing ? C.accent : C.border}`, borderRadius: 8, padding: "8px 12px", color: mpListening ? C.danger : mpTranscribing ? C.accent : C.muted, display: "flex", alignItems: "center", gap: 6 }}>
                      <svg className={mpListening || mpTranscribing ? "pulsing" : ""} width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round"/><line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                      {mpListening && <Mono size={11} color={C.danger}>Aufnahme…</Mono>}
                      {mpTranscribing && <Mono size={11} color={C.accent}>Erkennt…</Mono>}
                    </button>
                    <button onClick={() => setMpScanning(true)} disabled={mpBarcodeLoading} style={{ background: mpBarcodeLoading ? "#f59e0b22" : "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: C.muted, display: "flex", alignItems: "center" }}>
                      {mpBarcodeLoading
                        ? <span className="pulsing" style={{ fontSize: 16 }}>⬛</span>
                        : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="8" y="4" width="2" height="16"/><rect x="12" y="4" width="1" height="16"/><rect x="15" y="4" width="2" height="16"/><rect x="19" y="4" width="1" height="16"/><rect x="22" y="4" width="1" height="16"/></svg>
                      }
                    </button>
                  </div>
                  <Btn onClick={analyze} disabled={!ingredientText.trim()} small>Makros berechnen →</Btn>
                </div>
              </Card>
            )}

            {step === STEP.analyzing && <div className="pulsing" style={{ textAlign: "center", padding: 32, fontFamily: "Syne", fontSize: 14, color: C.muted }}>Claude analysiert die Zutaten…</div>}
            {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}

            {step === STEP.naming && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <SectionLabel>Erkannte Zutaten — tippen zum Korrigieren</SectionLabel>
                {items.map((item, i) => (
                  <Card key={i} style={{ padding: "10px 12px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: C.text }}>{item.name_de || item.name}</span>
                      <Mono size={11} color={C.muted}>{item.weight_g}g</Mono>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
                      {MACROS.map(m => (
                        <div key={m}>
                          <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", marginBottom: 2 }}>{m}</div>
                          <input type="text" inputMode="decimal" value={Math.round(item[m] * 10) / 10} onChange={e => updateItem(i, m, e.target.value)} style={{ ...inputStyle, fontFamily: "Inter", fontSize: 13, color: MC[m], padding: "6px 8px" }} />
                        </div>
                      ))}
                    </div>
                  </Card>
                ))}
                <Card accent style={{ padding: "14px" }}>
                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 14 }}>
                    {MACROS.map(m => (
                      <div key={m} style={{ textAlign: "center" }}>
                        <Mono size={18} color={MC[m]} bold>{Math.round(totals[m])}</Mono>
                        <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted, marginTop: 2 }}>{UNITS[m]}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ borderTop: `1px solid ${C.accent}25`, paddingTop: 12, display: "flex", flexDirection: "column", gap: 10 }}>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 4 }}>Name des Mealpreps</div>
                      <input placeholder="z.B. Hähnchen-Tomaten-Sahnesoße" value={mealName} onChange={e => setMealName(e.target.value)} style={inputStyle} />
                    </div>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 4 }}>Fertig gekochtes Gesamtgewicht (g) — bitte abwiegen!</div>
                      <input type="text" inputMode="decimal" placeholder="z.B. 1400" value={cookedWeight} onChange={e => setCookedWeight(e.target.value)} style={inputStyle} />
                    </div>
                  </div>
                </Card>
                {cookedWeight && mealName && (
                  <div style={{ background: "#34d39910", borderRadius: 8, padding: "10px 14px", fontFamily: "Syne", fontSize: 12, color: C.carbs }}>
                    Pro 100g: {Math.round(totals.kcal / parseFloat(cookedWeight) * 100)} kcal · {Math.round(totals.protein / parseFloat(cookedWeight) * 100 * 10) / 10}g E · {Math.round(totals.carbs / parseFloat(cookedWeight) * 100 * 10) / 10}g KH · {Math.round(totals.fat / parseFloat(cookedWeight) * 100 * 10) / 10}g F
                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn onClick={saveMealprep} disabled={!mealName.trim() || !cookedWeight} style={{ flex: 1 }}>Mealprep speichern</Btn>
                  <Btn onClick={cancel} variant="ghost">Abbrechen</Btn>
                </div>
              </div>
            )}

            {step === STEP.idle && recipes.length === 0 && (
              <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.9 }}>
                Noch keine Mealpreps.<br />Koch ein Gericht vor und trag die Zutaten ein –<br />dann kannst du z.B. „300g Hähnchen-Soße"<br />in der täglichen Eingabe tracken.
              </div>
            )}

            {step === STEP.editing && editingRecipe && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button onClick={() => { setStep(STEP.idle); setEditingRecipe(null); }} style={{ background: "none", border: "none", color: C.muted, padding: "4px 0", display: "flex", alignItems: "center", gap: 5, fontFamily: "Syne", fontSize: 13, cursor: "pointer" }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Zurück
                  </button>

                </div>

          {subTab === "archiv" && <>

                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginTop: 2 }}>

      const mpPortal = ReactDOM.createPortal(

                      {mpScannedProduct.serving_g}g (1 Portion)

                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16 }}>

                    style={{ flex: 1, background: "#111", border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", color: C.text, fontFamily: "Inter", fontSize: 18, outline: "none", textAlign: "center" }} />
                  <span style={{ fontFamily: "Syne", fontSize: 16, color: C.muted }}>g</span>

                {mpBarcodeWeight && parseFloat(mpBarcodeWeight) > 0 && (

                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn onClick={addMpBarcodeItem} disabled={!mpBarcodeWeight || parseFloat(mpBarcodeWeight) <= 0} style={{ flex: 1 }}>Hinzufügen →</Btn>
                  <Btn onClick={() => setMpScannedProduct(null)} variant="ghost">Abbrechen</Btn>
                </div>
              </div>
            </div>
          )}
        </>,
        document.body
      );

      return <>{mpContent}{mpPortal}</>;
    }

    function MultiLineChart({ series, n = 7, H = 80 }) {
      const VW = 280, VH = H;
      const padT = 8, padB = 8, padL = 0, padR = 0;
      const chartW = VW - padL - padR;
      const step = n > 1 ? chartW / (n - 1) : 0;
      const toX = i => padL + i * step;
      return (
        <svg viewBox={`0 0 ${VW} ${VH}`} style={{ width: "100%", display: "block" }}>
          {series.map(s => {
            const valid = s.data.filter(v => v != null);
            if (valid.length < 1) return null;
            const mn = Math.min(...valid);
            const mx = Math.max(...valid);
            const range = mx - mn || 1;
            const toY = v => padT + (1 - (v - mn) / range) * (VH - padT - padB);
            let d = "";
            s.data.forEach((v, i) => {
              if (v == null) return;
              d += d ? ` L${toX(i)} ${toY(v)}` : `M${toX(i)} ${toY(v)}`;
            });
            return (
              <g key={s.id}>
                <path d={d} fill="none" stroke={s.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                {s.data.map((v, i) => v != null && (
                  <circle key={i} cx={toX(i)} cy={toY(v)} r="3.5" fill={s.color} />
                ))}
              </g>
            );
          })}
        </svg>
      );
    }

    function HistoryTab({ targets, loadRange, loadDay, onDelete, updateEntry, loadBodyWeights, saveBodyWeight, onAdd, recipes, userFoods, voiceLang }) {
      const PERIODS = [
        { id: "tage",   label: "Tage",   daysBack: 6,    chartTitle: "Tagesverlauf" },
        { id: "wochen", label: "Wochen", daysBack: 83,   chartTitle: "Wochenverlauf" },
        { id: "monate", label: "Monate", daysBack: 364,  chartTitle: "Monatsverlauf" },
        { id: "jahre",  label: "Jahre",  daysBack: 1824, chartTitle: "Jahresverlauf" },
      ];

      const [period, setPeriod] = useState("tage");
      const [days, setDays] = useState([]);
      const [loading, setLoading] = useState(true);
      const [selectedDay, setSelectedDay] = useState(null);
      const [selectedBucket, setSelectedBucket] = useState(null);
      const [dayEntries, setDayEntries] = useState([]);
      const [dayLoading, setDayLoading] = useState(false);
      const [editingEntry, setEditingEntry] = useState(null);
      const [bodyWeights, setBodyWeights] = useState({});
      const [burnedMap, setBurnedMap] = useState({});
      const [dayWeight, setDayWeight] = useState("");
      const [dayWeightSaving, setDayWeightSaving] = useState(false);
      const [dayWeightSaved, setDayWeightSaved] = useState(false);
      const [dayBurned, setDayBurned] = useState("");
      const [dayBurnedSaving, setDayBurnedSaving] = useState(false);
      const [dayBurnedSaved, setDayBurnedSaved] = useState(false);
      const [activeStats, setActiveStats] = useState(new Set(["gewicht", "kcal"]));
      const toggleStat = (id) => setActiveStats(prev => { const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n; });

      // ── Add-entry form state ───────────────────────────────────────────────────
      const [addText, setAddText] = useState("");
      const [addItems, setAddItems] = useState([]);
      const [addLoading, setAddLoading] = useState(false);
      const [addErr, setAddErr] = useState(null);
      const [addSaving, setAddSaving] = useState(false);
      useEffect(() => { setAddText(""); setAddItems([]); setAddErr(null); }, [selectedDay?.date]);

      const loadData = (p) => {
        const cfg = PERIODS.find(x => x.id === p);
        const to = todayStr();
        const fromDate = new Date(); fromDate.setDate(fromDate.getDate() - cfg.daysBack);
        const from = fromDate.toISOString().split("T")[0];
        setLoading(true);
        Promise.all([loadRange(from, to), loadBodyWeights(from, to)])
          .then(([map, weights]) => {
            const allDates = [];
            for (let i = 0; i <= cfg.daysBack; i++) {
              const d = new Date(); d.setDate(d.getDate() - i);
              allDates.push(d.toISOString().split("T")[0]);
            }
            const result = allDates.map(ds => {
              const entries = map[ds] || [];
              return { date: ds, entries: entries.length, totals: sumEntries(entries) };
            });
            setDays(result);
            const wMap = {}, bMap = {};
            weights.forEach(w => {
              if (w.weight_kg != null) wMap[w.date] = parseFloat(w.weight_kg);
              if (w.burned_kcal != null) bMap[w.date] = parseFloat(w.burned_kcal);
            });
            setBodyWeights(wMap);
            setBurnedMap(bMap);
          })
          .catch(() => setDays([]))
          .finally(() => setLoading(false));
      };

      useEffect(() => { loadData(period); }, []);

      const changePeriod = (p) => {
        setPeriod(p);
        setSelectedDay(null);
        setSelectedBucket(null);
        loadData(p);
      };

      // ── helpers ──────────────────────────────────────────────────────────────
      const dayLabel = (ds, short = false) => {
        const d = new Date(ds + "T12:00:00");
        if (!short) {
          const t = new Date(); const y = new Date(); y.setDate(y.getDate() - 1);
          if (d.toDateString() === t.toDateString()) return "Heute";
          if (d.toDateString() === y.toDateString()) return "Gestern";
        }
