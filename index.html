        if (short) return d.toLocaleDateString("de-DE", { weekday: "short" });
        return d.toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "short" });
      };

      const isoWeekMonday = (ds) => {
        const d = new Date(ds + "T12:00:00");
        const dow = (d.getDay() + 6) % 7; // Mon=0
        d.setDate(d.getDate() - dow);
        return d.toISOString().split("T")[0];
      };

      const bucketKey = (ds, p) => {
        if (p === "tage")   return ds;
        if (p === "wochen") return isoWeekMonday(ds);
        if (p === "monate") return ds.slice(0, 7);
        if (p === "jahre")  return ds.slice(0, 4);
        return ds;
      };

      const bucketLabel = (b, short = false) => {
        if (period === "tage") {
          if (short) return dayLabel(b.key, true);
          return dayLabel(b.key, false);
        }
        if (period === "wochen") {
          const start = new Date(b.key + "T12:00:00");
          const end = new Date(b.key + "T12:00:00"); end.setDate(end.getDate() + 6);
          const fmt = (d) => d.toLocaleDateString("de-DE", { day: "numeric", month: "short" });
          if (short) return fmt(start);
          return `${fmt(start)} – ${fmt(end)}`;
        }
        if (period === "monate") {
          const d = new Date(b.key + "-01T12:00:00");
          if (short) return d.toLocaleDateString("de-DE", { month: "short" });
          return d.toLocaleDateString("de-DE", { month: "long", year: "numeric" });
        }
        if (period === "jahre") {
          return b.key;
        }
        return b.key;
      };

      const buildBuckets = () => {
        const map = new Map();
        days.forEach(day => {
          const k = bucketKey(day.date, period);
          if (!map.has(k)) map.set(k, { key: k, dates: [], entries: 0, totals: { kcal: 0, protein: 0, carbs: 0, fat: 0 }, wvals: [], burned: 0 });
          const b = map.get(k);
          b.dates.push(day.date);
          b.entries += day.entries;
          MACROS.forEach(m => { b.totals[m] += day.totals[m]; });
          if (bodyWeights[day.date] != null) b.wvals.push(bodyWeights[day.date]);
          b.burned += burnedMap[day.date] || 0;
        });
        return Array.from(map.values()).map(b => ({
          ...b,
          avgWeight: b.wvals.length > 0 ? b.wvals.reduce((a, v) => a + v, 0) / b.wvals.length : null,
        }));
      };

      const getPrevWeight = (date) => {
        for (let i = 1; i <= 30; i++) {
          const prev = new Date(date + "T12:00:00"); prev.setDate(prev.getDate() - i);
          const ps = prev.toISOString().split("T")[0];
          if (bodyWeights[ps] != null) return String(bodyWeights[ps]);
        }
        return "";
      };

      const openDay = async (date) => {
        setSelectedDay({ date, label: dayLabel(date) });
        setDayWeight(bodyWeights[date] != null ? String(bodyWeights[date]) : getPrevWeight(date));
        setDayWeightSaved(false);
        setDayBurned(burnedMap[date] != null ? String(burnedMap[date]) : "");
        setDayBurnedSaved(false);
        setDayLoading(true);
        try { setDayEntries(await loadDay(date)); }
        catch { setDayEntries([]); }
        setDayLoading(false);
      };

      const saveDayWeight = async () => {
        const w = parseFloat(dayWeight);
        if (!w || w <= 0) return;
        setDayWeightSaving(true);
        try {
          await saveBodyWeight(selectedDay.date, w);
          setBodyWeights(p => ({ ...p, [selectedDay.date]: w }));
          setDayWeightSaved(true);
        } catch {}
        setDayWeightSaving(false);
      };

      const saveDayBurned = async () => {
        const b = parseFloat(dayBurned) || 0;
        setDayBurnedSaving(true);
        try {
          await saveBodyWeight(selectedDay.date, null, b);
          setBurnedMap(p => ({ ...p, [selectedDay.date]: b }));
          setDayBurnedSaved(true);
          setTimeout(() => setDayBurnedSaved(false), 2000);
        } catch {}
        setDayBurnedSaving(false);
      };

      const handleDelete = (id) => {
        const next = dayEntries.filter(e => e.id !== id);
        setDayEntries(next);
        setDays(p => p.map(d => d.date === selectedDay.date ? { ...d, entries: next.length, totals: sumEntries(next) } : d));
        onDelete(id);
      };

      const handleEdit = async (updated) => {
        try {
          const saved = await updateEntry(updated.id, updated);
          const next = dayEntries.map(e => e.id === saved.id ? saved : e);
          setDayEntries(next);
          setDays(p => p.map(d => d.date === selectedDay.date ? { ...d, totals: sumEntries(next) } : d));
        } catch {
          setDayEntries(p => p.map(e => e.id === updated.id ? updated : e));
        }
      };

      const addAnalyze = async () => {
        if (!addText.trim()) return;
        setAddLoading(true); setAddErr(null); setAddItems([]);
        try {
          const data = await analyzeMeal(addText, recipes || []);
          const enriched = (data.items || []).map(item => {
            if (item.source === "recipe" && item.recipe_name && recipes) {
              const r = recipes.find(r => r.name === item.recipe_name);
              if (r) {
                const si = r.items ? (typeof r.items === "string" ? JSON.parse(r.items) : r.items) : [];
                return { ...item, recipeItems: si, recipeTotalWeight: parseFloat(r.total_weight) };
              }
            }
            return item;
          });
          setAddItems(enriched);
        } catch (e) { setAddErr("Analyse fehlgeschlagen: " + e.message); }
        setAddLoading(false);
      };

      const updateAddItem = (i, field, val) => setAddItems(p => p.map((it, idx) => {
        if (idx !== i) return it;
        if (field === "weight_g") {
          const w = parseFloat(val) || 0;
          if (w > 0 && it.kcal_100 != null) return { ...it, weight_g: w, kcal: Math.round(it.kcal_100*w/100), protein: Math.round(it.protein_100*w/100*10)/10, carbs: Math.round(it.carbs_100*w/100*10)/10, fat: Math.round(it.fat_100*w/100*10)/10 };
          return { ...it, weight_g: parseFloat(val)||0 };
        }
        return { ...it, [field]: parseFloat(val)||0 };
      }));

      const saveAddEntry = async () => {
        if (!addItems.length || addSaving) return;
        setAddSaving(true);
        const t = addItems.reduce((a, it) => ({ kcal: a.kcal+(it.kcal||0), protein: a.protein+(it.protein||0), carbs: a.carbs+(it.carbs||0), fat: a.fat+(it.fat||0) }), { kcal:0, protein:0, carbs:0, fat:0 });
        const entry = { id: Date.now(), raw_input: addText, items: addItems, totals: t, timestamp: new Date(selectedDay.date + "T12:00:00").toISOString() };
        try {
          const saved = await onAdd(selectedDay.date, entry);
          const next = [...dayEntries, saved];
          setDayEntries(next);
          setDays(p => p.map(d => d.date === selectedDay.date ? { ...d, entries: next.length, totals: sumEntries(next) } : d));
          setAddText(""); setAddItems([]); setAddErr(null);
        } catch {}
        setAddSaving(false);
        setEditingEntry(null);
      };

      const backBtn = (label, onClick) => (
        <button onClick={onClick} style={{ background: "none", border: "none", color: C.muted, padding: "4px 0", display: "flex", alignItems: "center", gap: 5, fontFamily: "Syne", fontSize: 13, cursor: "pointer" }}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          {label}
        </button>
      );

      const DayCard = ({ day, onClick }) => {
        const pct = Math.min((day.totals.kcal / targets.kcal) * 100, 100);
        const w = bodyWeights[day.date];
        return (
          <Card onClick={onClick} style={{ padding: "12px 14px", opacity: day.entries > 0 || w != null ? 1 : 0.4, cursor: "pointer" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: day.entries > 0 ? 10 : 0 }}>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text }}>{dayLabel(day.date)}</span>
                {w != null && <Mono size={11} color={C.weight}>{w} kg</Mono>}
              </div>
              {day.entries > 0
                ? <div style={{ display: "flex", gap: 6, alignItems: "baseline" }}>
                    <Mono size={14} color={C.kcal} bold>{Math.round(day.totals.kcal)}</Mono>
                    <Mono size={10} color={C.muted}>kcal · {day.entries} Eintr.</Mono>
                  </div>
                : <Mono size={11} color={C.muted}>keine Daten</Mono>
              }
            </div>
            {day.entries > 0 && (
              <>
                <div style={{ height: 3, background: "#1e1e1e", borderRadius: 2, marginBottom: 10 }}>
                  <div style={{ width: `${pct}%`, height: "100%", background: pct >= 90 ? C.carbs : C.kcal, borderRadius: 2 }} />
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 4 }}>
                  {["protein", "carbs", "fat"].map(m => (
                    <div key={m} style={{ textAlign: "center" }}>
                      <Mono size={12} color={MC[m]}>{Math.round(day.totals[m])}g</Mono>
                      <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>{LABELS[m]}</div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </Card>
        );
      };

      if (loading) return (
        <div className="pulsing" style={{ textAlign: "center", padding: 60, fontFamily: "Syne", fontSize: 14, color: C.muted }}>Lade Verlauf…</div>
      );

      // ── Day detail view ───────────────────────────────────────────────────────
      if (selectedDay) {
        const totals = sumEntries(dayEntries);
        const rest = Object.fromEntries(MACROS.map(m => [m, targets[m] - totals[m]]));
        const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: "Inter", fontSize: 15, outline: "none", width: 90 };
        return (
          <>
            <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                {backBtn("Verlauf", () => { setSelectedDay(null); })}
                <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text }}>{selectedDay.label}</span>
              </div>
              {dayLoading ? (
                <div className="pulsing" style={{ textAlign: "center", padding: 40, fontFamily: "Syne", fontSize: 14, color: C.muted }}>Lädt…</div>
              ) : (
                <>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <Card style={{ padding: "12px 14px" }}>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Körpergewicht</div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                        <input type="text" inputMode="decimal" value={dayWeight} onChange={e => { setDayWeight(e.target.value); setDayWeightSaved(false); }} step="0.1" min="20" max="500" placeholder="– –" style={inputStyle} />
                        <span style={{ fontFamily: "Syne", fontSize: 13, color: C.muted }}>kg</span>
                        <Btn small onClick={saveDayWeight} disabled={!dayWeight || dayWeightSaving}>{dayWeightSaving ? "…" : "Speichern"}</Btn>
                        {dayWeightSaved && <Mono size={11} color={C.carbs}>✓</Mono>}
                      </div>
                    </Card>
                    <Card style={{ padding: "12px 14px" }}>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Aktiv verbrannt</div>
                      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                        <input type="text" inputMode="decimal" value={dayBurned} onChange={e => { setDayBurned(e.target.value); setDayBurnedSaved(false); }} min="0" max="5000" placeholder="0" style={inputStyle} />
                        <span style={{ fontFamily: "Syne", fontSize: 13, color: C.muted }}>kcal</span>
                        <Btn small onClick={saveDayBurned} disabled={dayBurnedSaving}>{dayBurnedSaving ? "…" : "Speichern"}</Btn>
                        {dayBurnedSaved && <Mono size={11} color={C.carbs}>✓</Mono>}
                      </div>
                    </Card>
                  </div>
                  <Card style={{ padding: 16 }}>
                    <SectionLabel>Tagesfortschritt</SectionLabel>
                    {MACROS.map(m => <MacroBar key={m} label={LABELS[m]} current={totals[m]} target={targets[m]} color={MC[m]} unit={UNITS[m]} />)}
                  </Card>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    {MACROS.map(m => (
                      <Card key={m} style={{ padding: "10px 12px" }}>
                        <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Rest {LABELS[m]}</div>
                        <Mono size={20} color={rest[m] < 0 ? C.danger : MC[m]} bold>{rest[m] > 0 ? "+" : ""}{Math.round(rest[m])}</Mono>
                        <Mono size={10} color={C.muted}> {UNITS[m]}</Mono>
                      </Card>
                    ))}
                  </div>
                  {/* ── Nachträglich hinzufügen ── */}
                  <div>
                    <SectionLabel>Eintrag hinzufügen</SectionLabel>
                    <Card style={{ padding: "12px 14px" }}>
                      {recipes && recipes.length > 0 && addItems.length === 0 && !addLoading && (
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center", marginBottom: 10 }}>
                          <span style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>Mealprep:</span>
                          {recipes.map(r => (
                            <button key={r.id} onClick={() => {
                              const w = parseFloat(r.total_weight)||100;
                              const k100=parseFloat(r.kcal_100)||0, p100=parseFloat(r.protein_100)||0, c100=parseFloat(r.carbs_100)||0, f100=parseFloat(r.fat_100)||0;
                              const si = r.items ? (typeof r.items==="string" ? JSON.parse(r.items) : r.items) : [];
                              const ni = { name_de: r.name, weight_g: w, kcal: parseFloat(r.kcal_total)||Math.round(k100*w/100), protein: parseFloat(r.protein_total)||Math.round(p100*w/100*10)/10, carbs: parseFloat(r.carbs_total)||Math.round(c100*w/100*10)/10, fat: parseFloat(r.fat_total)||Math.round(f100*w/100*10)/10, kcal_100: k100, protein_100: p100, carbs_100: c100, fat_100: f100, source: "recipe", recipeItems: si, recipeTotalWeight: w };
                              setAddText(p => p.trim() ? p.trim() + "\n" + r.name : r.name);
                              setAddItems(p => [...p, ni]);
                            }} style={{ fontFamily: "Syne", fontSize: 11, fontWeight: 600, padding: "4px 10px", borderRadius: 20, background: C.soft, border: `1px solid ${C.border}`, color: C.text, cursor: "pointer" }}>{r.name}</button>
                          ))}
                        </div>
                      )}
                      <div style={{ display: "flex", gap: 8, marginBottom: addItems.length ? 10 : 0 }}>
                        <textarea value={addText} onChange={e => setAddText(e.target.value)} placeholder="z.B. 200g Hähnchen, 150g Reis" rows={2} style={{ flex: 1, background: "#111", border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 10px", color: C.text, fontFamily: "Inter", fontSize: 13, outline: "none", resize: "none" }} />
                        <Btn small onClick={addAnalyze} disabled={!addText.trim() || addLoading}>{addLoading ? "…" : "Analysieren →"}</Btn>
                      </div>
                      {addErr && <div style={{ fontFamily: "Syne", fontSize: 11, color: C.danger, marginBottom: 8 }}>{addErr}</div>}
                      {addItems.length > 0 && (
                        <>
                          <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 10 }}>
                            {addItems.map((item, i) => {
                              const iStyle = { background: "#0a0a0a", border: `1px solid ${C.border}`, borderRadius: 5, padding: "5px 7px", color: C.text, fontFamily: "Inter", fontSize: 12, outline: "none", width: "100%" };
                              return (
                                <div key={i} style={{ background: C.soft, borderRadius: 8, padding: "8px 10px" }}>
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                                    <span style={{ fontFamily: "Syne", fontSize: 12, fontWeight: 700, color: C.text }}>{item.name_de || item.name}</span>
                                    <button onClick={() => setAddItems(p => p.filter((_,idx)=>idx!==i))} style={{ background: "none", border: "none", color: "#f8717150", fontSize: 14, padding: "2px 4px" }}>✕</button>
                                  </div>
                                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 4 }}>
                                    <div>
                                      <div style={{ fontFamily: "Syne", fontSize: 8, color: C.muted, textTransform: "uppercase", marginBottom: 2 }}>Gramm</div>
                                      <input type="text" inputMode="decimal" value={item.weight_g} onChange={e => updateAddItem(i,"weight_g",e.target.value)} style={iStyle} />
                                    </div>
                                    {MACROS.map(m => (
                                      <div key={m}>
                                        <div style={{ fontFamily: "Syne", fontSize: 8, color: MC[m], textTransform: "uppercase", marginBottom: 2 }}>{m}</div>
                                        <input type="text" inputMode="decimal" value={Math.round((item[m]||0)*10)/10} onChange={e => updateAddItem(i,m,e.target.value)} style={{ ...iStyle, color: MC[m] }} />
                                      </div>
                                    ))}
                                  </div>
                                </div>
                              );
                            })}
                          </div>
                          <Btn onClick={saveAddEntry} disabled={addSaving} style={{ width: "100%" }}>{addSaving ? "…" : "Hinzufügen ✓"}</Btn>
                        </>
                      )}
                    </Card>
                  </div>

                  <div>
                    <SectionLabel>Einträge ({dayEntries.length})</SectionLabel>
                    {dayEntries.length === 0
                      ? <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14 }}>Keine Einträge.</div>
                      : <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                          {[...dayEntries].reverse().map(e => (
                            <Card key={e.id} onClick={() => setEditingEntry(e)} style={{ padding: "12px 14px", cursor: "pointer" }}>
                              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                                <div style={{ flex: 1, marginRight: 8 }}>
                                  <div style={{ fontFamily: "Syne", fontSize: 13, color: C.text, marginBottom: 3, lineHeight: 1.4 }}>{e.raw_input}</div>
                                  <Mono size={11} color={C.muted}>{new Date(e.timestamp).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })} Uhr</Mono>
                                </div>
                                <button onClick={ev => { ev.stopPropagation(); handleDelete(e.id); }} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 18, padding: 4 }}>✕</button>
                              </div>
                              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                                {MACROS.map(m => (
                                  <div key={m} style={{ textAlign: "center" }}>
                                    <Mono size={13} color={MC[m]} bold>{Math.round(e.totals[m])}</Mono>
                                    <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>{UNITS[m]}</div>
                                  </div>
                                ))}
                              </div>
                            </Card>
                          ))}
                        </div>
                    }
                  </div>
                </>
              )}
            </div>
            {editingEntry && <EditEntryModal entry={editingEntry} onSave={handleEdit} onClose={() => setEditingEntry(null)} />}
          </>
        );
      }

      const buckets = buildBuckets();
      const cfg = PERIODS.find(x => x.id === period);

      // ── Bucket drill-down view ────────────────────────────────────────────────
      if (selectedBucket) {
        const b = selectedBucket;
        const bucketDays = [...b.dates].sort((a, z) => z.localeCompare(a)).map(ds => days.find(d => d.date === ds)).filter(Boolean);
        return (
          <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
              {backBtn("Verlauf", () => setSelectedBucket(null))}
              <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text }}>{bucketLabel(b)}</span>
            </div>
            {bucketDays.map(day => (
              <DayCard key={day.date} day={day} onClick={() => openDay(day.date)} />
            ))}
          </div>
        );
      }

      // ── Overview ─────────────────────────────────────────────────────────────
      // chart data: buckets oldest→newest
      const chartBuckets = [...buckets].reverse();
      const weightData  = chartBuckets.map(b => b.avgWeight != null ? parseFloat(b.avgWeight.toFixed(1)) : null);
      const kcalData    = chartBuckets.map(b => b.entries > 0 ? Math.round(b.totals.kcal) : null);
      const burnedData  = chartBuckets.map(b => b.burned > 0 ? Math.round(b.burned) : null);
      const netKcalData = chartBuckets.map(b => b.entries > 0 ? Math.round(b.totals.kcal - b.burned) : null);
      const proteinData = chartBuckets.map(b => b.entries > 0 ? Math.round(b.totals.protein * 10) / 10 : null);
      const carbsData   = chartBuckets.map(b => b.entries > 0 ? Math.round(b.totals.carbs * 10) / 10 : null);
      const fatData     = chartBuckets.map(b => b.entries > 0 ? Math.round(b.totals.fat * 10) / 10 : null);
      const statsCharts = [
        { id: "gewicht", label: "Gewicht",   data: weightData,  color: C.weight,    unit: "kg",   dec: 1 },
        { id: "kcal",    label: "kcal",      data: kcalData,    color: C.kcal,      unit: "kcal", dec: 0 },
        { id: "netto",   label: "Netto",     data: netKcalData, color: "#f59e0b88", unit: "kcal", dec: 0 },
        { id: "burned",  label: "Verbrannt", data: burnedData,  color: C.carbs,     unit: "kcal", dec: 0 },
        { id: "protein", label: "Eiweiß",    data: proteinData, color: C.protein,   unit: "g",    dec: 0 },
        { id: "carbs",   label: "KH",        data: carbsData,   color: C.carbs,     unit: "g",    dec: 0 },
        { id: "fat",     label: "Fett",      data: fatData,     color: C.fat,       unit: "g",    dec: 0 },
      ].filter(c => c.data.some(v => v != null));
      const activeSeries = statsCharts.filter(c => activeStats.has(c.id));
      const singleActive = activeSeries.length === 1 ? activeSeries[0] : null;

      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
          {/* Period selector */}
          <div style={{ display: "flex", background: C.bg, borderRadius: 10, padding: 3, gap: 2, border: `1px solid ${C.border}` }}>
            {PERIODS.map(p => {
              const active = period === p.id;
              return (
                <button key={p.id} onClick={() => changePeriod(p.id)}
                  style={{ flex: 1, padding: "6px 0", borderRadius: 8, border: "none", background: active ? C.card : "transparent", color: active ? C.text : C.muted, fontFamily: "Syne", fontSize: 12, fontWeight: active ? 700 : 400, cursor: "pointer", transition: "all 0.15s" }}>
                  {p.label}
                </button>
              );
            })}
          </div>

          {statsCharts.length > 0 && (
            <Card style={{ padding: "14px 14px 12px" }}>
              <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>{cfg.chartTitle}</div>
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 14 }}>
                {statsCharts.map(c => {
                  const on = activeStats.has(c.id);
                  return (
                    <button key={c.id} onClick={() => toggleStat(c.id)}
                      style={{ padding: "4px 10px", borderRadius: 20, border: `1px solid ${on ? c.color : C.border}`, background: on ? c.color + "1a" : "transparent", color: on ? c.color : C.muted, fontFamily: "Syne", fontSize: 11, fontWeight: on ? 700 : 400, cursor: "pointer", display: "flex", alignItems: "center", gap: 5 }}>
                      <span style={{ width: 7, height: 7, borderRadius: "50%", background: on ? c.color : "transparent", border: `1.5px solid ${on ? c.color : C.border}`, display: "inline-block", flexShrink: 0 }} />
                      {c.label}
                    </button>
                  );
                })}
              </div>
              {activeSeries.length > 0 ? (<>
                <MultiLineChart series={activeSeries} n={chartBuckets.length} H={84} />
                <div style={{ display: "flex", marginTop: 6 }}>
                  {chartBuckets.map((b, i) => (
                    <div key={b.key} style={{ flex: 1, textAlign: "center" }}>
                      <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>{bucketLabel(b, true)}</div>
                      {singleActive && singleActive.data[i] != null && (
                        <div style={{ fontFamily: "Inter", fontSize: 9, color: singleActive.color, marginTop: 2 }}>
                          {Number(singleActive.data[i]).toFixed(singleActive.dec)}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                <div style={{ marginTop: 12, paddingTop: 10, borderTop: `1px solid ${C.border}`, display: "flex", flexDirection: "column", gap: 5 }}>
                  {activeSeries.map(s => {
                    const valid = s.data.filter(v => v != null);
                    if (valid.length === 0) return null;
                    const mn = Math.min(...valid); const mx = Math.max(...valid);
                    const avg = valid.reduce((a, b) => a + b, 0) / valid.length;
                    return (
                      <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap" }}>
                        <span style={{ width: 8, height: 8, borderRadius: "50%", background: s.color, flexShrink: 0 }} />
                        <span style={{ fontFamily: "Syne", fontSize: 10, color: s.color, minWidth: 48 }}>{s.label}</span>
                        <Mono size={10} color={C.muted}>Min</Mono><Mono size={11} color={s.color}> {mn.toFixed(s.dec)}</Mono>
                        <Mono size={10} color={C.muted}>Max</Mono><Mono size={11} color={s.color}> {mx.toFixed(s.dec)}</Mono>
                        <Mono size={10} color={C.muted}>Ø</Mono><Mono size={11} color={s.color}> {avg.toFixed(s.dec)} {s.unit}</Mono>
                      </div>
                    );
                  })}
                </div>
              </>) : (
                <div style={{ textAlign: "center", padding: "20px 0", fontFamily: "Syne", fontSize: 12, color: C.muted }}>Keine Linie ausgewählt</div>
              )}
            </Card>
          )}

          <SectionLabel>{cfg.label}</SectionLabel>

          {period === "tage"
            ? buckets.map(b => {
                const day = days.find(d => d.date === b.key);
                if (!day) return null;
                return <DayCard key={b.key} day={day} onClick={() => openDay(b.key)} />;
              })
            : buckets.map(b => {
                const hasData = b.entries > 0 || b.avgWeight != null;
                return (
                  <Card key={b.key} onClick={() => setSelectedBucket(b)}
                    style={{ padding: "12px 14px", opacity: hasData ? 1 : 0.4, cursor: "pointer" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: b.entries > 0 ? 10 : 0 }}>
                      <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                        <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text }}>{bucketLabel(b)}</span>
                        {b.avgWeight != null && <Mono size={11} color={C.weight}>Ø {b.avgWeight.toFixed(1)} kg</Mono>}
                      </div>
                      {b.entries > 0
                        ? <div style={{ display: "flex", gap: 6, alignItems: "baseline" }}>
                            <Mono size={14} color={C.kcal} bold>{Math.round(b.totals.kcal)}</Mono>
                            <Mono size={10} color={C.muted}>kcal · {b.entries} Eintr.</Mono>
                          </div>
                        : <Mono size={11} color={C.muted}>keine Daten</Mono>
                      }
                    </div>
                    {b.entries > 0 && (
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 4 }}>
                        {["protein", "carbs", "fat"].map(m => (
                          <div key={m} style={{ textAlign: "center" }}>
                            <Mono size={12} color={MC[m]}>{Math.round(b.totals[m])}g</Mono>
                            <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>{LABELS[m]}</div>
                          </div>
                        ))}
                      </div>
                    )}
                  </Card>
                );
              })
          }
        </div>
      );
    }

    const LANG_OPTS = [
      { k: "de", l: "Deutsch" }, { k: "en", l: "English" }, { k: "tr", l: "Türkçe" },
      { k: "ru", l: "Русский" }, { k: "it", l: "Italiano" }, { k: "es", l: "Español" },
      { k: "fr", l: "Français" }, { k: "ar", l: "العربية" },
    ];

    function calcMacroTargets(gender, age, weight, height, goal) {
      const bmr = gender === "m"
        ? 10 * weight + 6.25 * height - 5 * age + 5
        : 10 * weight + 6.25 * height - 5 * age - 161;
      let tdee = bmr * 1.55;
      if (goal === "abnehmen") tdee -= 400;
      else if (goal === "aufbauen") tdee += 200;
      const kcal = Math.round(tdee / 50) * 50;
      const protein = Math.round(weight * 2);
      const fat = Math.round(kcal * 0.28 / 9);
      const carbs = Math.round((kcal - protein * 4 - fat * 9) / 4);
      return { kcal, protein, carbs, fat };
    }

    function DeleteAccountButton({ onDelete }) {
      const [confirm, setConfirm] = useState(false);
      const [loading, setLoading] = useState(false);
      if (!confirm) return (
        <button onClick={() => setConfirm(true)} style={{ background: "none", border: `1px solid #f8717140`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontFamily: "Syne", fontSize: 13, cursor: "pointer", width: "100%", textAlign: "left" }}>
          Account löschen
        </button>
      );
      return (
        <div style={{ background: "#f8717110", border: `1px solid #f8717130`, borderRadius: 8, padding: "12px 14px", display: "flex", flexDirection: "column", gap: 10 }}>
          <div style={{ fontFamily: "Syne", fontSize: 13, color: C.danger, lineHeight: 1.5 }}>Wirklich löschen? Alle Daten (Tagebuch, Mealpreps, Gewicht) werden unwiderruflich gelöscht.</div>
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={async () => { setLoading(true); await onDelete(); }} disabled={loading} style={{ flex: 1, background: C.danger, border: "none", borderRadius: 6, padding: "10px", color: "#000", fontFamily: "Syne", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
              {loading ? "…" : "Ja, löschen"}
            </button>
            <button onClick={() => setConfirm(false)} style={{ flex: 1, background: "none", border: `1px solid ${C.border}`, borderRadius: 6, padding: "10px", color: C.muted, fontFamily: "Syne", fontSize: 13, cursor: "pointer" }}>
              Abbrechen
            </button>
          </div>
        </div>
      );
    }

    function SettingsModal({ targets, profile, voiceLang, onSave, onClose, onDeleteAccount }) {
      const [form, setForm] = useState(() => ({
        kcal: String(targets.kcal), protein: String(targets.protein),
        carbs: String(targets.carbs), fat: String(targets.fat),
      }));
      const [pForm, setPForm] = useState({
        weight: String(profile?.weight || ""),
        goal: profile?.goal || "halten",
      });
      const [calculating, setCalculating] = useState(false);
      const [calcErr, setCalcErr] = useState(null);
      const [vlForm, setVlForm] = useState(voiceLang || "de");

      const calculate = async () => {
        const w = parseFloat(pForm.weight);
        if (!w || w <= 0) return;
        setCalculating(true); setCalcErr(null);
        try {
          const result = await apiCall("/api/calculate-macros", "POST", {
            weight: w, goal: pForm.goal,
            ...(profile?.gender ? { gender: profile.gender } : {}),
            ...(profile?.age    ? { age: profile.age }       : {}),
            ...(profile?.height ? { height: profile.height } : {}),
          });
          setForm({ kcal: String(result.kcal), protein: String(result.protein), carbs: String(result.carbs), fat: String(result.fat) });
        } catch (e) {
          setCalcErr("Berechnung fehlgeschlagen: " + e.message);
        }
        setCalculating(false);
      };

      const save = () => {
        const parsed = {};
        MACROS.forEach(m => parsed[m] = parseFloat(form[m]) || 0);
        const newProfile = { ...(profile || {}), weight: parseFloat(pForm.weight) || profile?.weight, goal: pForm.goal };
        onSave(parsed, newProfile, vlForm);
        onClose();
      };

      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "9px 10px", color: C.text, fontFamily: "Inter", fontSize: 14, outline: "none", flex: 1 };
      const goalOpts = [{ k: "abnehmen", l: "Abnehmen" }, { k: "halten", l: "Halten" }, { k: "aufbauen", l: "Aufbauen" }];

      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", zIndex: 100 }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#181818", borderRadius: "20px 20px 0 0", padding: "20px 16px", width: "100%", border: `1px solid ${C.border}`, paddingBottom: "calc(20px + env(safe-area-inset-bottom))", maxHeight: "92vh", overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 20 }}>
              <div style={{ fontFamily: "Syne", fontSize: 17, fontWeight: 800, color: C.text }}>Einstellungen</div>
              <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, fontSize: 20, cursor: "pointer", padding: "0 2px", lineHeight: 1 }}>✕</button>
            </div>

            <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Körperprofil</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontFamily: "Syne", fontSize: 13, color: C.text, width: 115, flexShrink: 0 }}>Gewicht</span>
                <input type="text" inputMode="decimal" value={pForm.weight} onChange={e => setPForm(p => ({ ...p, weight: e.target.value }))} placeholder="kg" style={inputStyle} />
                <Mono size={11} color={C.muted} style={{ width: 32 }}>kg</Mono>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontFamily: "Syne", fontSize: 13, color: C.text, width: 115, flexShrink: 0 }}>Ziel</span>
                <div style={{ display: "flex", gap: 6, flex: 1 }}>
                  {goalOpts.map(({ k, l }) => (
                    <button key={k} onClick={() => setPForm(p => ({ ...p, goal: k }))} style={{ flex: 1, background: pForm.goal === k ? C.accent : "#111", border: `1px solid ${pForm.goal === k ? C.accent : C.border}`, borderRadius: 6, padding: "8px 4px", color: pForm.goal === k ? "#000" : C.muted, fontFamily: "Syne", fontSize: 11, fontWeight: 700, cursor: "pointer" }}>{l}</button>
                  ))}
                </div>
              </div>
              <button onClick={calculate} disabled={calculating || !parseFloat(pForm.weight)} style={{ background: calculating ? C.soft : C.accent, border: "none", borderRadius: 8, padding: "10px 16px", color: calculating ? C.muted : "#000", fontFamily: "Syne", fontSize: 13, fontWeight: 700, cursor: calculating || !parseFloat(pForm.weight) ? "default" : "pointer", width: "100%" }}>
                {calculating ? "KI berechnet…" : "Makros von KI berechnen lassen →"}
              </button>
              {calcErr && <div style={{ fontFamily: "Syne", fontSize: 11, color: C.danger }}>{calcErr}</div>}
            </div>

            <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Tagesziele</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
              {MACROS.map(m => (
                <div key={m} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontFamily: "Syne", fontSize: 13, color: MC[m], width: 115, flexShrink: 0 }}>{LABELS[m]}</span>
                  <input type="text" inputMode="decimal" value={form[m]} onChange={e => setForm(p => ({ ...p, [m]: e.target.value }))} style={inputStyle} />
                  <Mono size={11} color={C.muted} style={{ width: 32 }}>{UNITS[m]}</Mono>
                </div>
              ))}
            </div>
            <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Spracheingabe-Sprache</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 20 }}>
              {LANG_OPTS.map(({ k, l }) => (
                <button key={k} onClick={() => setVlForm(k)} style={{ background: vlForm === k ? C.accent : "#111", border: `1px solid ${vlForm === k ? C.accent : C.border}`, borderRadius: 6, padding: "7px 12px", color: vlForm === k ? "#000" : C.muted, fontFamily: "Syne", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>{l}</button>
              ))}
            </div>

            <div style={{ display: "flex", gap: 8 }}>
              <Btn onClick={save} disabled={!MACROS.some(m => parseFloat(form[m]) > 0)} style={{ flex: 1 }}>Speichern</Btn>
              <Btn onClick={onClose} variant="ghost">Abbrechen</Btn>
            </div>

            <div style={{ marginTop: 28, paddingTop: 20, borderTop: `1px solid ${C.border}` }}>
              <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Account</div>
              {onDeleteAccount && <DeleteAccountButton onDelete={onDeleteAccount} />}
            </div>
            <div style={{ marginTop: 20, textAlign: "center" }}>
              <span style={{ fontFamily: "Inter", fontSize: 11, color: "#333", letterSpacing: 0.5 }}>makro v{APP_VERSION}</span>
            </div>
          </div>
        </div>
      );
    }

    function OnboardingModal({ onComplete }) {
      const [step, setStep] = useState(1);
      const [gender, setGender] = useState(null);
      const [age, setAge] = useState("");
      const [weight, setWeight] = useState("");
      const [height, setHeight] = useState("");
      const [targets, setTargets] = useState(null);

      const [selectedGoal, setSelectedGoal] = useState(null);

      const selectGoal = (goal) => {
        const t = calcMacroTargets(gender, parseFloat(age), parseFloat(weight), parseFloat(height), goal);
        setSelectedGoal(goal);
        setTargets(t);
        setStep(4);
      };

      const bodyValid = parseFloat(age) > 0 && parseFloat(weight) > 0 && parseFloat(height) > 0;
      const inStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", color: C.text, fontFamily: "Inter", fontSize: 18, outline: "none", flex: 1 };
      const bigBtn = (onClick, children, active = true) => (
        <button onClick={onClick} disabled={!active} style={{ background: active ? C.card : C.soft, border: `1px solid ${active ? C.border : "transparent"}`, borderRadius: 12, padding: "16px 20px", color: active ? C.text : C.muted, fontFamily: "Syne", fontSize: 15, fontWeight: 600, cursor: active ? "pointer" : "default", textAlign: "left", width: "100%" }}>
          {children}
        </button>
      );

      const wrap = (content) => (
        <div style={{ position: "fixed", inset: 0, background: C.bg, zIndex: 200, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "32px 24px", overflowY: "auto" }}>
          <div style={{ width: "100%", maxWidth: 400 }}>
            <div style={{ fontFamily: "Syne", fontSize: 26, fontWeight: 800, letterSpacing: -1, color: C.text, marginBottom: 2 }}>makro<span style={{ color: C.accent }}>.</span></div>
            {content}
          </div>
        </div>
      );

      if (step === 1) return wrap(<>
        <div style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 700, color: C.text, marginTop: 28, marginBottom: 8 }}>Willkommen!</div>
        <div style={{ fontFamily: "Syne", fontSize: 14, color: C.muted, marginBottom: 36, lineHeight: 1.7 }}>Ich berechne deine optimalen Tagesziele. Dauert nur 10 Sekunden.</div>
        <div style={{ fontFamily: "Syne", fontSize: 12, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Ich bin …</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {bigBtn(() => { setGender("m"); setStep(2); }, "Mann")}
          {bigBtn(() => { setGender("f"); setStep(2); }, "Frau")}
        </div>
      </>);

      if (step === 2) return wrap(<>
        <div style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 700, color: C.text, marginTop: 28, marginBottom: 28 }}>Deine Angaben</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
          {[
            { label: "Alter", unit: "Jahre", val: age, set: setAge },
            { label: "Gewicht", unit: "kg", val: weight, set: setWeight },
            { label: "Größe", unit: "cm", val: height, set: setHeight },
          ].map(({ label, unit, val, set }) => (
            <div key={label}>
              <div style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>{label}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <input type="text" inputMode="decimal" value={val} onChange={e => set(e.target.value)} placeholder="0" style={inStyle} />
                <span style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, width: 38 }}>{unit}</span>
              </div>
            </div>
          ))}
          <button onClick={() => setStep(3)} disabled={!bodyValid} style={{ background: bodyValid ? C.accent : C.soft, border: "none", borderRadius: 12, padding: "16px 20px", color: bodyValid ? "#000" : C.muted, fontFamily: "Syne", fontSize: 15, fontWeight: 700, cursor: bodyValid ? "pointer" : "default", marginTop: 8 }}>Weiter →</button>
        </div>
      </>);

      if (step === 3) return wrap(<>
        <div style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 700, color: C.text, marginTop: 28, marginBottom: 8 }}>Dein Ziel</div>
        <div style={{ fontFamily: "Syne", fontSize: 14, color: C.muted, marginBottom: 28 }}>Was möchtest du erreichen?</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {[
            { key: "abnehmen",  label: "Abnehmen",          sub: "−400 kcal Defizit" },
            { key: "halten",    label: "Gewicht halten",     sub: "ausgeglichene Ernährung" },
            { key: "aufbauen",  label: "Muskeln aufbauen",   sub: "+200 kcal Überschuss" },
          ].map(({ key, label, sub }) => (
            <button key={key} onClick={() => selectGoal(key)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 12, padding: "16px 20px", color: C.text, fontFamily: "Syne", fontSize: 15, fontWeight: 600, cursor: "pointer", textAlign: "left", width: "100%" }}>
              <div>{label}</div>
              <div style={{ fontFamily: "Inter", fontSize: 10, color: C.muted, marginTop: 4 }}>{sub}</div>
            </button>
          ))}
        </div>
      </>);

      return wrap(<>
        <div style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 700, color: C.text, marginTop: 28, marginBottom: 8 }}>Deine Tagesziele</div>
        <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, marginBottom: 24, lineHeight: 1.6 }}>Berechnet für dein Profil — du kannst sie jederzeit in den Einstellungen anpassen.</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 28 }}>
          {MACROS.map(m => (
            <div key={m} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", background: C.card, borderRadius: 10, padding: "14px 16px" }}>
              <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 600, color: MC[m] }}>{LABELS[m]}</span>
              <span style={{ fontFamily: "Inter", fontSize: 20, fontWeight: 700, color: C.text }}>{targets[m]}<span style={{ fontSize: 11, color: C.muted, marginLeft: 4 }}>{UNITS[m]}</span></span>
            </div>
          ))}
        </div>
        <button onClick={() => onComplete(targets, { gender, age: parseFloat(age), weight: parseFloat(weight), height: parseFloat(height), goal: selectedGoal })} style={{ background: C.accent, border: "none", borderRadius: 12, padding: "16px 20px", color: "#000", fontFamily: "Syne", fontSize: 15, fontWeight: 700, cursor: "pointer", width: "100%" }}>Übernehmen →</button>
      </>);
    }

    function AuthScreen({ onAuth, initialResetToken }) {
      const [mode, setMode] = useState(initialResetToken ? "reset" : "login");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [newPassword, setNewPassword] = useState("");
      const [newPassword2, setNewPassword2] = useState("");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState(null);
      const [pendingEmail, setPendingEmail] = useState(null);
      const [resendLoading, setResendLoading] = useState(false);
      const [resendDone, setResendDone] = useState(false);
      const [unverifiedEmail, setUnverifiedEmail] = useState(null);
      const [forgotDone, setForgotDone] = useState(false);
      const [resetDone, setResetDone] = useState(false);

      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", color: C.text, fontFamily: "Syne", fontSize: 15, outline: "none", width: "100%" };

      const goLogin = () => { setMode("login"); setErr(null); setNewPassword(""); setNewPassword2(""); };

      const submit = async () => {
        if (!email.trim() || !password) return;
        setLoading(true); setErr(null); setUnverifiedEmail(null);
        try {
          const data = await authApiCall(`/api/auth/${mode}`, "POST", { email: email.trim(), password });
          if (data.pending) { setPendingEmail(email.trim()); }
          else { saveAuth(data); onAuth(data); }
        } catch (e) {
          if (e.message === "email_not_verified" || e.message.includes("bestätige")) {
            setUnverifiedEmail(email.trim());
          } else { setErr(e.message); }
        }
        setLoading(false);
      };

      const submitForgot = async () => {
        if (!email.trim()) return;
        setLoading(true); setErr(null);
        try { await forgotPassword(email.trim()); setForgotDone(true); } catch { setErr("Fehler beim Senden."); }
        setLoading(false);
      };

      const submitReset = async () => {
        if (newPassword.length < 6) { setErr("Passwort mindestens 6 Zeichen"); return; }
        if (newPassword !== newPassword2) { setErr("Passwörter stimmen nicht überein"); return; }
        setLoading(true); setErr(null);
        try {
          await resetPassword(initialResetToken, newPassword);
          setResetDone(true);
          // URL-Parameter entfernen
          window.history.replaceState({}, "", window.location.pathname);
        } catch (e) { setErr(e.message); }
        setLoading(false);
      };

      const handleResend = async (emailAddr) => {
        setResendLoading(true); setResendDone(false);
        try { await resendVerification(emailAddr); setResendDone(true); } catch {}
        setResendLoading(false);
      };

      const logo = (
        <div style={{ fontFamily: "Syne", fontSize: 38, fontWeight: 800, letterSpacing: -1.5, color: C.text, marginBottom: 6 }}>
          makro<span style={{ color: C.accent }}>.</span>
        </div>
      );
      const wrap = (content) => (
        <div style={{ position: "fixed", inset: 0, background: C.bg, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
          <div style={{ minHeight: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "calc(env(safe-area-inset-top) + 24px) 24px calc(env(safe-area-inset-bottom) + 24px)", maxWidth: 500, margin: "0 auto" }}>
            {logo}{content}
          </div>
        </div>
      );

      if (pendingEmail) return wrap(<>
        <div style={{ fontSize: 52, margin: "28px 0 20px" }}>📬</div>
        <div style={{ fontFamily: "Syne", fontSize: 18, fontWeight: 700, color: C.text, marginBottom: 10, textAlign: "center" }}>E-Mail bestätigen</div>
        <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, textAlign: "center", lineHeight: 1.7, marginBottom: 32, maxWidth: 300 }}>
          Wir haben eine Bestätigungs-E-Mail an <span style={{ color: C.text }}>{pendingEmail}</span> gesendet.
        </div>
        {resendDone
          ? <div style={{ fontFamily: "Syne", fontSize: 13, color: C.carbs }}>✓ E-Mail erneut gesendet</div>
          : <button onClick={() => handleResend(pendingEmail)} disabled={resendLoading} style={{ background: "none", border: "none", color: C.muted, fontFamily: "Syne", fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>
              {resendLoading ? "Sende…" : "E-Mail erneut senden"}
            </button>
        }
        <button onClick={() => { setPendingEmail(null); goLogin(); }} style={{ background: "none", border: "none", color: "#444", fontFamily: "Syne", fontSize: 12, cursor: "pointer", marginTop: 16 }}>Zurück zum Login</button>
      </>);

      if (unverifiedEmail) return wrap(<>
        <div style={{ fontSize: 52, margin: "28px 0 20px" }}>✉️</div>
        <div style={{ fontFamily: "Syne", fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 10, textAlign: "center" }}>E-Mail noch nicht bestätigt</div>
        <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, textAlign: "center", lineHeight: 1.7, marginBottom: 32, maxWidth: 300 }}>
          Bitte klick auf den Link in der Bestätigungs-E-Mail an <span style={{ color: C.text }}>{unverifiedEmail}</span>.
        </div>
        {resendDone
          ? <div style={{ fontFamily: "Syne", fontSize: 13, color: C.carbs }}>✓ E-Mail erneut gesendet</div>
          : <Btn onClick={() => handleResend(unverifiedEmail)} disabled={resendLoading} small>{resendLoading ? "Sende…" : "Neue Bestätigungs-E-Mail senden"}</Btn>
        }
        <button onClick={() => setUnverifiedEmail(null)} style={{ background: "none", border: "none", color: "#444", fontFamily: "Syne", fontSize: 12, cursor: "pointer", marginTop: 16 }}>Zurück zum Login</button>
      </>);

      // Passwort vergessen
      if (mode === "forgot") return wrap(<>
        <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, marginBottom: 36 }}>Passwort zurücksetzen</div>
        {forgotDone ? (
          <>
            <div style={{ fontSize: 48, marginBottom: 20 }}>📬</div>
            <div style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 10, textAlign: "center" }}>E-Mail gesendet</div>
            <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, textAlign: "center", lineHeight: 1.7, marginBottom: 32, maxWidth: 300 }}>
              Falls ein Konto mit dieser Adresse existiert, haben wir einen Reset-Link gesendet. Gültig für 1 Stunde.
            </div>
            <button onClick={goLogin} style={{ background: "none", border: "none", color: C.muted, fontFamily: "Syne", fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>Zurück zum Login</button>
          </>
        ) : (
          <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 12 }}>
            <input type="email" placeholder="E-Mail-Adresse" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && submitForgot()} style={inputStyle} />
            {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}
            <Btn onClick={submitForgot} disabled={loading || !email.trim()} full>{loading ? "…" : "Reset-Link senden →"}</Btn>
            <button onClick={goLogin} style={{ background: "none", border: "none", color: C.muted, fontFamily: "Syne", fontSize: 13, cursor: "pointer", padding: 8, marginTop: 4 }}>Zurück zum Login</button>
          </div>
        )}
      </>);

      // Passwort zurücksetzen (via Link)
      if (mode === "reset") return wrap(<>
        <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, marginBottom: 36 }}>Neues Passwort vergeben</div>
        {resetDone ? (
          <>
            <div style={{ fontSize: 48, marginBottom: 20 }}>✓</div>
            <div style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: C.carbs, marginBottom: 20, textAlign: "center" }}>Passwort geändert</div>
            <Btn onClick={goLogin} full>Zum Login →</Btn>
          </>
        ) : (
          <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 12 }}>
            <input type="password" placeholder="Neues Passwort" value={newPassword} onChange={e => setNewPassword(e.target.value)} style={inputStyle} />
            <input type="password" placeholder="Passwort bestätigen" value={newPassword2} onChange={e => setNewPassword2(e.target.value)} onKeyDown={e => e.key === "Enter" && submitReset()} style={inputStyle} />
            {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}
            <Btn onClick={submitReset} disabled={loading || !newPassword || !newPassword2} full>{loading ? "…" : "Passwort speichern →"}</Btn>
          </div>
        )}
      </>);

      return wrap(<>
        <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, marginBottom: 44 }}>
          {mode === "login" ? "Willkommen zurück" : "Konto erstellen"}
        </div>
        <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 12 }}>
          <input type="email" placeholder="E-Mail-Adresse" value={email} onChange={e => setEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} style={inputStyle} />
          <input type="password" placeholder="Passwort" value={password} onChange={e => setPassword(e.target.value)} onKeyDown={e => e.key === "Enter" && submit()} style={inputStyle} />
          {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}
          <Btn onClick={submit} disabled={loading || !email.trim() || !password} full>
            {loading ? "…" : mode === "login" ? "Anmelden →" : "Registrieren →"}
          </Btn>
          <button onClick={() => { setMode(m => m === "login" ? "register" : "login"); setErr(null); }} style={{ background: "none", border: "none", color: C.muted, fontFamily: "Syne", fontSize: 13, cursor: "pointer", padding: 8, marginTop: 4 }}>
            {mode === "login" ? "Noch kein Konto? Registrieren" : "Schon ein Konto? Anmelden"}
          </button>
          {mode === "login" && (
            <button onClick={() => { setMode("forgot"); setErr(null); }} style={{ background: "none", border: "none", color: "#444", fontFamily: "Syne", fontSize: 12, cursor: "pointer", padding: "4px 8px" }}>
              Passwort vergessen?
            </button>
          )}
        </div>
      </>);
    }

    const foodFormInputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: "Inter", fontSize: 14, outline: "none", width: "100%" };

    function FoodForm({ form, setForm, onSave, onCancel, saveLabel, saving }) {
      return (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          <div>
            <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 4 }}>Name</div>
            <input value={form.name} onChange={e => setForm(p => ({ ...p, name: e.target.value }))}
              placeholder="z.B. Protein Shake Vanille" style={{ ...foodFormInputStyle, fontFamily: "Syne" }} />
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {[["kcal_100", "kcal", C.kcal], ["protein_100", "Eiweiß", C.protein], ["carbs_100", "Kohlenhydrate", C.carbs], ["fat_100", "Fett", C.fat]].map(([key, label, color]) => (
              <div key={key}>
                <div style={{ fontFamily: "Syne", fontSize: 10, color, marginBottom: 4 }}>{label} / 100g</div>
                <input type="text" inputMode="decimal" value={form[key]} onChange={e => setForm(p => ({ ...p, [key]: e.target.value }))}
                  placeholder="0" style={foodFormInputStyle} />
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn onClick={onSave} disabled={saving || !form.name.trim() || !form.kcal_100} style={{ flex: 1 }}>{saving ? "…" : saveLabel}</Btn>
            <Btn onClick={onCancel} variant="ghost">Abbrechen</Btn>
          </div>
        </div>
      );
    }

    function UserFoodsTab({ userFoods, onAdd, onUpdate, onDelete }) {
      const [showAdd, setShowAdd] = useState(false);
      const [addForm, setAddForm] = useState({ name: "", kcal_100: "", protein_100: "", carbs_100: "", fat_100: "" });
      const [editId, setEditId] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [saving, setSaving] = useState(false);
      const [search, setSearch] = useState("");

      const startEdit = (f) => {
        setEditId(f.id);
        setEditForm({ name: f.name, kcal_100: String(parseFloat(f.kcal_100)), protein_100: String(parseFloat(f.protein_100)), carbs_100: String(parseFloat(f.carbs_100)), fat_100: String(parseFloat(f.fat_100)) });
      };

      const saveEdit = async () => {
        setSaving(true);
        await onUpdate(editId, { name: editForm.name, kcal_100: parseFloat(editForm.kcal_100)||0, protein_100: parseFloat(editForm.protein_100)||0, carbs_100: parseFloat(editForm.carbs_100)||0, fat_100: parseFloat(editForm.fat_100)||0 });
        setEditId(null); setSaving(false);
      };

      const saveAdd = async () => {
        if (!addForm.name.trim() || !addForm.kcal_100) return;
        setSaving(true);
        await onAdd({ name: addForm.name.trim(), kcal_100: parseFloat(addForm.kcal_100)||0, protein_100: parseFloat(addForm.protein_100)||0, carbs_100: parseFloat(addForm.carbs_100)||0, fat_100: parseFloat(addForm.fat_100)||0 });
        setAddForm({ name: "", kcal_100: "", protein_100: "", carbs_100: "", fat_100: "" });
        setShowAdd(false); setSaving(false);
      };

      const sorted = [...userFoods].sort((a, b) => a.name.localeCompare(b.name, "de", { sensitivity: "base" }));
      const filtered = search.trim()
        ? sorted.filter(f => f.name.toLowerCase().includes(search.trim().toLowerCase()))
        : sorted;

      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <SectionLabel>Eigene Lebensmittel ({userFoods.length})</SectionLabel>
            {!showAdd && <Btn onClick={() => { setShowAdd(true); setEditId(null); }} small variant="ghost">+ Hinzufügen</Btn>}
          </div>

          {userFoods.length > 0 && (
            <div style={{ position: "relative" }}>
              <input
                type="text"
                placeholder="Suchen…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                style={{ background: "#111", border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 36px 9px 12px", color: C.text, fontFamily: "Syne", fontSize: 14, outline: "none", width: "100%" }}
              />
              {search && (
                <button onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: C.muted, fontSize: 16, cursor: "pointer", padding: 2 }}>✕</button>
              )}
            </div>
          )}

          {showAdd && (
            <Card accent style={{ padding: 14 }}>
              <div style={{ fontFamily: "Syne", fontSize: 12, color: C.accent, marginBottom: 10 }}>Neues Lebensmittel</div>
              <FoodForm form={addForm} setForm={setAddForm} onSave={saveAdd} onCancel={() => setShowAdd(false)} saveLabel="Speichern ✓" saving={saving} />
            </Card>
          )}

          {userFoods.length === 0 && !showAdd && (
            <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.9 }}>
              Noch keine eigenen Lebensmittel.<br />Füge Produkte hinzu – sie werden<br />beim Tracken automatisch zuerst<br />verwendet.
            </div>
          )}

          {filtered.length === 0 && search.trim() && (
            <div style={{ textAlign: "center", padding: 24, color: C.muted, fontFamily: "Syne", fontSize: 13 }}>
              Kein Treffer für „{search}"
            </div>
          )}

          {filtered.map(f => (
            <Card key={f.id} onClick={() => editId !== f.id && (startEdit(f), setShowAdd(false))} style={{ padding: "12px 14px", cursor: editId === f.id ? "default" : "pointer" }}>
              {editId === f.id ? (
                <FoodForm form={editForm} setForm={setEditForm} onSave={saveEdit} onCancel={() => setEditId(null)} saveLabel="Speichern ✓" saving={saving} />
              ) : (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text, flex: 1 }}>{f.name}</span>
                    <button onClick={ev => { ev.stopPropagation(); onDelete(f.id); }} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 16, padding: 4 }}>✕</button>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                    {[["kcal", "kcal", C.kcal], ["protein_100", "Eiweiß", C.protein], ["carbs_100", "KH", C.carbs], ["fat_100", "Fett", C.fat]].map(([key, label, color]) => (
                      <div key={key} style={{ textAlign: "center" }}>
                        <Mono size={14} color={color} bold>{Math.round(parseFloat(f[key === "kcal" ? "kcal_100" : key]) * 10) / 10}</Mono>
                        <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>{label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginTop: 6 }}>pro 100g</div>
                </>
              )}
            </Card>
          ))}
        </div>
      );
    }

    const TABS = [
      { id: "input",     label: "Eingabe",  sym: "✦" },
      { id: "today",     label: "Heute",    sym: "◉" },
      { id: "history",   label: "Verlauf",  sym: "◈" },
      { id: "mealprep",  label: "Mealprep", sym: "⬡" },
      { id: "userfoods", label: "Eigene",   sym: "◫" },
    ];

    function App() {
      const [auth, setAuth] = useState(() => getAuth());
      const [tab, setTab] = useState("input");
      const [targets, setTargets] = useState(() => store.get("mk_targets") || DEFAULT_TARGETS);
      const [entries, setEntries] = useState([]);
      const [recipes, setRecipes] = useState([]);
      const [archive, setArchive] = useState([]);
      const [settings, setSettings] = useState(false);
      const [onboarding, setOnboarding] = useState(false);
      const [profile, setProfile] = useState(() => store.get("mk_profile") || null);
      const [voiceLang, setVoiceLang] = useState(() => store.get("mk_voicelang") || "de");
      const [editingEntry, setEditingEntry] = useState(null);
      const [userFoods, setUserFoods] = useState([]);
      const [burnedToday, setBurnedToday] = useState(0);

      // Load all data on auth
      useEffect(() => {
        if (!auth) return;

        // Load today's entries
        loadDiaryEntries(todayStr())
          .then(r => setEntries(r))
          .catch(() => {});

        // Load today's burned kcal
        loadBodyWeightRange(todayStr(), todayStr())
          .then(r => { if (r[0]?.burned_kcal) setBurnedToday(parseFloat(r[0].burned_kcal) || 0); })
          .catch(() => {});

        // Load recipes
        loadRecipes()
          .then(r => setRecipes(r))
          .catch(() => setRecipes(store.get("mk_recipes") || []));

        // Load archive
        loadArchive()
          .then(r => setArchive(r))
          .catch(() => setArchive(store.get("mk_mealprep_archive") || []));

        // Load personal foods
        loadUserFoods()
          .then(r => setUserFoods(r))
          .catch(() => {});

        // Load settings/targets
        loadSettings()
          .then(data => {
            if (data?.targets) { setTargets(data.targets); store.set("mk_targets", data.targets); }
            if (data?.profile) { setProfile(data.profile); store.set("mk_profile", data.profile); }
            if (data?.voiceLang) { setVoiceLang(data.voiceLang); store.set("mk_voicelang", data.voiceLang); }
            if (!data?.onboarding_done) setOnboarding(true);
          })
          .catch(() => {});
      }, [auth]);

      const handleAuth = (data) => { setAuth(data); };

      const logout = () => {
        clearAuth();
        setAuth(null);
        setRecipes([]);
        setEntries([]);
        setArchive([]);
      };

      const handleDeleteAccount = async () => {
        await deleteAccount();
        logout();
      };

      // Entry functions
      const addEntryForDate = async (date, entry) => {
        try {
          const saved = await saveDiaryEntry(date, entry);
          loadUserFoods().then(r => setUserFoods(r)).catch(() => {});
          return saved;
        } catch { return entry; }
      };

      const addEntry = async (entry) => {
        try {
          const saved = await saveDiaryEntry(todayStr(), entry);
          setEntries(p => [...p, saved]);
          // Persönliche DB im Hintergrund aktualisieren
          loadUserFoods().then(r => setUserFoods(r)).catch(() => {});
        } catch {
          setEntries(p => [...p, entry]);
        }
        setTab("today");
      };

      const deleteEntry = async (id) => {
        setEntries(p => p.filter(e => e.id !== id));
        deleteDiaryEntry(id).catch(() => {});
      };

      const editEntry = async (updated) => {
        try {
          const saved = await updateDiaryEntry(updated.id, updated);
          setEntries(p => p.map(e => e.id === saved.id ? saved : e));
        } catch {
          setEntries(p => p.map(e => e.id === updated.id ? updated : e));
        }
        setEditingEntry(null);
      };

      // Recipe functions
      const addRecipe = async (recipe) => {
        try {
          const saved = await saveRecipeToServer(recipe);
          setRecipes(p => [...p, saved]);
        } catch {
          const local = { ...recipe, id: Date.now() };
          setRecipes(p => [...p, local]);
        }
      };

      const removeRecipe = async (id) => {
        setRecipes(p => p.filter(r => r.id !== id));
        deleteRecipeFromServer(id).catch(() => {});
      };

      const editRecipe = async (id, data) => {
        try {
          const saved = await updateRecipeOnServer(id, data);
          setRecipes(p => p.map(r => r.id === saved.id ? saved : r));
          return saved;
        } catch {
          const updated = { ...data, id };
          setRecipes(p => p.map(r => r.id === id ? updated : r));
          return updated;
        }
      };

      // Archive functions
      const archiveRecipe = async (recipe) => {
        const withTs = { ...recipe, archived_at: new Date().toISOString() };
        try {
          const saved = await saveToArchive(withTs);
          setArchive(p => [...p, saved]);
        } catch {
          setArchive(p => [...p, withTs]);
        }
        removeRecipe(recipe.id);
      };

      // Persönliche Lebensmittel
      const addUserFood = async (food) => {
        const saved = await addUserFoodAPI(food);
        setUserFoods(p => [saved, ...p]);
      };
      const updateUserFood = async (id, food) => {
        const saved = await updateUserFoodAPI(id, food);
        setUserFoods(p => p.map(f => f.id === saved.id ? saved : f));
      };
      const deleteUserFood = async (id) => {
        setUserFoods(p => p.filter(f => f.id !== id));
        deleteUserFoodAPI(id).catch(() => {});
      };

      // Settings
      const updateSettings = (t, p, vl) => {
        setTargets(t);
        store.set("mk_targets", t);
        if (p) { setProfile(p); store.set("mk_profile", p); }
        if (vl) { setVoiceLang(vl); store.set("mk_voicelang", vl); }
        saveSettings(t, { ...(p ? { profile: p } : {}), ...(vl ? { voiceLang: vl } : {}) }).catch(() => {});
      };

      const [slideDir, setSlideDir] = useState("right");
      const [outTab, setOutTab] = useState(null);
      const swipeRef = useRef({});
      const TAB_IDS = TABS.map(t => t.id);
      const changeTab = (newId) => {
        if (newId === tab || outTab) return;
        const dir = TAB_IDS.indexOf(newId) > TAB_IDS.indexOf(tab) ? "right" : "left";
        setSlideDir(dir);
        setOutTab(tab);
        setTab(newId);
      };
      const onAnimEnd = () => setOutTab(null);
      const onTouchStart = (e) => {
        swipeRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      };
      const onTouchEnd = (e) => {
        const dx = e.changedTouches[0].clientX - swipeRef.current.x;
        const dy = e.changedTouches[0].clientY - swipeRef.current.y;
        if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;
        const idx = TAB_IDS.indexOf(tab);
        if (dx < 0 && idx < TAB_IDS.length - 1) changeTab(TAB_IDS[idx + 1]);
        if (dx > 0 && idx > 0) changeTab(TAB_IDS[idx - 1]);
      };

      const resetToken = new URLSearchParams(window.location.search).get("reset");
      if (!auth || resetToken) return <AuthScreen onAuth={handleAuth} initialResetToken={resetToken} />;

      if (onboarding) return (
        <OnboardingModal onComplete={(t, p) => {
          setTargets(t);
          store.set("mk_targets", t);
          if (p) { setProfile(p); store.set("mk_profile", p); }
          saveSettings(t, { onboarding_done: true, ...(p ? { profile: p } : {}) }).catch(() => {});
          setOnboarding(false);
        }} />
      );

      return (
        <div style={{ height: "100vh", height: "-webkit-fill-available", background: C.bg, display: "flex", flexDirection: "column", color: C.text, maxWidth: 500, margin: "0 auto" }}>
          <div style={{ height: "env(safe-area-inset-top)", background: C.bg, flexShrink: 0 }} />
          <div style={{ padding: "12px 16px 10px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <div>
              <div onClick={() => setTab("input")} style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 800, letterSpacing: -1, color: C.text, cursor: "pointer" }}>
                makro<span style={{ color: C.accent }}>.</span>
              </div>
              <Mono size={10} color={C.muted}>{new Date().toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long" })}</Mono>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={logout} title={auth?.user?.email} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", color: C.muted, fontFamily: "Syne", fontSize: 12 }}>Logout</button>
              <button onClick={() => setSettings(true)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", color: C.muted, fontSize: 16 }}>⚙</button>
            </div>
          </div>
          <div style={{ flex: 1, overflow: "hidden", position: "relative" }} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
            {/* InputTab always mounted — shown as positioned panel when active or animating */}
            <div style={tab === "input" || outTab === "input" ? { position: "absolute", inset: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", zIndex: 1 } : { display: "none" }}
              className={tab === "input" && outTab ? `slide-from-${slideDir}` : outTab === "input" ? `slide-to-${slideDir === "right" ? "left" : "right"}` : ""}
              onAnimationEnd={outTab === "input" ? onAnimEnd : undefined}>
              <InputTab recipes={recipes} onSave={addEntry} voiceLang={voiceLang} userFoods={userFoods} />
            </div>
            {/* Incoming non-input tab */}
            {tab !== "input" && (
              <div key={"in-" + tab} style={{ position: "absolute", inset: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", zIndex: 1 }}
                className={outTab ? `slide-from-${slideDir}` : ""}>
                {tab === "today"     && <TodayTab entries={entries} targets={targets} onDelete={deleteEntry} onEdit={e => setEditingEntry(e)} burnedKcal={burnedToday} onSaveBurned={async (v) => { await saveBodyWeightAPI(todayStr(), null, v); setBurnedToday(v); }} />}
                {tab === "mealprep"  && <MealprepTab recipes={recipes} onAdd={addRecipe} onEdit={editRecipe} onDelete={removeRecipe} onArchive={archiveRecipe} archive={archive} voiceLang={voiceLang} userFoods={userFoods} />}
                {tab === "history"   && <HistoryTab targets={targets} loadRange={loadDiaryRange} loadDay={loadDiaryEntries} onDelete={deleteEntry} updateEntry={updateDiaryEntry} loadBodyWeights={loadBodyWeightRange} saveBodyWeight={saveBodyWeightAPI} onAdd={addEntryForDate} recipes={recipes} userFoods={userFoods} voiceLang={voiceLang} />}
                {tab === "userfoods" && <UserFoodsTab userFoods={userFoods} onAdd={addUserFood} onUpdate={updateUserFood} onDelete={deleteUserFood} />}
              </div>
            )}
            {/* Outgoing non-input tab */}
            {outTab && outTab !== "input" && (
              <div key={"out-" + outTab} style={{ position: "absolute", inset: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", zIndex: 1 }}
                className={`slide-to-${slideDir === "right" ? "left" : "right"}`}
                onAnimationEnd={onAnimEnd}>
                {outTab === "today"     && <TodayTab entries={entries} targets={targets} onDelete={deleteEntry} onEdit={e => setEditingEntry(e)} burnedKcal={burnedToday} onSaveBurned={async (v) => { await saveBodyWeightAPI(todayStr(), null, v); setBurnedToday(v); }} />}
                {outTab === "mealprep"  && <MealprepTab recipes={recipes} onAdd={addRecipe} onEdit={editRecipe} onDelete={removeRecipe} onArchive={archiveRecipe} archive={archive} voiceLang={voiceLang} userFoods={userFoods} />}
                {outTab === "history"   && <HistoryTab targets={targets} loadRange={loadDiaryRange} loadDay={loadDiaryEntries} onDelete={deleteEntry} updateEntry={updateDiaryEntry} loadBodyWeights={loadBodyWeightRange} saveBodyWeight={saveBodyWeightAPI} onAdd={addEntryForDate} recipes={recipes} userFoods={userFoods} voiceLang={voiceLang} />}
                {outTab === "userfoods" && <UserFoodsTab userFoods={userFoods} onAdd={addUserFood} onUpdate={updateUserFood} onDelete={deleteUserFood} />}
              </div>
            )}
          </div>
          <div style={{ display: "flex", borderTop: `1px solid ${C.border}`, background: C.bg, flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom)" }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => changeTab(t.id)} style={{ flex: 1, padding: "10px 0 12px", background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <span style={{ fontSize: 16, lineHeight: 1, display: "block", textAlign: "center", color: tab === t.id ? C.accent : C.soft }}>{t.sym}</span>
                <span style={{ fontFamily: "Syne", fontSize: 9, lineHeight: 1, display: "block", textAlign: "center", fontWeight: tab === t.id ? 700 : 400, color: tab === t.id ? C.accent : C.muted, textTransform: "uppercase", letterSpacing: 0.6 }}>{t.label}</span>
              </button>
            ))}
          </div>
          {settings && <SettingsModal targets={targets} profile={profile} voiceLang={voiceLang} onSave={(t, p, vl) => updateSettings(t, p, vl)} onClose={() => setSettings(false)} onDeleteAccount={handleDeleteAccount} />}
          {editingEntry && <EditEntryModal entry={editingEntry} onSave={editEntry} onClose={() => setEditingEntry(null)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js", { scope: "./" }).catch(() => {});
    }
  </script>
</body>
</html>
