  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body, #root { height: 100%; height: -webkit-fill-available; background: #0c0c0c; }
    body { overflow: hidden; }
    textarea { resize: none; -webkit-appearance: none; }
    input { -webkit-appearance: none; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .pulsing { animation: pulse 1.4s ease infinite; }

<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const C = {
      bg: "#0c0c0c", card: "#161616", border: "#222", accent: "#f59e0b",
      text: "#efefef", muted: "#555", soft: "#2a2a2a",
      protein: "#60a5fa", carbs: "#34d399", fat: "#f87171", kcal: "#f59e0b",
    };
    const MACROS = ["kcal", "protein", "carbs", "fat"];
    const LABELS = { kcal: "Kalorien", protein: "Eiweiß", carbs: "Kohlenhydrate", fat: "Fett" };
    const UNITS = { kcal: "kcal", protein: "g", carbs: "g", fat: "g" };
    const MC = { kcal: C.kcal, protein: C.protein, carbs: C.carbs, fat: C.fat };
    const DEFAULT_TARGETS = { kcal: 2500, protein: 180, carbs: 250, fat: 80 };

    const todayStr = () => new Date().toISOString().split("T")[0];
    const dayKey = (d) => `mk_day_${d}`;

    const store = {
      get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    // ── Backend-Konfiguration ──────────────────────────────────────
    const BACKEND_URL    = "https://makro-backend-production.up.railway.app";
    const BACKEND_SECRET = "e824810bc66e6e56ceb2ec780a3707e29652ccd71fac842a9b108bf113eea6ea";

    // Auth-State (token + user)
    const getAuth  = () => store.get("mk_auth");
    const saveAuth = (data) => store.set("mk_auth", data);
    const clearAuth = () => localStorage.removeItem("mk_auth");

    // API-Call mit JWT (für alle /api/* außer /api/auth/*)
    async function apiCall(path, method = "GET", body = null) {
      const auth = getAuth();
      const opts = {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {}),
        },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(BACKEND_URL + path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // Auth-API-Call mit APP_SECRET (nur für /api/auth/register + /api/auth/login)
    async function authApiCall(path, method = "GET", body = null) {
      const opts = {
        method,
        headers: { "Content-Type": "application/json", "x-api-key": BACKEND_SECRET },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(BACKEND_URL + path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    async function resendVerification(email) {
      return authApiCall("/api/auth/resend-verification", "POST", { email });
    }

    // Freitext analysieren → Makros vom Backend
    async function analyzeMeal(text, recipes) {
      return apiCall("/api/analyze", "POST", { text, recipes });
    }

    // Rezept-Zutaten analysieren → Makros vom Backend
    async function analyzeRecipe(text) {
      return apiCall("/api/analyze-recipe", "POST", { text });
    }

    async function lookupBarcode(barcode) {
      return apiCall("/api/barcode", "POST", { barcode });
    }

    // Rezepte vom Server laden (userId kommt aus JWT)
    async function loadRecipes() {
      return apiCall("/api/recipes");
    }

    // Rezept auf Server speichern
    async function saveRecipeToServer(recipe) {
      return apiCall("/api/recipes", "POST", recipe);
    }

    // Rezept vom Server löschen
    async function deleteRecipeFromServer(id) {
      return apiCall(`/api/recipes/${id}`, "DELETE");
    }

    // Diary entries
    async function loadDiaryEntries(date) {
      return apiCall(`/api/diary?date=${date}`);
    }
    async function loadDiaryRange(from, to) {
      return apiCall(`/api/diary?from=${from}&to=${to}`);
    }
    async function saveDiaryEntry(date, entry) {
      return apiCall("/api/diary", "POST", { date, entry });
    }
    async function deleteDiaryEntry(id) {
      return apiCall(`/api/diary/${id}`, "DELETE");
    }

    // Mealprep archive
    async function loadArchive() {
      return apiCall("/api/archive");
    }
    async function saveToArchive(recipe) {
      return apiCall("/api/archive", "POST", { recipe });
    }

    // User settings
    async function loadSettings() {
      return apiCall("/api/settings");
    }
    async function saveSettings(targets) {
      return apiCall("/api/settings", "POST", { targets });
    }

    function sumEntries(entries) {
      return entries.reduce((a, e) => ({
        kcal: a.kcal + e.totals.kcal, protein: a.protein + e.totals.protein,
        carbs: a.carbs + e.totals.carbs, fat: a.fat + e.totals.fat,
      }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
    }

    const Mono = ({ children, size = 15, color = C.text, bold }) => (
      <span style={{ fontFamily: "DM Mono, monospace", fontSize: size, color, fontWeight: bold ? 500 : 400 }}>
        {children}
      </span>
    );

    const MacroBar = ({ label, current, target, color, unit }) => {
      const pct = Math.min((current / target) * 100, 100);
      const over = current > target;
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, alignItems: "baseline" }}>
            <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>{label}</span>
            <div style={{ display: "flex", gap: 4, alignItems: "baseline" }}>
              <Mono size={14} color={over ? C.fat : color} bold>{Math.round(current)}</Mono>
              <Mono size={10} color={C.muted}> / {target}{unit}</Mono>
            </div>
          </div>
          <div style={{ height: 3, background: "#1e1e1e", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", background: over ? C.fat : color, borderRadius: 2, transition: "width 0.5s ease" }} />
          </div>
        </div>
      );
    };

    const Btn = ({ children, onClick, variant = "primary", disabled, small, full, style: sx }) => {
      const base = { fontFamily: "Syne", fontWeight: 700, borderRadius: 8, border: "none", cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.45 : 1, padding: small ? "8px 14px" : "12px 20px", fontSize: small ? 13 : 14, width: full ? "100%" : undefined, transition: "opacity 0.15s", ...sx };
      const v = { primary: { background: C.accent, color: "#000" }, ghost: { background: "transparent", color: C.text, border: `1px solid ${C.border}` }, danger: { background: "transparent", color: C.fat, border: `1px solid #f8717128` } };
      return <button onClick={onClick} disabled={disabled} style={{ ...base, ...v[variant] }}>{children}</button>;
    };

    const Card = ({ children, accent, style: sx }) => (
      <div style={{ background: C.card, borderRadius: 12, border: `1px solid ${accent ? C.accent + "35" : C.border}`, ...sx }}>
        {children}
      </div>
    );

    const SectionLabel = ({ children }) => (
      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10 }}>{children}</div>
    );

    function BarcodeScanner({ onScan, onClose }) {
      const scannerRef = useRef(null);

      useEffect(() => {
        let done = false;
        const scanner = new Html5Qrcode("barcode-reader-div");
        scannerRef.current = scanner;

        const formats = [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8,
          Html5QrcodeSupportedFormats.UPC_A,
          Html5QrcodeSupportedFormats.UPC_E,
          Html5QrcodeSupportedFormats.CODE_128,
          Html5QrcodeSupportedFormats.CODE_39,
          Html5QrcodeSupportedFormats.QR_CODE,
        ];

        scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 280, height: 110 }, formatsToSupport: formats },
          (text) => {
            if (done) return;
            done = true;
            scanner.stop().catch(() => {}).finally(() => onScan(text));
          },
          () => {}
        ).catch(() => { if (!done) onClose(); });

        return () => {
          done = true;
          scanner.stop().catch(() => {});
        };
      }, []);

      return (
        <div style={{ position: "fixed", inset: 0, background: "#000", zIndex: 200, display: "flex", flexDirection: "column" }}>
          <div style={{ padding: "16px 16px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", flexShrink: 0 }}>
            <span style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: "#fff" }}>Barcode scannen</span>
            <button onClick={onClose} style={{ background: "none", border: "none", color: "#fff", fontSize: 24, padding: 4, cursor: "pointer" }}>✕</button>
          </div>
          <div id="barcode-reader-div" style={{ flex: 1, overflow: "hidden" }} />
          <div style={{ padding: "16px", textAlign: "center", color: "#555", fontFamily: "Syne", fontSize: 13, flexShrink: 0 }}>
            Halte den Barcode vor die Kamera
          </div>
        </div>
      );
    }

    function InputTab({ recipes, onSave }) {
      const [text, setText] = useState("");
      const [loading, setLoading] = useState(false);
      const [items, setItems] = useState([]);
      const [err, setErr] = useState(null);
      const [listening, setListening] = useState(false);
      const recognitionRef = useRef(null);
      const [scanning, setScanning] = useState(false);
      const [barcodeLoading, setBarcodeLoading] = useState(false);
      const [scannedProduct, setScannedProduct] = useState(null);
      const [barcodeWeight, setBarcodeWeight] = useState("100");

      const toggleVoice = () => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { setErr("Spracheingabe nicht unterstützt. Bitte Safari verwenden."); return; }
        if (listening) { recognitionRef.current?.stop(); setListening(false); return; }
        const r = new SR();
        r.lang = "de-DE"; r.continuous = true; r.interimResults = false;
        r.onresult = (e) => { const t = Array.from(e.results).slice(e.resultIndex).map(r => r[0].transcript).join(", "); setText(p => p ? p + ", " + t : t); };
        r.onerror = () => { setListening(false); setErr("Spracheingabe fehlgeschlagen."); };
        r.onend = () => setListening(false);
        recognitionRef.current = r;
        r.start(); setListening(true);
      };

      const handleBarcodeScan = async (barcode) => {
        setScanning(false);
        setBarcodeLoading(true);
        setErr(null);
        try {
          const data = await lookupBarcode(barcode);
          if (data.found) {
            setScannedProduct(data);
            setBarcodeWeight("100");
          } else {
            setErr(`Produkt nicht gefunden (${barcode}). Bitte manuell eingeben.`);
          }
        } catch (e) {
          setErr("Barcode-Suche fehlgeschlagen: " + e.message);
        }
        setBarcodeLoading(false);
      };

      const addBarcodeItem = () => {
        if (!scannedProduct) return;
        const w = parseFloat(barcodeWeight);
        if (!w || w <= 0) return;
        const p = scannedProduct;
        const item = {
          name_de: p.name_de,
          name_en: p.name_en || p.name_de,
          weight_g: w,
          kcal:    Math.round(p.kcal_100    * w / 100 * 10) / 10,
          protein: Math.round(p.protein_100 * w / 100 * 10) / 10,
          carbs:   Math.round(p.carbs_100   * w / 100 * 10) / 10,
          fat:     Math.round(p.fat_100     * w / 100 * 10) / 10,
          source: p.source,
          found: true,
        };
        setItems(prev => [...prev, item]);
        setScannedProduct(null);
        setBarcodeWeight("100");
      };

      const analyze = async () => {
        if (!text.trim()) return;
        setLoading(true); setErr(null); setItems([]);
        try {
          const data = await analyzeMeal(text, recipes);
          setItems(data.items || []);
        } catch (e) { setErr("Analyse fehlgeschlagen: " + e.message); }
        setLoading(false);
      };

      const update = (i, field, val) => setItems(p => p.map((it, idx) => idx === i ? { ...it, [field]: parseFloat(val) || 0 } : it));
      const totals = items.reduce((a, it) => ({ kcal: a.kcal + (it.kcal || it.calories || 0), protein: a.protein + (it.protein || 0), carbs: a.carbs + (it.carbs || it.carbohydrates || 0), fat: a.fat + (it.fat || 0) }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

      const save = () => {
        onSave({ id: Date.now(), raw_input: text, items, totals, timestamp: new Date().toISOString() });
        setText(""); setItems([]);
      };

      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "9px 10px", color: C.text, fontFamily: "Syne", fontSize: 14, outline: "none", width: "100%" };

      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
          <Card>
            <textarea
              value={text} onChange={e => setText(e.target.value)}
              placeholder={"Was hast du gegessen?"}
              style={{ width: "100%", minHeight: 120, background: "transparent", border: "none", outline: "none", padding: "16px", color: C.text, fontFamily: "Syne", fontSize: 15, lineHeight: 1.7 }}
            />
            <div style={{ padding: "8px 12px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${C.border}`, gap: 8 }}>
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                <button onClick={toggleVoice} style={{ background: listening ? "#f59e0b22" : "transparent", border: `1px solid ${listening ? C.accent : C.border}`, borderRadius: 8, padding: "8px 12px", color: listening ? C.accent : C.muted, display: "flex", alignItems: "center", gap: 6 }}>
                  <span className={listening ? "pulsing" : ""} style={{ fontSize: 18 }}>🎙</span>
                  {listening && <Mono size={11} color={C.accent}>Höre zu…</Mono>}
                </button>
                <button onClick={() => setScanning(true)} disabled={barcodeLoading} style={{ background: barcodeLoading ? "#f59e0b22" : "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: C.muted, display: "flex", alignItems: "center" }}>
                  {barcodeLoading
                    ? <span className="pulsing" style={{ fontSize: 16 }}>⬛</span>
                    : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="8" y="4" width="2" height="16"/><rect x="12" y="4" width="1" height="16"/><rect x="15" y="4" width="2" height="16"/><rect x="19" y="4" width="1" height="16"/><rect x="22" y="4" width="1" height="16"/></svg>
                  }
                </button>
              </div>
              <Btn onClick={analyze} disabled={loading || !text.trim()} small>{loading ? "…" : "Analysieren →"}</Btn>
            </div>
          </Card>

          {loading && <div className="pulsing" style={{ textAlign: "center", padding: 24, fontFamily: "Syne", fontSize: 14, color: C.muted }}>Claude analysiert deine Mahlzeit…</div>}
          {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.fat, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}

          {recipes.length > 0 && items.length === 0 && !loading && (
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>Mealprep:</span>
              {recipes.map(r => (
                <button key={r.id} onClick={() => setText(p => p ? p + "\n" + r.name : r.name)}
                  style={{ fontFamily: "Syne", fontSize: 12, fontWeight: 600, padding: "5px 12px", borderRadius: 20, background: C.card, border: `1px solid ${C.border}`, color: C.text, cursor: "pointer" }}>
                  {r.name}
                </button>
              ))}
            </div>
          )}

          {items.length > 0 && (
            <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <SectionLabel>Erkannte Lebensmittel — tippen zum Bearbeiten</SectionLabel>
              {items.map((item, i) => (
                <Card key={i} style={{ padding: "12px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text, flex: 1 }}>{item.name_de || item.name}</span>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontFamily: "DM Mono", fontSize: 10, padding: "2px 7px", borderRadius: 4, background: item.found ? "#34d39918" : "#f8717118", color: item.found ? C.carbs : C.fat }}>{item.source === "recipe" ? "rezept" : item.source === "cache" || item.source === "off" ? "db" : item.found ? "ki" : "?"}</span>
                      <Mono size={11} color={C.muted}>{item.weight_g}g</Mono>
                      <button onClick={() => setItems(p => p.filter((_, idx) => idx !== i))} style={{ background: "none", border: "none", color: "#f8717150", fontSize: 16, padding: "2px 4px" }}>✕</button>
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 8 }}>
                    {MACROS.map(m => (
                      <div key={m}>
                        <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>{m}</div>
                        <input type="number" value={Math.round(item[m] * 10) / 10} onChange={e => update(i, m, e.target.value)} style={{ ...inputStyle, fontFamily: "DM Mono", fontSize: 13, color: MC[m], padding: "6px 8px" }} />
                      </div>
                    ))}
                  </div>
                </Card>
              ))}
              <Card accent style={{ padding: "12px 14px" }}>
                <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                  {MACROS.map(m => (
                    <div key={m} style={{ textAlign: "center" }}>
                      <Mono size={18} color={MC[m]} bold>{Math.round(totals[m])}</Mono>
                      <div style={{ fontFamily: "DM Mono", fontSize: 9, color: C.muted, marginTop: 2 }}>{UNITS[m]}</div>
                    </div>
                  ))}
                </div>
              </Card>
              <Btn onClick={save} full>Eintrag speichern</Btn>
            </div>
          )}

          {scanning && <BarcodeScanner onScan={handleBarcodeScan} onClose={() => setScanning(false)} />}

          {scannedProduct && (
            <div onClick={() => setScannedProduct(null)} style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", zIndex: 150 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: "#181818", borderRadius: "20px 20px 0 0", padding: "20px 16px", width: "100%", border: `1px solid ${C.border}`, paddingBottom: "calc(20px + env(safe-area-inset-bottom))" }}>
                <div style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 4 }}>{scannedProduct.name_de}</div>
                <div style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, marginBottom: 20 }}>
                  Pro 100g: {Math.round(scannedProduct.kcal_100)} kcal · {Math.round(scannedProduct.protein_100 * 10) / 10}g E · {Math.round(scannedProduct.carbs_100 * 10) / 10}g KH · {Math.round(scannedProduct.fat_100 * 10) / 10}g F
                </div>
                <div style={{ fontFamily: "Syne", fontSize: 12, color: C.muted, marginBottom: 8 }}>Wie viel hast du gegessen?</div>
                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16 }}>
                  <input
                    type="number" value={barcodeWeight}
                    onChange={e => setBarcodeWeight(e.target.value)}
                    autoFocus
                    style={{ flex: 1, background: "#111", border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", color: C.text, fontFamily: "DM Mono", fontSize: 18, outline: "none", textAlign: "center" }}
                  />
                  <span style={{ fontFamily: "Syne", fontSize: 16, color: C.muted }}>g</span>
                </div>
                {barcodeWeight && parseFloat(barcodeWeight) > 0 && (
                  <div style={{ background: "#34d39910", borderRadius: 8, padding: "8px 12px", fontFamily: "Syne", fontSize: 12, color: C.carbs, marginBottom: 14 }}>
                    = {Math.round(scannedProduct.kcal_100 * parseFloat(barcodeWeight) / 100)} kcal · {Math.round(scannedProduct.protein_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g E · {Math.round(scannedProduct.carbs_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g KH · {Math.round(scannedProduct.fat_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g F
                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn onClick={addBarcodeItem} disabled={!barcodeWeight || parseFloat(barcodeWeight) <= 0} style={{ flex: 1 }}>Hinzufügen →</Btn>
                  <Btn onClick={() => setScannedProduct(null)} variant="ghost">Abbrechen</Btn>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    function TodayTab({ entries, targets, onDelete }) {
      const totals = sumEntries(entries);
      const rest = Object.fromEntries(MACROS.map(m => [m, targets[m] - totals[m]]));
      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
          <Card style={{ padding: 16 }}>
            <SectionLabel>Tagesfortschritt</SectionLabel>
            {MACROS.map(m => <MacroBar key={m} label={LABELS[m]} current={totals[m]} target={targets[m]} color={MC[m]} unit={UNITS[m]} />)}
          </Card>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {MACROS.map(m => (
              <Card key={m} style={{ padding: "10px 12px" }}>
                <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Rest {LABELS[m]}</div>
                <Mono size={20} color={rest[m] < 0 ? C.fat : MC[m]} bold>{rest[m] > 0 ? "+" : ""}{Math.round(rest[m])}</Mono>
                <Mono size={10} color={C.muted}> {UNITS[m]}</Mono>
              </Card>
            ))}
          </div>
          <div>
            <SectionLabel>Einträge heute ({entries.length})</SectionLabel>
            {entries.length === 0
              ? <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.8 }}>Noch keine Einträge.<br />Geh zur Eingabe ✦</div>
              : <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {[...entries].reverse().map(e => (
                    <Card key={e.id} style={{ padding: "12px 14px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                        <div style={{ flex: 1, marginRight: 8 }}>
                          <div style={{ fontFamily: "Syne", fontSize: 13, color: C.text, marginBottom: 3, lineHeight: 1.4 }}>{e.raw_input}</div>
                          <Mono size={11} color={C.muted}>{new Date(e.timestamp).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })} Uhr</Mono>
                        </div>
                        <button onClick={() => onDelete(e.id)} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 18, padding: 4 }}>✕</button>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                        {MACROS.map(m => (
                          <div key={m} style={{ textAlign: "center" }}>
                            <Mono size={13} color={MC[m]} bold>{Math.round(e.totals[m])}</Mono>
                            <div style={{ fontFamily: "DM Mono", fontSize: 9, color: C.muted }}>{UNITS[m]}</div>
                          </div>
                        ))}
                      </div>
                    </Card>
                  ))}
                </div>
            }
          </div>
        </div>
      );
    }

    function MealprepTab({ recipes, onAdd, onDelete, onArchive, archive }) {
      const STEP = { idle: "idle", entering: "entering", analyzing: "analyzing", naming: "naming" };
      const [step, setStep] = useState(STEP.idle);
      const [subTab, setSubTab] = useState("aktiv");
      const [ingredientText, setIngredientText] = useState("");
      const [items, setItems] = useState([]);
      const [mealName, setMealName] = useState("");
      const [cookedWeight, setCookedWeight] = useState("");
      const [err, setErr] = useState(null);
      const [isListening, setIsListening] = useState(false);
      const recogRef = useRef(null);
      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "9px 10px", color: C.text, fontFamily: "Syne", fontSize: 14, outline: "none", width: "100%" };

      const analyze = async () => {
        if (!ingredientText.trim()) return;
        setStep(STEP.analyzing); setErr(null);
        try {
          const data = await analyzeRecipe(ingredientText);
          setItems(data.items);
          setCookedWeight(String(Math.round(data.raw_weight_g * 0.85)));
          setStep(STEP.naming);
        } catch (e) { setErr("Analyse fehlgeschlagen: " + e.message); setStep(STEP.entering); }
      };

      const updateItem = (i, field, val) => setItems(p => p.map((it, idx) => idx === i ? { ...it, [field]: parseFloat(val) || 0 } : it));
      const totals = items.reduce((a, it) => ({ kcal: a.kcal + (it.kcal || 0), protein: a.protein + (it.protein || 0), carbs: a.carbs + (it.carbs || 0), fat: a.fat + (it.fat || 0) }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

      const saveMealprep = () => {
        if (!mealName.trim() || !cookedWeight) return;
        const tw = parseFloat(cookedWeight);
        const r = { id: Date.now(), name: mealName.trim(), total_weight: tw, kcal_total: Math.round(totals.kcal), protein_total: Math.round(totals.protein * 10) / 10, carbs_total: Math.round(totals.carbs * 10) / 10, fat_total: Math.round(totals.fat * 10) / 10, ingredients: ingredientText };
        r.kcal_100 = r.kcal_total / tw * 100; r.protein_100 = r.protein_total / tw * 100;
        r.carbs_100 = r.carbs_total / tw * 100; r.fat_100 = r.fat_total / tw * 100;
        onAdd(r);
        setStep(STEP.idle); setIngredientText(""); setItems([]); setMealName(""); setCookedWeight("");
      };

      const cancel = () => { setStep(STEP.idle); setIngredientText(""); setItems([]); setErr(null); setMealName(""); };

      const recookFromArchive = (archived) => {
        setSubTab("aktiv");
        setIngredientText(archived.ingredients || "");
        setMealName(archived.name);
        setStep(STEP.entering);
      };

      const toggleVoice = () => {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) { alert("Spracherkennung wird nicht unterstützt."); return; }
        if (isListening) { recogRef.current && recogRef.current.stop(); setIsListening(false); return; }
        const r = new SR();
        r.lang = "de-DE"; r.continuous = true; r.interimResults = false;
        r.onresult = (e) => { const t = Array.from(e.results).slice(e.resultIndex).map(res => res[0].transcript).join("\n"); setIngredientText(prev => prev.trim() ? prev.trim() + "\n" + t : t); };
        r.onend = () => setIsListening(false);
        r.onerror = () => setIsListening(false);
        r.start(); recogRef.current = r; setIsListening(true);
      };

      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", gap: 0, background: C.card, borderRadius: 10, padding: 3, border: `1px solid ${C.border}` }}>
            {[["aktiv", "Aktiv"], ["archiv", `Archiv (${archive.length})`]].map(([id, label]) => (
              <button key={id} onClick={() => setSubTab(id)} style={{ flex: 1, padding: "7px 0", borderRadius: 8, border: "none", background: subTab === id ? C.accent : "transparent", color: subTab === id ? "#000" : C.muted, fontFamily: "Syne", fontSize: 12, fontWeight: 700, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5 }}>
                {label}
              </button>
            ))}
          </div>

          {subTab === "aktiv" && <>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <SectionLabel>Aktive Mealpreps ({recipes.length})</SectionLabel>
              {step === STEP.idle && <Btn onClick={() => setStep(STEP.entering)} small variant="ghost">+ Neu kochen</Btn>}
            </div>

            {step === STEP.entering && (
              <Card accent style={{ display: "flex", flexDirection: "column" }}>
                <div style={{ padding: "12px 14px 0", fontFamily: "Syne", fontSize: 12, color: C.accent, marginBottom: 6 }}>Zutaten eingeben (roh, vor dem Kochen)</div>
                <textarea value={ingredientText} onChange={e => setIngredientText(e.target.value)}
                  placeholder={"1000g rohes Hühnchen\n1 Dose gehackte Tomaten\n1 EL Olivenöl\n1 Packung Sahne 20%\nSalz, Pfeffer, Knoblauch"}
                  style={{ width: "100%", minHeight: 140, background: "transparent", border: "none", outline: "none", padding: "8px 14px 12px", color: C.text, fontFamily: "Syne", fontSize: 15, lineHeight: 1.7 }} />
                <div style={{ padding: "8px 12px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${C.border}`, gap: 8 }}>
                  <button onClick={toggleVoice} style={{ background: isListening ? "#f59e0b22" : "transparent", border: `1px solid ${isListening ? C.accent : C.border}`, borderRadius: 8, padding: "8px 12px", color: isListening ? C.accent : C.muted, display: "flex", alignItems: "center", gap: 6, flexShrink: 0 }}>
                    <span className={isListening ? "pulsing" : ""} style={{ fontSize: 18 }}>🎙</span>
                    {isListening && <Mono size={11} color={C.accent}>Höre zu…</Mono>}
                  </button>
                  <div style={{ display: "flex", gap: 8 }}>
                    <Btn onClick={analyze} disabled={!ingredientText.trim()} small>Makros berechnen →</Btn>
                    <Btn onClick={cancel} small variant="ghost">Abbrechen</Btn>
                  </div>
                </div>
              </Card>
            )}

            {step === STEP.analyzing && <div className="pulsing" style={{ textAlign: "center", padding: 32, fontFamily: "Syne", fontSize: 14, color: C.muted }}>Claude analysiert die Zutaten…</div>}
            {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.fat, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}

            {step === STEP.naming && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <SectionLabel>Erkannte Zutaten — tippen zum Korrigieren</SectionLabel>
                {items.map((item, i) => (
                  <Card key={i} style={{ padding: "10px 12px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: C.text }}>{item.name_de || item.name}</span>
                      <Mono size={11} color={C.muted}>{item.weight_g}g</Mono>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
                      {MACROS.map(m => (
                        <div key={m}>
                          <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", marginBottom: 2 }}>{m}</div>
                          <input type="number" value={Math.round(item[m] * 10) / 10} onChange={e => updateItem(i, m, e.target.value)} style={{ ...inputStyle, fontFamily: "DM Mono", fontSize: 13, color: MC[m], padding: "6px 8px" }} />
                        </div>
                      ))}
                    </div>
                  </Card>
                ))}
                <Card accent style={{ padding: "14px" }}>
                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 14 }}>
                    {MACROS.map(m => (
                      <div key={m} style={{ textAlign: "center" }}>
                        <Mono size={18} color={MC[m]} bold>{Math.round(totals[m])}</Mono>
                        <div style={{ fontFamily: "DM Mono", fontSize: 9, color: C.muted, marginTop: 2 }}>{UNITS[m]}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ borderTop: `1px solid ${C.accent}25`, paddingTop: 12, display: "flex", flexDirection: "column", gap: 10 }}>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 4 }}>Name des Mealpreps</div>
                      <input placeholder="z.B. Hähnchen-Tomaten-Sahnesoße" value={mealName} onChange={e => setMealName(e.target.value)} style={inputStyle} />
                    </div>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 4 }}>Fertig gekochtes Gesamtgewicht (g) — bitte abwiegen!</div>
                      <input type="number" placeholder="z.B. 1400" value={cookedWeight} onChange={e => setCookedWeight(e.target.value)} style={inputStyle} />
                    </div>
                  </div>
                </Card>
                {cookedWeight && mealName && (
                  <div style={{ background: "#34d39910", borderRadius: 8, padding: "10px 14px", fontFamily: "Syne", fontSize: 12, color: C.carbs }}>
                    Pro 100g: {Math.round(totals.kcal / parseFloat(cookedWeight) * 100)} kcal · {Math.round(totals.protein / parseFloat(cookedWeight) * 100 * 10) / 10}g E · {Math.round(totals.carbs / parseFloat(cookedWeight) * 100 * 10) / 10}g KH · {Math.round(totals.fat / parseFloat(cookedWeight) * 100 * 10) / 10}g F
                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn onClick={saveMealprep} disabled={!mealName.trim() || !cookedWeight} style={{ flex: 1 }}>Mealprep speichern</Btn>
                  <Btn onClick={cancel} variant="ghost">Abbrechen</Btn>
                </div>
              </div>
            )}

            {step === STEP.idle && recipes.length === 0 && (
              <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.9 }}>
                Noch keine Mealpreps.<br />Koch ein Gericht vor und trag die Zutaten ein –<br />dann kannst du z.B. „300g Hähnchen-Soße"<br />in der täglichen Eingabe tracken.
              </div>
            )}

            {step === STEP.idle && recipes.map(r => (
              <Card key={r.id} style={{ padding: "12px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div style={{ flex: 1 }}>
                    <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text }}>{r.name}</span>
                    <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginTop: 2 }}>Gesamtgewicht: {r.total_weight}g</div>
                  </div>
                  <button onClick={() => onDelete(r.id)} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 16, padding: 4 }}>✕</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginBottom: 8 }}>
                  {MACROS.map(m => (
                    <div key={m} style={{ textAlign: "center" }}>
                      <Mono size={14} color={MC[m]} bold>{Math.round(r[`${m}_total`])}</Mono>
                      <div style={{ fontFamily: "DM Mono", fontSize: 9, color: C.muted }}>gesamt</div>
                    </div>
                  ))}
                </div>
                <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, borderTop: `1px solid ${C.border}`, paddingTop: 8, marginBottom: 10 }}>
                  Pro 100g: {Math.round(r.kcal_100)} kcal · {Math.round(r.protein_100 * 10) / 10}g E · {Math.round(r.carbs_100 * 10) / 10}g KH · {Math.round(r.fat_100 * 10) / 10}g F
                </div>
                {r.ingredients && <div style={{ fontFamily: "Syne", fontSize: 10, color: "#444", borderTop: `1px solid ${C.border}`, paddingTop: 8, marginBottom: 10, lineHeight: 1.5 }}>{r.ingredients}</div>}
                <Btn onClick={() => onArchive(r)} full variant="ghost" small>Aufgegessen ✓</Btn>
              </Card>
            ))}
          </>}

          {subTab === "archiv" && <>
            <SectionLabel>Archiv — aufgegessene Mealpreps</SectionLabel>
            {archive.length === 0 ? (
              <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.9 }}>
                Noch nichts im Archiv.<br />Wenn ein Mealprep aufgegessen ist,<br />klick auf „Aufgegessen ✓".
              </div>
            ) : [...archive].reverse().map((r, i) => (
              <Card key={i} style={{ padding: "12px 14px", opacity: 0.85 }}>
                <div style={{ marginBottom: 6 }}>
                  <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text }}>{r.name}</span>
                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginTop: 2 }}>
                    {new Date(r.archived_at).toLocaleDateString("de-DE", { day: "numeric", month: "short", year: "numeric" })} · {r.total_weight}g
                  </div>
                </div>
                <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 12 }}>
                  Pro 100g: {Math.round(r.kcal_100)} kcal · {Math.round(r.protein_100 * 10) / 10}g E · {Math.round(r.carbs_100 * 10) / 10}g KH · {Math.round(r.fat_100 * 10) / 10}g F
                </div>
                <Btn onClick={() => recookFromArchive(r)} full small>Neu kochen →</Btn>
              </Card>
            ))}
          </>}
        </div>
      );
    }

    function HistoryTab({ targets, loadRange }) {
      const [days, setDays] = useState([]);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const to = todayStr();
        const fromDate = new Date(); fromDate.setDate(fromDate.getDate() - 6);
        const from = fromDate.toISOString().split("T")[0];
        setLoading(true);
        loadRange(from, to)
          .then(map => {
            const result = [];
            for (let i = 0; i < 7; i++) {
              const d = new Date(); d.setDate(d.getDate() - i);
              const ds = d.toISOString().split("T")[0];
              const entries = map[ds] || [];
              result.push({ date: ds, entries: entries.length, totals: sumEntries(entries) });
            }
            setDays(result);
          })
          .catch(() => setDays([]))
          .finally(() => setLoading(false));
      }, []);

      const label = (ds) => {
        const d = new Date(ds + "T12:00:00");
        const t = new Date(); const y = new Date(); y.setDate(y.getDate() - 1);
        if (d.toDateString() === t.toDateString()) return "Heute";
        if (d.toDateString() === y.toDateString()) return "Gestern";
        return d.toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "short" });
      };

      if (loading) return (
        <div className="pulsing" style={{ textAlign: "center", padding: 60, fontFamily: "Syne", fontSize: 14, color: C.muted }}>Lade Verlauf…</div>
      );

      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
          <SectionLabel>Letzte 7 Tage</SectionLabel>
          {days.map(day => {
            const pct = Math.min((day.totals.kcal / targets.kcal) * 100, 100);
            return (
              <Card key={day.date} style={{ padding: "12px 14px", opacity: day.entries > 0 ? 1 : 0.4 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: day.entries > 0 ? 10 : 0 }}>
                  <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text }}>{label(day.date)}</span>
                  {day.entries > 0
                    ? <div style={{ display: "flex", gap: 6, alignItems: "baseline" }}>
                        <Mono size={14} color={C.kcal} bold>{Math.round(day.totals.kcal)}</Mono>
                        <Mono size={10} color={C.muted}>kcal · {day.entries} Eintr.</Mono>
                      </div>
                    : <Mono size={11} color={C.muted}>keine Daten</Mono>
                  }
                </div>
                {day.entries > 0 && (
                  <>
                    <div style={{ height: 3, background: "#1e1e1e", borderRadius: 2, marginBottom: 10 }}>
                      <div style={{ width: `${pct}%`, height: "100%", background: pct >= 90 ? C.carbs : C.kcal, borderRadius: 2 }} />
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 4 }}>
                      {["protein", "carbs", "fat"].map(m => (
                        <div key={m} style={{ textAlign: "center" }}>
                          <Mono size={12} color={MC[m]}>{Math.round(day.totals[m])}g</Mono>
                          <div style={{ fontFamily: "DM Mono", fontSize: 9, color: C.muted }}>{LABELS[m]}</div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </Card>
            );
          })}
        </div>
      );
    }

    function SettingsModal({ targets, onSave, onClose }) {
      const [form, setForm] = useState({ ...targets });
      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 6, padding: "9px 10px", color: C.text, fontFamily: "DM Mono", fontSize: 14, outline: "none", flex: 1 };
      return (
        <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", zIndex: 100 }}>
          <div onClick={e => e.stopPropagation()} style={{ background: "#181818", borderRadius: "20px 20px 0 0", padding: "20px 16px", width: "100%", border: `1px solid ${C.border}`, paddingBottom: "calc(20px + env(safe-area-inset-bottom))" }}>
            <div style={{ fontFamily: "Syne", fontSize: 17, fontWeight: 800, color: C.text, marginBottom: 20 }}>Tagesziele</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
              {MACROS.map(m => (
                <div key={m} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <span style={{ fontFamily: "Syne", fontSize: 13, color: MC[m], width: 115, flexShrink: 0 }}>{LABELS[m]}</span>
                  <input type="number" value={form[m]} onChange={e => setForm(p => ({ ...p, [m]: parseFloat(e.target.value) || 0 }))} style={inputStyle} />
                  <Mono size={11} color={C.muted} style={{ width: 32 }}> {UNITS[m]}</Mono>
                </div>
              ))}
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <Btn onClick={() => { onSave(form); onClose(); }} style={{ flex: 1 }}>Speichern</Btn>
              <Btn onClick={onClose} variant="ghost">Abbrechen</Btn>
            </div>
          </div>
        </div>
      );
    }

    function AuthScreen({ onAuth }) {
      const [mode, setMode] = useState("login");
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState(null);
      const [pendingEmail, setPendingEmail] = useState(null); // "check email" state
      const [resendLoading, setResendLoading] = useState(false);
      const [resendDone, setResendDone] = useState(false);
      const [unverifiedEmail, setUnverifiedEmail] = useState(null); // login blocked state

      const inputStyle = { background: "#111", border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", color: C.text, fontFamily: "Syne", fontSize: 15, outline: "none", width: "100%" };

      const submit = async () => {
        if (!email.trim() || !password) return;
        setLoading(true); setErr(null); setUnverifiedEmail(null);
        try {
          const data = await authApiCall(`/api/auth/${mode}`, "POST", { email: email.trim(), password });
          if (data.pending) {
            setPendingEmail(email.trim());
          } else {
            saveAuth(data);
            onAuth(data);
          }
        } catch (e) {
          if (e.message === "email_not_verified" || e.message.includes("bestätige")) {
            setUnverifiedEmail(email.trim());
          } else {
            setErr(e.message);
          }
        }
        setLoading(false);
      };

      const handleResend = async (emailAddr) => {
        setResendLoading(true); setResendDone(false);
        try { await resendVerification(emailAddr); setResendDone(true); } catch {}
        setResendLoading(false);
      };

      // "Check your email" screen
      if (pendingEmail) {
        return (
          <div style={{ height: "100vh", height: "-webkit-fill-available", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, maxWidth: 500, margin: "0 auto" }}>
            <div style={{ fontFamily: "Syne", fontSize: 38, fontWeight: 800, letterSpacing: -1.5, color: C.text, marginBottom: 6 }}>
              makro<span style={{ color: C.accent }}>.</span>
            </div>
            <div style={{ fontSize: 52, margin: "28px 0 20px" }}>📬</div>
            <div style={{ fontFamily: "Syne", fontSize: 18, fontWeight: 700, color: C.text, marginBottom: 10, textAlign: "center" }}>E-Mail bestätigen</div>
            <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, textAlign: "center", lineHeight: 1.7, marginBottom: 32, maxWidth: 300 }}>
              Wir haben eine Bestätigungs-E-Mail an <span style={{ color: C.text }}>{pendingEmail}</span> gesendet. Klick auf den Link um fortzufahren.
            </div>
            {resendDone
              ? <div style={{ fontFamily: "Syne", fontSize: 13, color: C.carbs }}>✓ E-Mail erneut gesendet</div>
              : <button onClick={() => handleResend(pendingEmail)} disabled={resendLoading}
                  style={{ background: "none", border: "none", color: C.muted, fontFamily: "Syne", fontSize: 13, cursor: "pointer", textDecoration: "underline" }}>
                  {resendLoading ? "Sende…" : "E-Mail erneut senden"}
                </button>
            }
            <button onClick={() => { setPendingEmail(null); setMode("login"); }}
              style={{ background: "none", border: "none", color: "#444", fontFamily: "Syne", fontSize: 12, cursor: "pointer", marginTop: 16 }}>
              Zurück zum Login
            </button>
          </div>
        );
      }

      // "Unverified email" screen after login attempt
      if (unverifiedEmail) {
        return (
          <div style={{ height: "100vh", height: "-webkit-fill-available", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, maxWidth: 500, margin: "0 auto" }}>
            <div style={{ fontFamily: "Syne", fontSize: 38, fontWeight: 800, letterSpacing: -1.5, color: C.text, marginBottom: 6 }}>
              makro<span style={{ color: C.accent }}>.</span>
            </div>
            <div style={{ fontSize: 52, margin: "28px 0 20px" }}>✉️</div>
            <div style={{ fontFamily: "Syne", fontSize: 17, fontWeight: 700, color: C.text, marginBottom: 10, textAlign: "center" }}>E-Mail noch nicht bestätigt</div>
            <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, textAlign: "center", lineHeight: 1.7, marginBottom: 32, maxWidth: 300 }}>
              Bitte klick auf den Link in der Bestätigungs-E-Mail die wir an <span style={{ color: C.text }}>{unverifiedEmail}</span> gesendet haben.
            </div>
            {resendDone
              ? <div style={{ fontFamily: "Syne", fontSize: 13, color: C.carbs }}>✓ E-Mail erneut gesendet</div>
              : <Btn onClick={() => handleResend(unverifiedEmail)} disabled={resendLoading} small>
                  {resendLoading ? "Sende…" : "Neue Bestätigungs-E-Mail senden"}
                </Btn>
            }
            <button onClick={() => setUnverifiedEmail(null)}
              style={{ background: "none", border: "none", color: "#444", fontFamily: "Syne", fontSize: 12, cursor: "pointer", marginTop: 16 }}>
              Zurück zum Login
            </button>
          </div>
        );
      }

      return (
        <div style={{ height: "100vh", height: "-webkit-fill-available", background: C.bg, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, maxWidth: 500, margin: "0 auto" }}>
          <div style={{ fontFamily: "Syne", fontSize: 38, fontWeight: 800, letterSpacing: -1.5, color: C.text, marginBottom: 6 }}>
            makro<span style={{ color: C.accent }}>.</span>
          </div>
          <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted, marginBottom: 44 }}>
            {mode === "login" ? "Willkommen zurück" : "Konto erstellen"}
          </div>
          <div style={{ width: "100%", display: "flex", flexDirection: "column", gap: 12 }}>
            <input
              type="email" placeholder="E-Mail-Adresse" value={email}
              onChange={e => setEmail(e.target.value)}
              onKeyDown={e => e.key === "Enter" && submit()}
              style={inputStyle}
            />
            <input
              type="password" placeholder="Passwort" value={password}
              onChange={e => setPassword(e.target.value)}
              onKeyDown={e => e.key === "Enter" && submit()}
              style={inputStyle}
            />
            {err && (
              <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.fat, fontFamily: "Syne", fontSize: 13 }}>{err}</div>
            )}
            <Btn onClick={submit} disabled={loading || !email.trim() || !password} full>
              {loading ? "…" : mode === "login" ? "Anmelden →" : "Registrieren →"}
            </Btn>
            <button
              onClick={() => { setMode(m => m === "login" ? "register" : "login"); setErr(null); }}
              style={{ background: "none", border: "none", color: C.muted, fontFamily: "Syne", fontSize: 13, cursor: "pointer", padding: 8, marginTop: 4 }}>
              {mode === "login" ? "Noch kein Konto? Registrieren" : "Schon ein Konto? Anmelden"}
            </button>
          </div>
        </div>
      );
    }

    const TABS = [
      { id: "input",    label: "Eingabe",  sym: "✦" },
      { id: "today",    label: "Heute",    sym: "◉" },
      { id: "mealprep", label: "Mealprep", sym: "⬡" },
      { id: "history",  label: "Verlauf",  sym: "◈" },
    ];

    function App() {
      const [auth, setAuth] = useState(() => getAuth());
      const [tab, setTab] = useState("input");
      const [targets, setTargets] = useState(() => store.get("mk_targets") || DEFAULT_TARGETS);
      const [entries, setEntries] = useState([]);
      const [recipes, setRecipes] = useState([]);
      const [archive, setArchive] = useState([]);
      const [settings, setSettings] = useState(false);

      // Load all data on auth
      useEffect(() => {
        if (!auth) return;

        // Load today's entries
        loadDiaryEntries(todayStr())
          .then(r => setEntries(r))
          .catch(() => {});

        // Load recipes
        loadRecipes()
          .then(r => setRecipes(r))
          .catch(() => setRecipes(store.get("mk_recipes") || []));

        // Load archive
        loadArchive()
          .then(r => setArchive(r))
          .catch(() => setArchive(store.get("mk_mealprep_archive") || []));

        // Load settings/targets
        loadSettings()
          .then(data => { if (data?.targets) { setTargets(data.targets); store.set("mk_targets", data.targets); } })
          .catch(() => {});
      }, [auth]);

      const handleAuth = (data) => { setAuth(data); };

      const logout = () => {
        clearAuth();
        setAuth(null);
        setRecipes([]);
        setEntries([]);
        setArchive([]);
      };

      // Entry functions
      const addEntry = async (entry) => {
        try {
          const saved = await saveDiaryEntry(todayStr(), entry);
          setEntries(p => [...p, saved]);
        } catch {
          setEntries(p => [...p, entry]);
        }
        setTab("today");
      };

      const deleteEntry = async (id) => {
        setEntries(p => p.filter(e => e.id !== id));
        deleteDiaryEntry(id).catch(() => {});
      };

      // Recipe functions
      const addRecipe = async (recipe) => {
        try {
          const saved = await saveRecipeToServer(recipe);
          setRecipes(p => [...p, saved]);
        } catch {
          const local = { ...recipe, id: Date.now() };
          setRecipes(p => [...p, local]);
        }
      };

      const removeRecipe = async (id) => {
        setRecipes(p => p.filter(r => r.id !== id));
        deleteRecipeFromServer(id).catch(() => {});
      };

      // Archive functions
      const archiveRecipe = async (recipe) => {
        const withTs = { ...recipe, archived_at: new Date().toISOString() };
        try {
          const saved = await saveToArchive(withTs);
          setArchive(p => [...p, saved]);
        } catch {
          setArchive(p => [...p, withTs]);
        }
        removeRecipe(recipe.id);
      };

      // Settings
      const updateTargets = (t) => {
        setTargets(t);
        store.set("mk_targets", t);
        saveSettings(t).catch(() => {});
      };

      if (!auth) return <AuthScreen onAuth={handleAuth} />;

      return (
        <div style={{ height: "100vh", height: "-webkit-fill-available", background: C.bg, display: "flex", flexDirection: "column", color: C.text, maxWidth: 500, margin: "0 auto" }}>
          <div style={{ height: "env(safe-area-inset-top)", background: C.bg, flexShrink: 0 }} />
          <div style={{ padding: "12px 16px 10px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <div>
              <div style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 800, letterSpacing: -1, color: C.text }}>
                makro<span style={{ color: C.accent }}>.</span>
              </div>
              <Mono size={10} color={C.muted}>{new Date().toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long" })}</Mono>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={logout} title={auth?.user?.email} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", color: C.muted, fontFamily: "Syne", fontSize: 12 }}>Logout</button>
              <button onClick={() => setSettings(true)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", color: C.muted, fontSize: 16 }}>⚙</button>
            </div>
          </div>
          <div style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch" }}>
            {tab === "input"    && <InputTab recipes={recipes} onSave={addEntry} />}
            {tab === "today"    && <TodayTab entries={entries} targets={targets} onDelete={deleteEntry} />}
            {tab === "mealprep" && <MealprepTab recipes={recipes} onAdd={addRecipe} onDelete={removeRecipe} onArchive={archiveRecipe} archive={archive} />}
            {tab === "history"  && <HistoryTab targets={targets} loadRange={loadDiaryRange} />}
          </div>
          <div style={{ display: "flex", borderTop: `1px solid ${C.border}`, background: C.bg, flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom)" }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, padding: "10px 0 12px", background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <span style={{ fontSize: 16, color: tab === t.id ? C.accent : C.soft }}>{t.sym}</span>
                <span style={{ fontFamily: "Syne", fontSize: 9, fontWeight: tab === t.id ? 700 : 400, color: tab === t.id ? C.accent : C.muted, textTransform: "uppercase", letterSpacing: 0.6 }}>{t.label}</span>
              </button>
            ))}
          </div>
          {settings && <SettingsModal targets={targets} onSave={t => { updateTargets(t); }} onClose={() => setSettings(false)} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js", { scope: "./" }).catch(() => {});
    }
  </script>
</body>
</html>
