<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>makro.</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="makro." />
  <meta name="theme-color" content="#0c0c0c" />
  <link rel="apple-touch-icon" href="icons/makro-icon-180.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script>
    // iOS PWA standalone: inputs sometimes don't focus on tap — force focus on touchend
    if (window.navigator.standalone) {
      document.addEventListener('touchend', function(e) {
        var t = e.target;
        if (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA') {
          e.preventDefault();
          t.focus();
        }
      }, true);
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    input, textarea, button, select { font-family: inherit; }
    html, body, #root { height: 100%; height: -webkit-fill-available; background: #0c0c0c; }
    body { overflow: hidden; }
    textarea { resize: none; -webkit-appearance: none; }
    input { -webkit-appearance: none; }
    input[type=number]::-webkit-inner-spin-button { opacity: 0.4; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    @keyframes fastingPulse { 0% { transform:scale(1); opacity:0.5; } 40% { transform:scale(2.4); opacity:0; } 100% { transform:scale(2.4); opacity:0; } }
    .fasting-pulse { animation: fastingPulse 4s ease-out infinite; transform-box: fill-box; transform-origin: center; }
    @keyframes slideFromRight { from { transform:translateX(100%); } to { transform:translateX(0); } }
    @keyframes slideFromLeft  { from { transform:translateX(-100%); } to { transform:translateX(0); } }
    @keyframes slideToLeft    { from { transform:translateX(0); } to { transform:translateX(-100%); } }
    @keyframes slideToRight   { from { transform:translateX(0); } to { transform:translateX(100%); } }
    .fade-up { animation: fadeUp 0.25s ease forwards; }
    .pulsing { animation: pulse 1.4s ease infinite; }
    .slide-from-right { animation: slideFromRight 0.28s ease-out forwards; }
    .slide-from-left  { animation: slideFromLeft  0.28s ease-out forwards; }
    .slide-to-left    { animation: slideToLeft    0.28s ease-out forwards; }
    .slide-to-right   { animation: slideToRight   0.28s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>


  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const APP_VERSION = "1.6.0";
    const DARK_C  = { bg: "#0c0c0c", card: "#161616", border: "#222",   accent: "#f59e0b", text: "#efefef", muted: "#555", soft: "#2a2a2a", input: "#111",    surface: "#181818", toast: "#1a1a1a", protein: "#60a5fa", carbs: "#34d399", fat: "#f472b6", kcal: "#f59e0b", weight: "#a78bfa", danger: "#f87171" };
    const LIGHT_C = { bg: "#f4f4f4", card: "#ffffff", border: "#e0e0e0", accent: "#d97706", text: "#111111", muted: "#999", soft: "#e8e8e8", input: "#f0f0f0", surface: "#ffffff", toast: "#ffffff", protein: "#2563eb", carbs: "#059669", fat: "#db2777",  kcal: "#d97706", weight: "#7c3aed", danger: "#dc2626" };
    let C = { ...DARK_C };
    const MACROS = ["kcal", "protein", "carbs", "fat"];
    const LABELS = { kcal: "Kalorien", protein: "Eiweiß", carbs: "Kohlenhydrate", fat: "Fett" };
    const UNITS = { kcal: "kcal", protein: "g", carbs: "g", fat: "g" };
    let MC = { kcal: C.kcal, protein: C.protein, carbs: C.carbs, fat: C.fat };
    const DEFAULT_TARGETS = { kcal: 2500, protein: 180, carbs: 250, fat: 80 };

    const todayStr = () => new Date().toISOString().split("T")[0];
    const dayKey = (d) => `mk_day_${d}`;

    const store = {
      get: (k) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch { return null; } },
      set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
    };

    // ── Backend-Konfiguration ──────────────────────────────────────
    const BACKEND_URL = "https://api.makro-tracking.com";

    // Auth-State (token + user)
    const getAuth  = () => store.get("mk_auth");
    const saveAuth = (data) => store.set("mk_auth", data);
    const clearAuth = () => localStorage.removeItem("mk_auth");

    // API-Call mit JWT (für alle /api/* außer /api/auth/*)
    async function apiCall(path, method = "GET", body = null) {
      const auth = getAuth();
      const opts = {
        method,
        headers: {
          "Content-Type": "application/json",
          ...(auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {}),
        },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(BACKEND_URL + path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    // Auth-API-Call (kein Secret nötig — Backend nutzt Rate Limiting)
    async function authApiCall(path, method = "GET", body = null) {
      const opts = {
        method,
        headers: { "Content-Type": "application/json" },
      };
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(BACKEND_URL + path, opts);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || `HTTP ${res.status}`);
      }
      return res.json();
    }

    async function resendVerification(email) {
      return authApiCall("/api/auth/resend-verification", "POST", { email });
    }

    // Freitext analysieren → Makros vom Backend
    async function analyzeMeal(text, recipes) {
      return apiCall("/api/analyze", "POST", { text, recipes });
    }
    async function analyzeImageMeal(imageFile) {
      const auth = getAuth();
      const form = new FormData();
      form.append("image", imageFile);
      const res = await fetch(BACKEND_URL + "/api/analyze-image", {
        method: "POST",
        headers: auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {},
        body: form,
      });
      if (!res.ok) { const e = await res.json(); throw new Error(e.error || "Fehler"); }
      return res.json();
    }

    // Rezept-Zutaten analysieren → Makros vom Backend
    async function analyzeRecipe(text) {
      return apiCall("/api/analyze-recipe", "POST", { text });
    }

    // Rezept-Bild/Screenshot → Zutatentext extrahieren
    async function analyzeRecipeImage(imageFile) {
      const auth = getAuth();
      const form = new FormData();
      form.append("image", imageFile);
      const res = await fetch(BACKEND_URL + "/api/analyze-recipe-image", {
        method: "POST",
        headers: auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {},
        body: form,
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || "Bildanalyse fehlgeschlagen");
      }
      return res.json();
    }

    async function lookupBarcode(barcode) {
      return apiCall("/api/barcode", "POST", { barcode });
    }

    // Rezepte vom Server laden (userId kommt aus JWT)
    async function loadRecipes() {
      return apiCall("/api/recipes");
    }

    // Rezept auf Server speichern
    async function saveRecipeToServer(recipe) {
      return apiCall("/api/recipes", "POST", recipe);
    }

    // Rezept auf Server aktualisieren
    async function updateRecipeOnServer(id, recipe) {
      return apiCall(`/api/recipes/${id}`, "PUT", recipe);
    }

    // Rezept vom Server löschen
    async function deleteRecipeFromServer(id) {
      return apiCall(`/api/recipes/${id}`, "DELETE");
    }

    // Diary entries
    async function loadDiaryEntries(date) {
      return apiCall(`/api/diary?date=${date}`);
    }
    async function loadDiaryRange(from, to) {
      return apiCall(`/api/diary?from=${from}&to=${to}`);
    }
    async function saveDiaryEntry(date, entry) {
      return apiCall("/api/diary", "POST", { date, entry });
    }
    async function updateDiaryEntry(id, entry) {
      return apiCall(`/api/diary/${id}`, "PATCH", { entry });
    }
    async function deleteDiaryEntry(id) {
      return apiCall(`/api/diary/${id}`, "DELETE");
    }

    // Mealprep archive
    async function loadArchive() {
      return apiCall("/api/archive");
    }

    // Persönliche Lebensmittel-Datenbank
    async function loadUserFoods()        { return apiCall("/api/user-foods"); }
    async function addUserFoodAPI(food)   { return apiCall("/api/user-foods", "POST", food); }
    async function updateUserFoodAPI(id, food) { return apiCall(`/api/user-foods/${id}`, "PATCH", food); }
    async function deleteUserFoodAPI(id)  { return apiCall(`/api/user-foods/${id}`, "DELETE"); }

    // Körpergewicht
    async function loadBodyWeightRange(from, to) { return apiCall(`/api/body-weight?from=${from}&to=${to}`); }
    async function loadStravaActivities(from, to) { return apiCall(`/api/strava/activities?from=${from}&to=${to}`).catch(() => []); }
    async function deleteStravaActivityAPI(stravaId) { return apiCall(`/api/strava/activities/${stravaId}`, "DELETE"); }
    async function saveBodyWeightAPI(date, weight_kg, burned_kcal) {
      const body = { date };
      if (weight_kg != null) body.weight_kg = weight_kg;
      if (burned_kcal != null) body.burned_kcal = burned_kcal;
      return apiCall("/api/body-weight", "POST", body);
    }

    // Passwort zurücksetzen (kein Auth nötig)
    async function forgotPassword(email) { return authApiCall("/api/auth/forgot-password", "POST", { email }); }
    async function resetPassword(token, password) { return authApiCall("/api/auth/reset-password", "POST", { token, password }); }

    // Account löschen
    async function deleteAccount() { return apiCall("/api/account", "DELETE"); }
    async function fetchSubscription()      { return apiCall("/api/subscription"); }
    async function initSubscription()       { return apiCall("/api/subscription/init", "POST"); }
    async function activateSubscription()   { return apiCall("/api/subscription/activate", "POST"); }
    async function saveToArchive(recipe) {
      return apiCall("/api/archive", "POST", { recipe });
    }

    // User settings
    async function loadSettings() {
      return apiCall("/api/settings");
    }
    async function saveSettings(targets, extra = {}) {
      return apiCall("/api/settings", "POST", { targets, ...extra });
    }

    function entryLabel(e) {
      if (e.items && e.items.length > 0) {
        const names = e.items.map(it => it.name_de || it.name || "").filter(Boolean);
        if (names.length > 0) return names.join(", ");
      }
      return e.raw_input || "";
    }

    function sumEntries(entries) {
      return entries.reduce((a, e) => ({
        kcal: a.kcal + e.totals.kcal, protein: a.protein + e.totals.protein,
        carbs: a.carbs + e.totals.carbs, fat: a.fat + e.totals.fat,
      }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });
    }

    const Mono = ({ children, size = 15, color = C.text, bold }) => (
      <span style={{ fontFamily: "Inter, sans-serif", fontSize: size, color, fontWeight: bold ? 500 : 400, fontVariantNumeric: "tabular-nums" }}>
        {children}
      </span>
    );

    const MacroBar = ({ label, current, target, color, unit }) => {
      const pct = Math.min((current / target) * 100, 100);
      const over = current > target;
      return (
        <div style={{ marginBottom: 14 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, alignItems: "baseline" }}>
            <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>{label}</span>
            <div style={{ display: "flex", gap: 4, alignItems: "baseline" }}>
              <Mono size={14} color={over ? C.danger : color} bold>{Math.round(current)}</Mono>
              <Mono size={10} color={C.muted}> / {target}{unit}</Mono>
            </div>
          </div>
          <div style={{ height: 3, background: "#1e1e1e", borderRadius: 2, overflow: "hidden" }}>
            <div style={{ width: `${pct}%`, height: "100%", background: over ? C.danger : color, borderRadius: 2, transition: "width 0.5s ease" }} />
          </div>
        </div>
      );
    };

    const Btn = ({ children, onClick, variant = "primary", disabled, small, full, style: sx }) => {
      const base = { fontFamily: "Syne", fontWeight: 700, borderRadius: 8, border: "none", cursor: disabled ? "not-allowed" : "pointer", opacity: disabled ? 0.45 : 1, padding: small ? "8px 14px" : "12px 20px", fontSize: small ? 13 : 14, width: full ? "100%" : undefined, transition: "opacity 0.15s", ...sx };
      const v = { primary: { background: C.accent, color: "#000" }, ghost: { background: "transparent", color: C.text, border: `1px solid ${C.border}` }, danger: { background: "transparent", color: C.danger, border: `1px solid #f8717128` } };
      return <button onClick={onClick} disabled={disabled} style={{ ...base, ...v[variant] }}>{children}</button>;
    };

    const Card = ({ children, accent, style: sx, onClick }) => (
      <div onClick={onClick} style={{ background: C.card, borderRadius: 12, border: `1px solid ${accent ? C.accent + "35" : C.border}`, ...sx }}>
        {children}
      </div>
    );

    const SectionLabel = ({ children }) => (
      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 10 }}>{children}</div>
    );

    // MacroInput: controlled input das Dezimalstellen und Leerfeld korrekt behandelt.
    // Intern wird der rohe String gehalten; parseFloat wird erst onBlur committet.
    const MacroInput = ({ value, onChange, color, style: sx }) => {
      const [draft, setDraft] = React.useState(null); // null = nicht im Edit-Modus
      const displayVal = draft !== null ? draft : (value === 0 || value === "0" ? "0" : String(Math.round(parseFloat(value || 0) * 10) / 10));
      return (
        <input
          type="text"
          inputMode="decimal"
          value={displayVal}
          onChange={e => {
            const raw = e.target.value.replace(",", "."); // Komma → Punkt
            // Nur Ziffern, Punkt und führendes Minus erlauben
            if (/^-?\d*\.?\d*$/.test(raw) || raw === "") setDraft(raw);
          }}
          onFocus={e => {
            // Beim Fokus: zeige vollen Wert als String, select all
            setDraft(String(Math.round(parseFloat(value || 0) * 10) / 10));
            e.target.select();
          }}
          onBlur={() => {
            const parsed = parseFloat(draft);
            onChange(isNaN(parsed) ? 0 : Math.round(parsed * 100) / 100);
            setDraft(null);
          }}
          style={sx}
        />
      );
    };

    function BarcodeScanner({ onScan, onClose }) {
      const videoRef  = useRef(null);
      const canvasRef = useRef(null);
      const trackRef  = useRef(null);
      const rafRef    = useRef(null);
      const doneRef   = useRef(false);
      const [err, setErr]       = useState(null);
      const [torch, setTorch]   = useState(false);
      const [torchOk, setTorchOk] = useState(false);
      const [hint, setHint]     = useState("Richte die Kamera auf einen Barcode");

      // Taschenlampe an/aus
      const toggleTorch = async () => {
        const track = trackRef.current;
        if (!track) return;
        try {
          await track.applyConstraints({ advanced: [{ torch: !torch }] });
          setTorch(t => !t);
        } catch {}
      };

      useEffect(() => {
        let stream;

        const start = async () => {
          try {
            stream = await navigator.mediaDevices.getUserMedia({
              video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } },
            });
          } catch {
            setErr("Kein Kamerazugriff. Bitte in den Browser-Einstellungen erlauben.");
            return;
          }

          const track = stream.getVideoTracks()[0];
          trackRef.current = track;

          // Kamera-Optimierungen
          const caps = track.getCapabilities?.() || {};
          const adv = [];
          if (caps.focusMode?.includes("continuous")) adv.push({ focusMode: "continuous" });
          if (caps.exposureMode?.includes("continuous")) adv.push({ exposureMode: "continuous" });
          if (caps.torch !== undefined) { setTorchOk(true); }
          if (adv.length) track.applyConstraints({ advanced: adv }).catch(() => {});

          const video = videoRef.current;
          video.srcObject = stream;
          await video.play();

          // BarcodeDetector (nativ, sehr schnell) oder Fallback auf html5-qrcode
          const FORMATS = ["ean_13","ean_8","upc_a","upc_e","code_128","code_39","qr_code","itf","codabar","data_matrix"];
          let detector;
          if ("BarcodeDetector" in window) {
            try {
              detector = new BarcodeDetector({ formats: FORMATS });
            } catch { detector = null; }
          }

          if (detector) {
            // Native BarcodeDetector: scannt jeden Frame, sehr schnell
            const scan = async () => {
              if (doneRef.current) return;
              if (video.readyState >= 2) {
                try {
                  const codes = await detector.detect(video);
                  if (codes.length > 0 && !doneRef.current) {
                    doneRef.current = true;
                    navigator.vibrate?.([40, 30, 40]);
                    onScan(codes[0].rawValue);
                    return;
                  }
                } catch {}
              }
              rafRef.current = requestAnimationFrame(scan);
            };
            rafRef.current = requestAnimationFrame(scan);
          } else {
            // Fallback: html5-qrcode (voller Bildschirm, kein qrbox)
            try {
              const { Html5Qrcode } = await import("https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.esm.min.js").catch(() => ({}));
              if (!Html5Qrcode) { setErr("Scanner nicht verfügbar."); return; }
              const scanner = new Html5Qrcode("bc-fallback");
              trackRef.current._scanner = scanner;
              await scanner.start(
                { facingMode: "environment" },
                { fps: 20, qrbox: undefined },
                (text) => {
                  if (doneRef.current) return;
                  doneRef.current = true;
                  navigator.vibrate?.([40, 30, 40]);
                  onScan(text);
                },
                () => {}
              );
            } catch { setErr("Scanner konnte nicht gestartet werden."); }
          }
        };

        start();

        return () => {
          doneRef.current = true;
          cancelAnimationFrame(rafRef.current);
          stream?.getTracks().forEach(t => { try { t.applyConstraints({ advanced: [{ torch: false }] }); } catch {} t.stop(); });
        };
      }, []);

      return (
        <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "#000", overflow: "hidden" }}>
          {/* Vollbild-Video */}
          <video ref={videoRef} playsInline muted
            style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover" }} />
          <canvas ref={canvasRef} style={{ display: "none" }} />
          <div id="bc-fallback" style={{ display: "none" }} />

          {/* Scan-Linie Animation über gesamten Screen */}
          <div style={{ position: "absolute", inset: 0, pointerEvents: "none", overflow: "hidden" }}>
            <div style={{
              position: "absolute", left: 0, right: 0, height: 2,
              background: "linear-gradient(90deg, transparent, #f97316cc, #f97316, #f97316cc, transparent)",
              boxShadow: "0 0 8px #f97316aa",
              animation: "scanLine 2s ease-in-out infinite",
            }} />
          </div>

          {/* Ecken-Rahmen als visueller Hinweis (dekorativ, kein Zwang) */}
          {[["0%","0%","rotate(0deg)"],["100%","0%","rotate(90deg)"],["0%","100%","rotate(-90deg)"],["100%","100%","rotate(180deg)"]].map(([l,t,rot],i) => (
            <div key={i} style={{
              position: "absolute", left: l, top: t,
              width: 28, height: 28,
              transform: `translate(${i%2===1?"-100%":"0"}, ${i>1?"-100%":"0"}) ${rot}`,
              borderTop: "3px solid #f97316", borderLeft: "3px solid #f97316",
              borderRadius: "3px 0 0 0", pointerEvents: "none",
            }} />
          ))}

          {/* Header */}
          <div style={{ position: "absolute", top: 0, left: 0, right: 0, padding: "52px 20px 20px", background: "linear-gradient(to bottom, #000d 0%, transparent 100%)", zIndex: 2, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <div style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 800, color: "#fff" }}>
              makro<span style={{ color: "#f97316" }}>.</span>
            </div>
            <button onClick={onClose} style={{ background: "rgba(255,255,255,0.12)", backdropFilter: "blur(8px)", border: "1px solid rgba(255,255,255,0.15)", borderRadius: "50%", width: 36, height: 36, color: "#fff", fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
          </div>

          {/* Footer */}
          <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, padding: "24px 24px calc(32px + env(safe-area-inset-bottom))", background: "linear-gradient(to top, #000e 0%, transparent 100%)", zIndex: 2, display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
            {/* Taschenlampe */}
            {torchOk && (
              <button onClick={toggleTorch} style={{
                background: torch ? "#f97316" : "rgba(255,255,255,0.12)",
                backdropFilter: "blur(8px)",
                border: `1px solid ${torch ? "#f97316" : "rgba(255,255,255,0.15)"}`,
                borderRadius: "50%", width: 52, height: 52,
                display: "flex", alignItems: "center", justifyContent: "center",
                cursor: "pointer", transition: "all 0.2s",
              }}>
                <svg width="22" height="22" viewBox="0 0 24 24" fill={torch ? "#000" : "#fff"}>
                  <path d="M9 2h6l1 7H8L9 2zm-1 7h8l-2 13H8L8 9zM8 9l-2 3h2m8-3l2 3h-2"/>
                  <polygon points="8,9 16,9 14,22 10,22" fill={torch ? "#000" : "#fff"} opacity="0.9"/>
                  <rect x="9" y="2" width="6" height="7" rx="1" fill={torch ? "#000" : "#fff"}/>
                </svg>
              </button>
            )}
            <span style={{ fontFamily: "Syne", fontSize: 13, color: err ? "#f87171" : "rgba(255,255,255,0.6)", textAlign: "center" }}>
              {err || "Barcode wird automatisch erkannt"}
            </span>
          </div>

          <style>{`
            @keyframes scanLine {
              0%   { top: 10%; }
              50%  { top: 90%; }
              100% { top: 10%; }
            }
          `}</style>
        </div>
      );
    }

    function FastingStatus({ fastingFrom, fastingTo }) {
      const [now, setNow] = React.useState(new Date());
      React.useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);

      const parseT = s => { const [h, m] = (s || "12:00").split(":").map(Number); return h * 60 + m; };
      const fromMin = parseT(fastingFrom);
      const toMin   = parseT(fastingTo);
      const nowSec  = now.getHours() * 3600 + now.getMinutes() * 60 + now.getSeconds();
      const nowMin  = now.getHours() * 60 + now.getMinutes();

      const inWindow = (t, a, b) => a < b ? t >= a && t < b : t >= a || t < b;
      const until    = (target, cur) => { const d = (target - cur + 1440) % 1440; return d === 0 ? 1440 : d; };

      const isEating  = inWindow(nowMin, fromMin, toMin);
      const remaining = isEating ? until(toMin, nowMin) : until(fromMin, nowMin);
      const rh = Math.floor(remaining / 60);
      const rm = remaining % 60;
      const remStr = rh > 0 ? `${rh}h ${rm}min` : `${rm}min`;

      // ── 12-Stunden-Uhr-Mapping ─────────────────────────────────────────
      // 12:00 = oben (0°), 15:00 = rechts (90°), 18:00 = unten (180°) usw.
      const cx = 56, cy = 56, R = 40, size = 112;

      // Minuten (0-1439) → Winkel im 12h-Takt (720 min = 360°)
      const minToRad = (totalMin) => ((totalMin % 720) / 720) * 2 * Math.PI - Math.PI / 2;
      // Sekunden (0-86399) → gleicher Takt für flüssige Bewegung
      const secToRad = (totalSec) => ((totalSec % 43200) / 43200) * 2 * Math.PI - Math.PI / 2;

      const pt = (rad, r) => [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];

      // Arc von a→b im 12h-Uhrzeigersinn
      const arcD = (aMin, bMin, r) => {
        const aAngle = ((aMin % 720) / 720) * 360;
        const bAngle = ((bMin % 720) / 720) * 360;
        const span   = (bAngle - aAngle + 360) % 360;
        if (span < 0.5) return "";
        const [x1, y1] = pt(minToRad(aMin), r);
        const [x2, y2] = pt(minToRad(bMin), r);
        const large    = span > 180 ? 1 : 0;
        return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
      };

      // Fortschritts-Arc: von fromMin bis jetzt (sekundengenau)
      const nowMinFrac = nowSec / 60;
      const progressD = () => {
        const aAngle = ((fromMin % 720) / 720) * 360;
        const bAngle = ((nowMinFrac % 720) / 720) * 360;
        const span   = (bAngle - aAngle + 360) % 360;
        if (span < 0.1) return "";
        const [x1, y1] = pt(minToRad(fromMin), R);
        const secRad   = secToRad(nowSec);
        const [x2, y2] = [cx + R * Math.cos(secRad), cy + R * Math.sin(secRad)];
        const large    = span > 180 ? 1 : 0;
        return `M ${x1.toFixed(2)} ${y1.toFixed(2)} A ${R} ${R} 0 ${large} 1 ${x2.toFixed(2)} ${y2.toFixed(2)}`;
      };

      const nowRad   = secToRad(nowSec);
      const [dx, dy] = [cx + R * Math.cos(nowRad), cy + R * Math.sin(nowRad)];

      const eatSpan = (toMin - fromMin + 1440) % 1440;
      const eatH    = Math.round(eatSpan / 60);
      const fastH   = 24 - eatH;
      const nowStr  = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

      // Uhr-Beschriftungen 12, 3, 6, 9
      const clockLabels = [
        { min: 0,   label: "12" },
        { min: 180, label: "3"  },
        { min: 360, label: "6"  },
        { min: 540, label: "9"  },
      ];

      return (
        <div style={{ background: C.card, border: `1px solid ${isEating ? C.accent + "55" : C.border}`, borderRadius: 16, padding: "14px 16px", display: "flex", alignItems: "center", gap: 14 }}>
          <svg width={size} height={size} style={{ flexShrink: 0, overflow: "visible" }}>
            {/* Hintergrundring */}
            <circle cx={cx} cy={cy} r={R} fill="none" stroke={C.soft} strokeWidth={6} />
            {/* Stundenbeschriftungen */}
            {clockLabels.map(({ min, label }) => {
              const [lx, ly] = pt(minToRad(min), R - 14);
              return <text key={label} x={lx.toFixed(1)} y={(ly + 3).toFixed(1)} textAnchor="middle" fill={C.muted} fontFamily="Inter" fontSize={8} fontWeight="600">{label}</text>;
            })}
            {/* Essensfenster-Arc (gedimmt) */}
            <path d={arcD(fromMin, toMin, R)} fill="none" stroke={C.accent} strokeWidth={6} strokeLinecap="round" opacity="0.25" />
            {/* Fortschritts-Arc (hell, wenn Essenszeit) */}
            {isEating && <path d={progressD()} fill="none" stroke={C.accent} strokeWidth={6} strokeLinecap="round" />}
            {/* Pulsringe */}
            {isEating && <circle cx={dx} cy={dy} r={7} fill="none" stroke={C.accent} strokeWidth={1.5} className="fasting-pulse" />}
            {isEating && <circle cx={dx} cy={dy} r={7} fill="none" stroke={C.accent} strokeWidth={1.5} className="fasting-pulse" style={{ animationDelay: "1s" }} />}
            {/* Jetzt-Punkt */}
            <circle cx={dx} cy={dy} r={5.5} fill={isEating ? C.accent : C.muted} stroke={C.card} strokeWidth={2} />
            {/* Mitte */}
            <text x={cx} y={cy - 5} textAnchor="middle" fill={C.text} fontFamily="Syne" fontSize={12} fontWeight="800">{nowStr}</text>
            <text x={cx} y={cy + 9} textAnchor="middle" fill={C.muted} fontFamily="Inter" fontSize={8}>Uhr</text>
          </svg>

          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 800, color: isEating ? C.accent : C.text }}>
              {isEating ? "🍽 Essen erlaubt" : "💧 Fasten läuft"}
            </div>
            <div style={{ fontFamily: "Inter", fontSize: 12, color: C.muted, marginTop: 4 }}>
              Noch <span style={{ color: C.text, fontWeight: 600 }}>{remStr}</span>
              {" "}{isEating ? "bis Fastenstart" : "bis Essensbeginn"}
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
              <div style={{ background: C.accent + "20", borderRadius: 20, padding: "3px 10px", display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 6, height: 6, borderRadius: "50%", background: C.accent }} />
                <span style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, fontWeight: 700 }}>{fastingFrom}–{fastingTo} · {eatH}h essen</span>
              </div>
            </div>
            <div style={{ fontFamily: "Inter", fontSize: 10, color: C.muted, marginTop: 4, opacity: 0.6 }}>
              {fastH}h fasten · {eatH}h essen
            </div>
          </div>
        </div>
      );
    }

    function InputTab({ recipes, onSave, voiceLang, userFoods, profile }) {
      const [text, setText] = useState("");
      const [loading, setLoading] = useState(false);
      const [items, setItems] = useState([]);
      const [err, setErr] = useState(null);
      const [listening, setListening] = useState(false);
      const [transcribing, setTranscribing] = useState(false);
      const mediaRecorderRef = useRef(null);
      const chunksRef = useRef([]);
      const [scanning, setScanning] = useState(false);
      const [barcodeLoading, setBarcodeLoading] = useState(false);
      const [scannedProduct, setScannedProduct] = useState(null);
      const [barcodeWeight, setBarcodeWeight] = useState("100");
      const [barcodeErr, setBarcodeErr] = useState(null);
      const textareaRef = useRef(null);
      const [breakdownModal, setBreakdownModal] = useState(null); // { itemIdx, scaledItems }
      const [imageAnalyzing, setImageAnalyzing] = useState(false);
      const [imagePreview, setImagePreview] = useState(null);
      const imageInputRef = useRef(null);

      const resizeImage = (file, maxPx = 1024, quality = 0.85) => new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement("canvas");
          canvas.width = w; canvas.height = h;
          canvas.getContext("2d").drawImage(img, 0, 0, w, h);
          canvas.toBlob(resolve, "image/jpeg", quality);
        };
        img.src = URL.createObjectURL(file);
      });

      const handleImageCapture = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        setImagePreview(URL.createObjectURL(file));
        setImageAnalyzing(true); setErr(null); setItems([]);
        try {
          const compressed = await resizeImage(file);
          const data = await analyzeImageMeal(compressed);
          const enriched = (data.items || []).map(item => {
            if (item.source === "recipe" && item.recipe_name) {
              const r = recipes.find(r => r.name === item.recipe_name);
              if (r) {
                const si = r.items ? (typeof r.items === "string" ? JSON.parse(r.items) : r.items) : [];
                return { ...item, recipeItems: si, recipeTotalWeight: parseFloat(r.total_weight) };
              }
            }
            return item;
          });
          navigator.vibrate?.([40, 60, 40]);
          setItems(enriched);
          if (!text.trim()) setText("Foto-Analyse");
        } catch (e) { setErr("Das Bild konnte nicht analysiert werden. Bitte versuche es erneut oder gib die Mahlzeit manuell ein."); setImagePreview(null); }
        setImageAnalyzing(false);
        e.target.value = "";
      };

      // Autocomplete: extract the current word at cursor position
      const getCurrentWord = () => {
        const el = textareaRef.current;
        if (!el) return "";
        const pos = el.selectionStart;
        const before = text.slice(0, pos);
        const match = before.match(/([a-zA-ZäöüÄÖÜß]+)$/);
        return match ? match[1] : "";
      };

      const acWord = items.length === 0 && !loading ? getCurrentWord() : "";
      const acSuggestions = acWord.length >= 2 && userFoods
        ? userFoods.filter(f => f.name.toLowerCase().startsWith(acWord.toLowerCase())).slice(0, 5)
        : [];

      const applySuggestion = (food) => {
        const el = textareaRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = text.slice(0, pos);
        const after = text.slice(pos);
        const newBefore = before.replace(/([a-zA-ZäöüÄÖÜß]+)$/, food.name);
        const newText = newBefore + after;
        setText(newText);
        setTimeout(() => {
          el.focus();
          el.setSelectionRange(newBefore.length, newBefore.length);
        }, 0);
      };

      const toggleVoice = async () => {
        if (listening) {
          mediaRecorderRef.current?.stop();
          setListening(false);
          return;
        }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
          const recorder = new MediaRecorder(stream, { mimeType: mime });
          chunksRef.current = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) chunksRef.current.push(e.data); };
          recorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(chunksRef.current, { type: mime });
            setTranscribing(true);
            try {
              const auth = getAuth();
              const form = new FormData();
              const ext = mime.includes("mp4") ? "mp4" : "webm";
              form.append("audio", blob, `rec.${ext}`);
              form.append("language", voiceLang || "de");
              const res = await fetch(BACKEND_URL + "/api/transcribe", {
                method: "POST",
                headers: auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {},
                body: form,
              });
              const data = await res.json();
              if (data.text) setText(p => (p ? p + " " + data.text : data.text).slice(0, 200));
              else if (data.error) setErr("Spracherkennung fehlgeschlagen. Bitte noch einmal versuchen.");
            } catch (e) { setErr("Sprachaufnahme konnte nicht verarbeitet werden. Bitte noch einmal versuchen."); }
            setTranscribing(false);
          };
          mediaRecorderRef.current = recorder;
          recorder.start();
          setListening(true);
        } catch { setErr("Kein Mikrofon-Zugriff. Bitte erlaube den Mikrofonzugriff in den Browser-Einstellungen."); }
      };

      const handleBarcodeScan = async (barcode) => {
        setScanning(false);
        setBarcodeLoading(true);
        try {
          const data = await lookupBarcode(barcode);
          if (data.found) {
            navigator.vibrate?.([40, 60, 40]);
            setScannedProduct(data);
            setBarcodeWeight(data.serving_g ? String(data.serving_g) : "100");
          } else {
            setBarcodeErr(`Produkt nicht gefunden (${barcode})`);
          }
        } catch (e) {
          setBarcodeErr("Produkt konnte nicht gefunden werden. Bitte prüfe die Internetverbindung und versuche es erneut.");
        }
        setBarcodeLoading(false);
      };

      const addBarcodeItem = () => {
        if (!scannedProduct) return;
        const w = parseFloat(barcodeWeight);
        if (!w || w <= 0) return;
        const f = w / 100;
        const item = {
          name_de:     scannedProduct.name_de || scannedProduct.name,
          name:        scannedProduct.name_de || scannedProduct.name,
          weight_g:    w,
          kcal:        Math.round((scannedProduct.kcal_100 || 0) * f),
          protein:     Math.round((scannedProduct.protein_100 || 0) * f * 10) / 10,
          carbs:       Math.round((scannedProduct.carbs_100 || 0) * f * 10) / 10,
          fat:         Math.round((scannedProduct.fat_100 || 0) * f * 10) / 10,
          kcal_100:    scannedProduct.kcal_100 || 0,
          protein_100: scannedProduct.protein_100 || 0,
          carbs_100:   scannedProduct.carbs_100 || 0,
          fat_100:     scannedProduct.fat_100 || 0,
          barcode:     scannedProduct.barcode || null,
          source:      "barcode",
        };
        setItems(prev => [...prev, item]);
        setScannedProduct(null);
        setBarcodeWeight("100");
        navigator.vibrate?.([30]);
      };

      const analyze = async () => {
        if (!text.trim()) return;
        setLoading(true); setErr(null); setItems([]);
        try {
          const data = await analyzeMeal(text, recipes);
          const enriched = (data.items || []).map(item => {
            if (item.source === "recipe" && item.recipe_name) {
              const r = recipes.find(r => r.name === item.recipe_name);
              if (r) {
                const storedItems = r.items ? (typeof r.items === "string" ? JSON.parse(r.items) : r.items) : [];
                return { ...item, recipeItems: storedItems, recipeTotalWeight: parseFloat(r.total_weight) };
              }
            }
            return item;
          });
          setItems(enriched);
        } catch (e) { setErr("Die Mahlzeit konnte nicht analysiert werden. Bitte prüfe deine Internetverbindung und versuche es erneut."); }
        setLoading(false);
      };

      const update = (i, field, val) => setItems(p => p.map((it, idx) => {
        if (idx !== i) return it;
        if (field === "weight_g") {
          const w = parseFloat(val) || 0;
          if (w > 0) {
            if (it.kcal_100 != null) {
              return { ...it, weight_g: w, kcal: Math.round(it.kcal_100 * w / 100), protein: Math.round(it.protein_100 * w / 100 * 10) / 10, carbs: Math.round(it.carbs_100 * w / 100 * 10) / 10, fat: Math.round(it.fat_100 * w / 100 * 10) / 10 };
            } else if (it.weight_g > 0) {
              const r = w / it.weight_g;
              return { ...it, weight_g: w, kcal: Math.round(it.kcal * r), protein: Math.round(it.protein * r * 10) / 10, carbs: Math.round(it.carbs * r * 10) / 10, fat: Math.round(it.fat * r * 10) / 10 };
            }
          }
          return { ...it, weight_g: w };
        }
        return { ...it, [field]: parseFloat(val) || 0 };
      }));
      const totals = items.reduce((a, it) => ({ kcal: a.kcal + (it.kcal || it.calories || 0), protein: a.protein + (it.protein || 0), carbs: a.carbs + (it.carbs || it.carbohydrates || 0), fat: a.fat + (it.fat || 0) }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

      const save = () => {
        onSave({ id: Date.now(), raw_input: text, items, totals, timestamp: new Date().toISOString() });
        setText(""); setItems([]);
      };

      const inputStyle = { background: C.input, border: `1px solid ${C.border}`, borderRadius: 6, padding: "9px 10px", color: C.text, fontFamily: "Syne", fontSize: 14, outline: "none", width: "100%" };

      const mainContent = (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
          {profile?.diet === "intervallfasten" && (
            <FastingStatus fastingFrom={profile.fastingFrom || "12:00"} fastingTo={profile.fastingTo || "20:00"} />
          )}
          <Card>
            <textarea
              ref={textareaRef}
              value={text} onChange={e => setText(e.target.value.slice(0, 200))}
              placeholder={"Was hast du gegessen?"}
              maxLength={200}
              style={{ width: "100%", minHeight: 120, background: "transparent", border: "none", outline: "none", padding: "16px 16px 6px", color: C.text, fontFamily: "Syne", fontSize: 15, lineHeight: 1.7 }}
            />
            {acSuggestions.length > 0 && (
              <div style={{ display: "flex", gap: 6, flexWrap: "wrap", padding: "0 12px 10px" }}>
                {acSuggestions.map(f => (
                  <button key={f.id} onMouseDown={e => { e.preventDefault(); applySuggestion(f); }}
                    style={{ fontFamily: "Syne", fontSize: 12, fontWeight: 600, padding: "4px 10px", borderRadius: 16, background: "#1a1a2e", border: `1px solid ${C.accent}44`, color: C.accent, cursor: "pointer" }}>
                    {f.name}
                    <span style={{ fontFamily: "Inter", fontSize: 10, color: C.muted, marginLeft: 5 }}>{Math.round(f.kcal_100)} kcal</span>
                  </button>
                ))}
              </div>
            )}
            {transcribing && <div style={{ padding: "2px 16px 6px", fontFamily: "Syne", fontSize: 13, color: C.muted, fontStyle: "italic" }} className="pulsing">Whisper erkennt Sprache…</div>}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 16px 10px" }}>
              {text.length > 0
                ? <button onClick={() => setText("")} style={{ background: "none", border: "none", padding: 0, fontFamily: "Syne", fontSize: 11, color: C.muted, cursor: "pointer", opacity: 0.6 }}>✕ clear</button>
                : <span />
              }
              <span style={{ fontFamily: "Inter", fontSize: 10, color: text.length >= 180 ? (text.length >= 200 ? C.danger : C.accent) : C.muted }}>{text.length}/200</span>
            </div>
            <div style={{ padding: "8px 12px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${C.border}`, gap: 8 }}>
              <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                <button onClick={toggleVoice} disabled={transcribing} style={{ background: listening ? "#f8717122" : transcribing ? "#f59e0b22" : "transparent", border: `1px solid ${listening ? C.danger : transcribing ? C.accent : C.border}`, borderRadius: 8, padding: "8px 12px", color: listening ? C.danger : transcribing ? C.accent : C.muted, display: "flex", alignItems: "center", gap: 6 }}>
                  <svg className={listening || transcribing ? "pulsing" : ""} width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round"/><line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                  {listening && <Mono size={11} color={C.danger}>Aufnahme…</Mono>}
                  {transcribing && <Mono size={11} color={C.accent}>Erkennt…</Mono>}
                </button>
                <button onClick={() => imageInputRef.current?.click()} disabled={imageAnalyzing} style={{ background: imageAnalyzing ? "#a78bfa22" : "transparent", border: `1px solid ${imageAnalyzing ? "#a78bfa" : C.border}`, borderRadius: 8, padding: "8px 12px", color: imageAnalyzing ? "#a78bfa" : C.muted, display: "flex", alignItems: "center" }}>
                  {imageAnalyzing
                    ? <span className="pulsing" style={{ fontSize: 16 }}>◈</span>
                    : <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                  }
                </button>
                <input ref={imageInputRef} type="file" accept="image/*" capture="environment" onChange={handleImageCapture} style={{ display: "none" }} />
                <button onClick={() => setScanning(true)} disabled={barcodeLoading} style={{ background: barcodeLoading ? "#f59e0b22" : "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: C.muted, display: "flex", alignItems: "center" }}>
                  {barcodeLoading
                    ? <span className="pulsing" style={{ fontSize: 16 }}>⬛</span>
                    : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="8" y="4" width="2" height="16"/><rect x="12" y="4" width="1" height="16"/><rect x="15" y="4" width="2" height="16"/><rect x="19" y="4" width="1" height="16"/><rect x="22" y="4" width="1" height="16"/></svg>
                  }
                </button>
              </div>
              <Btn onClick={analyze} disabled={loading || !text.trim()} small>{loading ? "…" : "Analysieren →"}</Btn>
            </div>
          </Card>

          {loading && <AnalyzingIndicator />}
          {imageAnalyzing && (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 10 }}>
              {imagePreview && <img src={imagePreview} alt="" style={{ width: "100%", maxHeight: 200, objectFit: "cover", borderRadius: 12, border: `1px solid ${C.border}` }} />}
              <AnalyzingIndicator />
            </div>
          )}
          {!imageAnalyzing && imagePreview && items.length > 0 && (
            <img src={imagePreview} alt="" style={{ width: "100%", maxHeight: 160, objectFit: "cover", borderRadius: 12, border: `1px solid ${C.border}`, cursor: "pointer" }} onClick={() => setImagePreview(null)} />
          )}
          {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}

          {recipes.length > 0 && !loading && (
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
              <span style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1 }}>Mealprep:</span>
              {recipes.map(r => (
                <button key={r.id} onClick={() => {
                  const w = parseFloat(r.portion_g) || parseFloat(r.total_weight) || 100;
                  const k100 = parseFloat(r.kcal_100) || 0;
                  const p100 = parseFloat(r.protein_100) || 0;
                  const c100 = parseFloat(r.carbs_100) || 0;
                  const f100 = parseFloat(r.fat_100) || 0;
                  const kcal    = Math.round(k100 * w / 100);
                  const protein = Math.round(p100 * w / 100 * 10) / 10;
                  const carbs   = Math.round(c100 * w / 100 * 10) / 10;
                  const fat     = Math.round(f100 * w / 100 * 10) / 10;
                  const totalW  = parseFloat(r.total_weight) || w;
                  const recipeItemsStored = r.items ? (typeof r.items === "string" ? JSON.parse(r.items) : r.items) : [];
                  const newItem = { name_de: r.name, weight_g: w, kcal, protein, carbs, fat, kcal_100: k100, protein_100: p100, carbs_100: c100, fat_100: f100, source: "recipe", recipeItems: recipeItemsStored, recipeTotalWeight: totalW };
                  setText(p => p.trim() ? p.trim() + "\n" + r.name : r.name);
                  setItems(p => [...p, newItem]);
                }}
                  style={{ fontFamily: "Syne", fontSize: 12, fontWeight: 600, padding: "5px 12px", borderRadius: 20, background: C.card, border: `1px solid ${C.border}`, color: C.text, cursor: "pointer" }}>
                  {r.name}
                </button>
              ))}
            </div>
          )}

          {items.length > 0 && (
            <div className="fade-up" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <SectionLabel>Erkannte Lebensmittel — tippen zum Bearbeiten</SectionLabel>
              {items.map((item, i) => (
                <Card key={i} style={{ padding: "12px 14px" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                    <div style={{ flex: 1 }}>
                      {item.source === "recipe" && item.recipeItems && item.recipeItems.length > 0 ? (
                        <button onClick={() => {
                          const ratio = parseFloat(item.weight_g) / (parseFloat(item.recipeTotalWeight) || parseFloat(item.weight_g));
                          const scaled = item.recipeItems.map(ri => ({ ...ri, weight_g: Math.round(ri.weight_g * ratio * 10) / 10, kcal: Math.round((ri.kcal||0) * ratio * 10) / 10, protein: Math.round((ri.protein||0) * ratio * 10) / 10, carbs: Math.round((ri.carbs||0) * ratio * 10) / 10, fat: Math.round((ri.fat||0) * ratio * 10) / 10 }));
                          setBreakdownModal({ itemIdx: i, scaledItems: scaled });
                        }} style={{ background: "none", border: "none", padding: 0, color: C.text, fontFamily: "Syne", fontSize: 14, fontWeight: 700, cursor: "pointer", textAlign: "left", textDecoration: "underline", textDecorationColor: C.border }}>
                          {item.name_de || item.name}
                        </button>
                      ) : (
                        <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text }}>{item.name_de || item.name}</span>
                      )}
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontFamily: "Inter", fontSize: 10, padding: "2px 7px", borderRadius: 4, background: item.found ? "#34d39918" : "#f8717118", color: item.found ? C.carbs : C.danger }}>{item.source === "recipe" ? "rezept" : item.source === "personal" ? "eigen" : item.source === "barcode" ? "scan" : item.source === "cache" || item.source === "off" ? "db" : item.found ? "ki" : "?"}</span>
                      <button onClick={() => setItems(p => p.filter((_, idx) => idx !== i))} style={{ background: "none", border: "none", color: "#f8717150", fontSize: 16, padding: "2px 4px" }}>✕</button>
                    </div>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 8 }}>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>Gramm</div>
                      <input type="text" inputMode="decimal" value={item.weight_g} onChange={e => update(i, "weight_g", e.target.value)} style={{ ...inputStyle, fontFamily: "Inter", fontSize: 13, color: C.text, padding: "6px 8px" }} />
                    </div>
                    {MACROS.map(m => (
                      <div key={m}>
                        <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>{m}</div>
                        <input type="text" inputMode="decimal" value={item[m] ? Math.round(item[m] * 10) / 10 : ""} placeholder="0" onChange={e => update(i, m, e.target.value)} style={{ ...inputStyle, fontFamily: "Inter", fontSize: 13, color: MC[m], padding: "6px 8px" }} />
                      </div>
                    ))}
                  </div>
                </Card>
              ))}
              <Card accent style={{ padding: "12px 14px" }}>
                <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                  {MACROS.map(m => (
                    <div key={m} style={{ textAlign: "center" }}>
                      <Mono size={18} color={MC[m]} bold>{Math.round(totals[m])}</Mono>
                      <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted, marginTop: 2 }}>{UNITS[m]}</div>

        </div>
      );

      // Alle Barcode-Overlays via Portal direkt in document.body (iOS overflow:auto fix)
      const portal = ReactDOM.createPortal(
        <>
          {scanning && <BarcodeScanner onScan={handleBarcodeScan} onClose={() => setScanning(false)} />}

          {barcodeLoading && (
            <div style={{ position: "fixed", inset: 0, background: "#000d", zIndex: 190, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <div className="pulsing" style={{ fontFamily: "Syne", fontSize: 15, color: C.accent }}>Produkt wird gesucht…</div>
            </div>
          )}

          {barcodeErr && (
            <div style={{ position: "fixed", inset: 0, background: "#000d", zIndex: 190, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, gap: 16 }}>
              <div style={{ fontFamily: "Syne", fontSize: 14, color: C.danger, textAlign: "center" }}>{barcodeErr}</div>
              <Btn onClick={() => setBarcodeErr(null)} small>OK</Btn>

          {scannedProduct && (
            <div onClick={() => setScannedProduct(null)} style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", zIndex: 190 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: C.surface, borderRadius: "20px 20px 0 0", padding: "20px 16px", width: "100%", maxWidth: 500, margin: "0 auto", border: `1px solid ${C.border}`, paddingBottom: "calc(20px + env(safe-area-inset-bottom))" }}>
