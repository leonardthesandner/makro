    function UserFoodsTab({ userFoods, onAdd, onUpdate, onDelete }) {
      const [showAdd, setShowAdd] = useState(false);
      const [addForm, setAddForm] = useState({ name: "", kcal_100: "", protein_100: "", carbs_100: "", fat_100: "" });
      const [editId, setEditId] = useState(null);
      const [editForm, setEditForm] = useState({});
      const [saving, setSaving] = useState(false);
      const [search, setSearch] = useState("");

      const startEdit = (f) => {
        setEditId(f.id);
        setEditForm({ name: f.name, kcal_100: String(parseFloat(f.kcal_100)), protein_100: String(parseFloat(f.protein_100)), carbs_100: String(parseFloat(f.carbs_100)), fat_100: String(parseFloat(f.fat_100)) });
      };

      const saveEdit = async () => {
        setSaving(true);
        await onUpdate(editId, { name: editForm.name, kcal_100: parseFloat(editForm.kcal_100)||0, protein_100: parseFloat(editForm.protein_100)||0, carbs_100: parseFloat(editForm.carbs_100)||0, fat_100: parseFloat(editForm.fat_100)||0 });
        setEditId(null); setSaving(false);
      };

      const saveAdd = async () => {
        if (!addForm.name.trim() || !addForm.kcal_100) return;
        setSaving(true);
        await onAdd({ name: addForm.name.trim(), kcal_100: parseFloat(addForm.kcal_100)||0, protein_100: parseFloat(addForm.protein_100)||0, carbs_100: parseFloat(addForm.carbs_100)||0, fat_100: parseFloat(addForm.fat_100)||0 });
        setAddForm({ name: "", kcal_100: "", protein_100: "", carbs_100: "", fat_100: "" });
        setShowAdd(false); setSaving(false);
      };

      const sorted = [...userFoods].sort((a, b) => a.name.localeCompare(b.name, "de", { sensitivity: "base" }));
      const filtered = search.trim()
        ? sorted.filter(f => f.name.toLowerCase().includes(search.trim().toLowerCase()))
        : sorted;

      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <SectionLabel>Eigene Lebensmittel ({userFoods.length})</SectionLabel>
            {!showAdd && <Btn onClick={() => { setShowAdd(true); setEditId(null); }} small variant="ghost">+ Hinzufügen</Btn>}
          </div>

          {userFoods.length > 0 && (
            <div style={{ position: "relative" }}>
              <input
                type="text"
                placeholder="Suchen…"
                value={search}
                onChange={e => setSearch(e.target.value)}
                style={{ background: C.input, border: `1px solid ${C.border}`, borderRadius: 8, padding: "9px 36px 9px 12px", color: C.text, fontFamily: "Syne", fontSize: 14, outline: "none", width: "100%" }}
              />
              {search && (
                <button onClick={() => setSearch("")} style={{ position: "absolute", right: 10, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: C.muted, fontSize: 16, cursor: "pointer", padding: 2 }}>✕</button>
              )}
            </div>
          )}

          {showAdd && (
            <Card accent style={{ padding: 14 }}>
              <div style={{ fontFamily: "Syne", fontSize: 12, color: C.accent, marginBottom: 10 }}>Neues Lebensmittel</div>
              <FoodForm form={addForm} setForm={setAddForm} onSave={saveAdd} onCancel={() => setShowAdd(false)} saveLabel="Speichern ✓" saving={saving} />
            </Card>
          )}

          {userFoods.length === 0 && !showAdd && (
            <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.9 }}>
              Noch keine eigenen Lebensmittel.<br />Füge Produkte hinzu – sie werden<br />beim Tracken automatisch zuerst<br />verwendet.
            </div>
          )}

          {filtered.length === 0 && search.trim() && (
            <div style={{ textAlign: "center", padding: 24, color: C.muted, fontFamily: "Syne", fontSize: 13 }}>
              Kein Treffer für „{search}"
            </div>
          )}

          {filtered.map(f => (
            <Card key={f.id} onClick={() => editId !== f.id && (startEdit(f), setShowAdd(false))} style={{ padding: "12px 14px", cursor: editId === f.id ? "default" : "pointer" }}>
              {editId === f.id ? (
                <FoodForm form={editForm} setForm={setEditForm} onSave={saveEdit} onCancel={() => setEditId(null)} saveLabel="Speichern ✓" saving={saving} />
              ) : (
                <>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                    <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text, flex: 1 }}>{f.name}</span>
                    <button onClick={ev => { ev.stopPropagation(); onDelete(f.id); }} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 16, padding: 4 }}>✕</button>
                  </div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                    {[["kcal", "kcal", C.kcal], ["protein_100", "Eiweiß", C.protein], ["carbs_100", "KH", C.carbs], ["fat_100", "Fett", C.fat]].map(([key, label, color]) => (
                      <div key={key} style={{ textAlign: "center" }}>
                        <Mono size={14} color={color} bold>{Math.round(parseFloat(f[key === "kcal" ? "kcal_100" : key]) * 10) / 10}</Mono>
                        <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>{label}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginTop: 6 }}>pro 100g</div>
                </>
              )}
            </Card>
          ))}
        </div>
      );
    }

    // ─── Subscription helpers ────────────────────────────────────────────────
    const TRIAL_DAYS = 3;
    function getTrialStart() { return store.get("mk_trial_start") || null; }
    function initTrialStart() {
      if (!store.get("mk_trial_start")) store.set("mk_trial_start", Date.now());
    }
    function calcSub() {
      const isPro = store.get("mk_is_pro") === true;
      const ts = getTrialStart();
      const elapsed = ts ? Date.now() - ts : Infinity;
      const isTrial = elapsed < TRIAL_DAYS * 86400000;
      const daysLeft = ts ? Math.max(0, TRIAL_DAYS - Math.floor(elapsed / 86400000)) : 0;
      return { isPro, isTrial, daysLeft, hasAccess: isPro || isTrial };
    }

    // ─── PaywallModal ─────────────────────────────────────────────────────────
    function PaywallModal({ feature, onClose, onSubscribe }) {
      const { daysLeft, isPro } = calcSub();
      const trialEnded = !isPro && daysLeft === 0;

      const proFeatures = [
        { icon: "◈", label: "Verlauf & Ernährungsanalyse" },
        { icon: "⬡", label: "Rezepte erstellen & speichern" },
        { icon: "◫", label: "Eigene Lebensmittel" },
        { icon: "⏱️", label: "Intervallfasten-Ring" },
        { icon: "∞", label: "Unbegrenzte Einträge pro Tag" },
        { icon: "🚴", label: "Strava-Synchronisation" },
      ];

      return ReactDOM.createPortal(
        <div style={{ position: "fixed", inset: 0, zIndex: 999, display: "flex", flexDirection: "column", background: C.bg }}>
          {/* Header gradient */}
          <div style={{ background: "linear-gradient(160deg, #f97316 0%, #dc2626 100%)", padding: "48px 28px 36px", position: "relative" }}>
            <button onClick={onClose} style={{ position: "absolute", top: 16, right: 16, background: "none", border: "none", color: "#fff9", fontSize: 22, cursor: "pointer", padding: 8 }}>✕</button>
            <div style={{ fontFamily: "Syne", fontSize: 32, fontWeight: 800, color: "#fff", letterSpacing: -1 }}>makro<span style={{ opacity: 0.85 }}>.</span></div>
            <div style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: "#ffffffbb", letterSpacing: 2, textTransform: "uppercase", marginTop: 2 }}>Pro</div>
            <div style={{ fontFamily: "Inter", fontSize: 16, color: "#fff", marginTop: 20, lineHeight: 1.5, maxWidth: 280 }}>
              {trialEnded
                ? "Deine 3 Tage Gratis-Test sind abgelaufen."
                : feature
                  ? `"${feature}" ist ein Pro-Feature.`
                  : "Schalte alle Features frei."}
            </div>
          </div>

          {/* Features */}
          <div style={{ flex: 1, overflowY: "auto", padding: "24px 24px 0" }}>
            <div style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, textTransform: "uppercase", letterSpacing: 1.5, marginBottom: 14 }}>Alles inklusive mit Pro</div>
            {proFeatures.map(f => (
              <div key={f.label} style={{ display: "flex", alignItems: "center", gap: 14, padding: "11px 0", borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 16, width: 24, textAlign: "center" }}>{f.icon}</span>
                <span style={{ fontFamily: "Inter", fontSize: 14, color: C.text }}>{f.label}</span>
                <span style={{ marginLeft: "auto", color: "#f97316", fontSize: 14 }}>✓</span>
              </div>
            ))}

            {/* Price */}
            <div style={{ marginTop: 24, background: "#f9731610", border: "1px solid #f9731630", borderRadius: 14, padding: "18px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
              <div>
                <div style={{ fontFamily: "Syne", fontSize: 13, color: C.muted }}>Monatlich kündbar</div>
                <div style={{ fontFamily: "Inter", fontSize: 11, color: C.muted, marginTop: 2 }}>3 Tage kostenlos testen</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 800, color: "#f97316" }}>2,49 €</div>
                <div style={{ fontFamily: "Inter", fontSize: 11, color: C.muted }}>pro Monat</div>
              </div>
            </div>
          </div>

          {/* CTA */}
          <div style={{ padding: "20px 24px 32px", paddingBottom: "max(32px, env(safe-area-inset-bottom))" }}>
            <button onClick={onSubscribe} style={{ width: "100%", background: "linear-gradient(90deg, #f97316, #dc2626)", border: "none", borderRadius: 14, padding: "16px", fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: "#fff", cursor: "pointer", letterSpacing: 0.3 }}>
              Jetzt 3 Tage kostenlos testen
            </button>
            <div onClick={onClose} style={{ textAlign: "center", marginTop: 14, fontFamily: "Inter", fontSize: 13, color: C.muted, cursor: "pointer" }}>
              Vielleicht später
            </div>
          </div>
        </div>,
        document.body
      );
    }

    // ─── BlurGate — geblurrter Inhalt mit Upgrade-Overlay ────────────────────
    function BlurGate({ locked, feature, onUnlock, children }) {
      if (!locked) return children;
      return (
        <div style={{ position: "relative", height: "100%", overflow: "hidden" }}>
          {/* Geblurrter Inhalt */}
          <div style={{ filter: "blur(5px)", pointerEvents: "none", userSelect: "none", height: "100%", overflow: "hidden", opacity: 0.7 }}>
            {children}
          </div>
          {/* Overlay */}
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: "linear-gradient(to bottom, transparent 0%, rgba(12,12,12,0.7) 30%, rgba(12,12,12,0.92) 100%)", padding: 32, gap: 12 }}>
            <div style={{ fontSize: 36, marginBottom: 4 }}>🔒</div>
            <div style={{ fontFamily: "Syne", fontSize: 20, fontWeight: 800, color: "#fff", textAlign: "center", letterSpacing: -0.5 }}>
              makro<span style={{ color: "#f97316" }}>.</span> Pro
            </div>
            <div style={{ fontFamily: "Inter", fontSize: 14, color: "#aaa", textAlign: "center", lineHeight: 1.6, maxWidth: 260 }}>
              {feature} ist Teil von Pro — teste 3 Tage kostenlos.
            </div>
            <button onClick={onUnlock} style={{ marginTop: 10, background: "linear-gradient(90deg, #f97316, #dc2626)", border: "none", borderRadius: 14, padding: "14px 36px", fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: "#fff", cursor: "pointer", letterSpacing: 0.2 }}>
              Jetzt freischalten
            </button>
            <div onClick={onUnlock} style={{ fontFamily: "Inter", fontSize: 12, color: "#555", cursor: "pointer", marginTop: 2 }}>
              3 Tage kostenlos · danach 2,49 €/Monat
            </div>
          </div>
        </div>
      );
    }

    const TABS = [
      { id: "input",     label: "Eingabe",  sym: "✦" },
      { id: "today",     label: "Heute",    sym: "◉" },
      { id: "history",   label: "Verlauf",  sym: "◈" },
      { id: "mealprep",  label: "Mealprep", sym: "⬡" },
      { id: "userfoods", label: "Eigene",   sym: "◫" },
    ];

    function App() {
      const [theme, setTheme] = useState(() => store.get("mk_theme") || "dark");
      // Update global C before every render so all children see the right colors
      Object.assign(C, theme === "light" ? LIGHT_C : DARK_C);
      Object.assign(MC, { kcal: C.kcal, protein: C.protein, carbs: C.carbs, fat: C.fat });
      useEffect(() => { document.body.style.background = C.bg; document.body.style.color = C.text; }, [theme]);
      const [auth, setAuth] = useState(() => getAuth());
      const [tab, setTab] = useState("input");
      const [targets, setTargets] = useState(() => store.get("mk_targets") || DEFAULT_TARGETS);
      const [entries, setEntries] = useState([]);
      const [recipes, setRecipes] = useState([]);
      const [archive, setArchive] = useState([]);
      const [settings, setSettings] = useState(false);
      const [stravaToast, setStravaToast] = useState(() => {
        const p = new URLSearchParams(window.location.search);
        if (p.get("strava") === "connected") { window.history.replaceState({}, "", window.location.pathname); return "connected"; }
        if (p.get("strava") === "error")     { window.history.replaceState({}, "", window.location.pathname); return "error"; }
        return null;
      });
      useEffect(() => { if (stravaToast) { setTimeout(() => setStravaToast(null), 4000); } }, [stravaToast]);
      const [onboarding, setOnboarding] = useState(false);
      const [profile, setProfile] = useState(() => store.get("mk_profile") || null);
      const [voiceLang, setVoiceLang] = useState(() => store.get("mk_voicelang") || "de");
      const [editingEntry, setEditingEntry] = useState(null);
      const [userFoods, setUserFoods] = useState([]);
      const [burnedToday, setBurnedToday] = useState(0);
      const [todayWeight, setTodayWeight] = useState(0);
      const [stravaToday, setStravaToday] = useState([]);
      const [sub, setSub] = useState(() => calcSub());
      const [paywall, setPaywall] = useState(null); // null | feature string
      const openPaywall = (feature = null) => setPaywall(feature || "");
      const closePaywall = () => setPaywall(null);
      const handleSubscribe = async () => {
        // TODO: Replace with RevenueCat purchase call when Play Console is ready
        try {
          const s = await activateSubscription();
          if (s) { setSub(s); closePaywall(); }
        } catch { alert("Fehler beim Aktivieren, bitte erneut versuchen."); }
      };

      // Load all data on auth
      useEffect(() => {
        if (!auth) return;

        // Load subscription status from backend (nur lesen, nicht initialisieren)
        fetchSubscription()
          .then(s => { if (s) setSub(s); })
          .catch(() => {});

        // Load today's entries
        loadDiaryEntries(todayStr())
          .then(r => setEntries(r))
          .catch(() => {});

        // Load today's burned kcal + weight
        loadBodyWeightRange(todayStr(), todayStr())
          .then(r => {
            if (r[0]?.burned_kcal) setBurnedToday(parseFloat(r[0].burned_kcal) || 0);
            if (r[0]?.weight_kg)   setTodayWeight(parseFloat(r[0].weight_kg) || 0);
          })
          .catch(() => {});

        // Load today's Strava activities
        loadStravaActivities(todayStr(), todayStr())
          .then(acts => setStravaToday(acts || []))
          .catch(() => {});

        // Load recipes
        loadRecipes()
          .then(r => setRecipes(r))
          .catch(() => setRecipes(store.get("mk_recipes") || []));

        // Load archive
        loadArchive()
          .then(r => setArchive(r))
          .catch(() => setArchive(store.get("mk_mealprep_archive") || []));

        // Load personal foods
        loadUserFoods()
          .then(r => setUserFoods(r))
          .catch(() => {});

        // Load settings/targets
        loadSettings()
          .then(data => {
            if (data?.targets) { setTargets(data.targets); store.set("mk_targets", data.targets); }
            if (data?.profile) { setProfile(data.profile); store.set("mk_profile", data.profile); }
            if (data?.voiceLang) { setVoiceLang(data.voiceLang); store.set("mk_voicelang", data.voiceLang); }
            if (!data?.onboarding_done) setOnboarding(true);
          })
          .catch(() => {});
      }, [auth]);

      const handleAuth = async (data) => {
        setAuth(data);
        try {
          const s = await fetchSubscription();
          if (s) setSub(s);
        } catch { setSub(calcSub()); }
      };

      const logout = () => {
        clearAuth();
        setAuth(null);
        setRecipes([]);
        setEntries([]);
        setArchive([]);
      };

      const handleDeleteAccount = async () => {
        await deleteAccount();
        logout();
      };

      // Entry functions
      const addEntryForDate = async (date, entry) => {
        try {
          const saved = await saveDiaryEntry(date, entry);
          loadUserFoods().then(r => setUserFoods(r)).catch(() => {});
          return saved;
        } catch { return entry; }
      };

      const addEntry = async (entry) => {
        if (!sub.hasAccess && entries.length >= 5) { openPaywall("Unbegrenzte Einträge"); return; }
        try {
          const saved = await saveDiaryEntry(todayStr(), entry);
          setEntries(p => [...p, saved]);
          // Persönliche DB im Hintergrund aktualisieren
          loadUserFoods().then(r => setUserFoods(r)).catch(() => {});
        } catch {
          setEntries(p => [...p, entry]);
        }
        setTab("today");
      };

      const deleteEntry = async (id) => {
        setEntries(p => p.filter(e => e.id !== id));
        deleteDiaryEntry(id).catch(() => {});
      };

      const editEntry = async (updated) => {
        try {
          const saved = await updateDiaryEntry(updated.id, updated);
          setEntries(p => p.map(e => e.id === saved.id ? saved : e));
        } catch {
          setEntries(p => p.map(e => e.id === updated.id ? updated : e));
        }
        setEditingEntry(null);
      };

      // Recipe functions
      const addRecipe = async (recipe) => {
        try {
          const saved = await saveRecipeToServer(recipe);
          setRecipes(p => [...p, saved]);
        } catch {
          const local = { ...recipe, id: Date.now() };
          setRecipes(p => [...p, local]);
        }
      };

      const removeRecipe = async (id) => {
        setRecipes(p => p.filter(r => r.id !== id));
        deleteRecipeFromServer(id).catch(() => {});
      };

      const editRecipe = async (id, data) => {
        try {
          const saved = await updateRecipeOnServer(id, data);
          setRecipes(p => p.map(r => r.id === saved.id ? saved : r));
          return saved;
        } catch {
          // Offline-Fallback: kcal_100 etc. aus data übernehmen (bereits in saveEditRecipe berechnet)
          const updated = { ...data, id };
          setRecipes(p => p.map(r => r.id === id ? updated : r));
          return updated;
        }
      };

      // Archive functions
      const archiveRecipe = async (recipe) => {
        const withTs = { ...recipe, archived_at: new Date().toISOString() };
        try {
          const saved = await saveToArchive(withTs);
          setArchive(p => [...p, saved]);
        } catch {
          setArchive(p => [...p, withTs]);
        }
        removeRecipe(recipe.id);
      };

      // Persönliche Lebensmittel
      const addUserFood = async (food) => {
        const saved = await addUserFoodAPI(food);
        setUserFoods(p => [saved, ...p]);
      };
      const updateUserFood = async (id, food) => {
        const saved = await updateUserFoodAPI(id, food);
        setUserFoods(p => p.map(f => f.id === saved.id ? saved : f));
      };
      const deleteUserFood = async (id) => {
        setUserFoods(p => p.filter(f => f.id !== id));
        deleteUserFoodAPI(id).catch(() => {});
      };

      // Settings
      const updateSettings = (t, p, vl) => {
        setTargets(t);
        store.set("mk_targets", t);
        if (p) { setProfile(p); store.set("mk_profile", p); }
        if (vl) { setVoiceLang(vl); store.set("mk_voicelang", vl); }
        saveSettings(t, { ...(p ? { profile: p } : {}), ...(vl ? { voiceLang: vl } : {}) }).catch(() => {});
      };

      const [slideDir, setSlideDir] = useState("right");
      const [outTab, setOutTab] = useState(null);
      const swipeRef = useRef({});
      const TAB_IDS = TABS.map(t => t.id);
      const PRO_TABS = { history: "Verlauf", mealprep: "Rezepte", userfoods: "Eigene Lebensmittel" };
      const changeTab = (newId) => {
        if (newId === tab || outTab) return;
        const dir = TAB_IDS.indexOf(newId) > TAB_IDS.indexOf(tab) ? "right" : "left";
        setSlideDir(dir);
        setOutTab(tab);
        setTab(newId);
      };
      const onAnimEnd = () => setOutTab(null);
      const onTouchStart = (e) => {
        swipeRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      };
      const onTouchEnd = (e) => {
        const dx = e.changedTouches[0].clientX - swipeRef.current.x;
        const dy = e.changedTouches[0].clientY - swipeRef.current.y;
        if (Math.abs(dx) < 60 || Math.abs(dx) < Math.abs(dy)) return;
        const idx = TAB_IDS.indexOf(tab);
        if (dx < 0 && idx < TAB_IDS.length - 1) changeTab(TAB_IDS[idx + 1]);
        if (dx > 0 && idx > 0) changeTab(TAB_IDS[idx - 1]);
      };

      const resetToken = new URLSearchParams(window.location.search).get("reset");
      if (!auth || resetToken) return <AuthScreen onAuth={handleAuth} initialResetToken={resetToken} />;

      if (onboarding) return (
        <OnboardingModal onComplete={(t, p) => {
          setTargets(t);
          store.set("mk_targets", t);
          if (p) { setProfile(p); store.set("mk_profile", p); }
          saveSettings(t, { onboarding_done: true, ...(p ? { profile: p } : {}) }).catch(() => {});
          setOnboarding(false);
        }} />
      );

      return (
        <div style={{ height: "100vh", height: "-webkit-fill-available", background: C.bg, display: "flex", flexDirection: "column", color: C.text, maxWidth: 500, margin: "0 auto" }}>
          <div style={{ height: "env(safe-area-inset-top)", background: C.bg, flexShrink: 0 }} />
          <div style={{ padding: "12px 16px 10px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: `1px solid ${C.border}`, flexShrink: 0 }}>
            <div>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <div onClick={() => setTab("input")} style={{ fontFamily: "Syne", fontSize: 22, fontWeight: 800, letterSpacing: -1, color: C.text, cursor: "pointer" }}>
                  makro<span style={{ color: C.accent }}>.</span>
                </div>
                {sub.isTrial && <span onClick={() => openPaywall()} style={{ fontFamily: "Inter", fontSize: 10, fontWeight: 600, background: "#f9731618", color: "#f97316", border: "1px solid #f9731630", borderRadius: 6, padding: "2px 7px", cursor: "pointer" }}>TEST · {sub.daysLeft}T</span>}
                {!sub.hasAccess && <span onClick={() => openPaywall()} style={{ fontFamily: "Inter", fontSize: 10, fontWeight: 600, background: "#f8717118", color: C.danger, border: "1px solid #f8717130", borderRadius: 6, padding: "2px 7px", cursor: "pointer" }}>FREE</span>}
                {sub.isPro && <span style={{ fontFamily: "Inter", fontSize: 10, fontWeight: 600, background: "#f9731618", color: "#f97316", border: "1px solid #f9731630", borderRadius: 6, padding: "2px 7px" }}>PRO</span>}
              </div>
              <Mono size={10} color={C.muted}>{new Date().toLocaleDateString("de-DE", { weekday: "long", day: "numeric", month: "long" })}</Mono>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={logout} title={auth?.user?.email} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", color: C.muted, fontFamily: "Syne", fontSize: 12 }}>Logout</button>
              <button onClick={() => setSettings(true)} style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 10, padding: "8px 12px", color: C.muted, fontSize: 16 }}>⚙</button>
            </div>
          </div>
          <div style={{ flex: 1, overflow: "hidden", position: "relative" }} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
            {/* InputTab always mounted — shown as positioned panel when active or animating */}
            <div style={tab === "input" || outTab === "input" ? { position: "absolute", inset: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", zIndex: 1 } : { display: "none" }}
              className={tab === "input" && outTab ? `slide-from-${slideDir}` : outTab === "input" ? `slide-to-${slideDir === "right" ? "left" : "right"}` : ""}
              onAnimationEnd={outTab === "input" ? onAnimEnd : undefined}>
              <InputTab recipes={recipes} onSave={addEntry} voiceLang={voiceLang} userFoods={userFoods} profile={profile} />
            </div>
            {/* Incoming non-input tab */}
            {tab !== "input" && (
              <div key={"in-" + tab} style={{ position: "absolute", inset: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", zIndex: 1 }}
                className={outTab ? `slide-from-${slideDir}` : ""}>
                {tab === "today"     && <TodayTab entries={entries} targets={targets} onDelete={deleteEntry} onEdit={e => setEditingEntry(e)} burnedKcal={burnedToday} onSaveBurned={async (v) => { await saveBodyWeightAPI(todayStr(), null, v); setBurnedToday(v); }} todayWeight={todayWeight} onSaveWeight={async (v) => { await saveBodyWeightAPI(todayStr(), v, null); setTodayWeight(v); }} stravaActivities={stravaToday} onDeleteStrava={async (id) => { await deleteStravaActivityAPI(id); setStravaToday(p => p.filter(a => a.strava_id !== id)); }} />}
                {tab === "mealprep"  && <BlurGate locked={!sub.hasAccess} feature="Rezepte" onUnlock={() => openPaywall("Rezepte")}><MealprepTab recipes={recipes} onAdd={addRecipe} onEdit={editRecipe} onDelete={removeRecipe} onArchive={archiveRecipe} archive={archive} voiceLang={voiceLang} userFoods={userFoods} /></BlurGate>}
                {tab === "history"   && <BlurGate locked={!sub.hasAccess} feature="Verlauf" onUnlock={() => openPaywall("Verlauf")}><HistoryTab targets={targets} loadRange={loadDiaryRange} loadDay={loadDiaryEntries} onDelete={deleteEntry} updateEntry={updateDiaryEntry} loadBodyWeights={loadBodyWeightRange} saveBodyWeight={saveBodyWeightAPI} onAdd={addEntryForDate} recipes={recipes} userFoods={userFoods} voiceLang={voiceLang} loadActivities={loadStravaActivities} onDeleteStrava={async (id) => { await deleteStravaActivityAPI(id); }} /></BlurGate>}
                {tab === "userfoods" && <BlurGate locked={!sub.hasAccess} feature="Eigene Lebensmittel" onUnlock={() => openPaywall("Eigene Lebensmittel")}><UserFoodsTab userFoods={userFoods} onAdd={addUserFood} onUpdate={updateUserFood} onDelete={deleteUserFood} /></BlurGate>}
              </div>
            )}
            {/* Outgoing non-input tab */}
            {outTab && outTab !== "input" && (
              <div key={"out-" + outTab} style={{ position: "absolute", inset: 0, overflowY: "auto", WebkitOverflowScrolling: "touch", zIndex: 1 }}
                className={`slide-to-${slideDir === "right" ? "left" : "right"}`}
                onAnimationEnd={onAnimEnd}>
                {outTab === "today"     && <TodayTab entries={entries} targets={targets} onDelete={deleteEntry} onEdit={e => setEditingEntry(e)} burnedKcal={burnedToday} onSaveBurned={async (v) => { await saveBodyWeightAPI(todayStr(), null, v); setBurnedToday(v); }} todayWeight={todayWeight} onSaveWeight={async (v) => { await saveBodyWeightAPI(todayStr(), v, null); setTodayWeight(v); }} stravaActivities={stravaToday} onDeleteStrava={async (id) => { await deleteStravaActivityAPI(id); setStravaToday(p => p.filter(a => a.strava_id !== id)); }} />}
                {outTab === "mealprep"  && <BlurGate locked={!sub.hasAccess} feature="Rezepte" onUnlock={() => openPaywall("Rezepte")}><MealprepTab recipes={recipes} onAdd={addRecipe} onEdit={editRecipe} onDelete={removeRecipe} onArchive={archiveRecipe} archive={archive} voiceLang={voiceLang} userFoods={userFoods} /></BlurGate>}
                {outTab === "history"   && <BlurGate locked={!sub.hasAccess} feature="Verlauf" onUnlock={() => openPaywall("Verlauf")}><HistoryTab targets={targets} loadRange={loadDiaryRange} loadDay={loadDiaryEntries} onDelete={deleteEntry} updateEntry={updateDiaryEntry} loadBodyWeights={loadBodyWeightRange} saveBodyWeight={saveBodyWeightAPI} onAdd={addEntryForDate} recipes={recipes} userFoods={userFoods} voiceLang={voiceLang} loadActivities={loadStravaActivities} onDeleteStrava={async (id) => { await deleteStravaActivityAPI(id); }} /></BlurGate>}
                {outTab === "userfoods" && <BlurGate locked={!sub.hasAccess} feature="Eigene Lebensmittel" onUnlock={() => openPaywall("Eigene Lebensmittel")}><UserFoodsTab userFoods={userFoods} onAdd={addUserFood} onUpdate={updateUserFood} onDelete={deleteUserFood} /></BlurGate>}
              </div>
            )}
          </div>
          <div style={{ display: "flex", borderTop: `1px solid ${C.border}`, background: C.bg, flexShrink: 0, paddingBottom: "env(safe-area-inset-bottom)" }}>
            {TABS.map(t => (
              <button key={t.id} onClick={() => changeTab(t.id)} style={{ flex: 1, padding: "10px 0 12px", background: "none", border: "none", display: "flex", flexDirection: "column", alignItems: "center", gap: 3 }}>
                <span style={{ fontSize: 16, lineHeight: 1, display: "block", textAlign: "center", color: tab === t.id ? C.accent : C.soft }}>{t.sym}</span>
                <span style={{ fontFamily: "Syne", fontSize: 9, lineHeight: 1, display: "block", textAlign: "center", fontWeight: tab === t.id ? 700 : 400, color: tab === t.id ? C.accent : C.muted, textTransform: "uppercase", letterSpacing: 0.6 }}>{t.label}</span>
              </button>
            ))}
          </div>
          {stravaToast && ReactDOM.createPortal(
            <div style={{ position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)", background: stravaToast === "connected" ? "#22c55e22" : "#f8717122", border: `1px solid ${stravaToast === "connected" ? "#22c55e66" : "#f8717166"}`, borderRadius: 10, padding: "10px 18px", fontFamily: "Syne", fontSize: 13, color: stravaToast === "connected" ? "#22c55e" : C.danger, zIndex: 300, whiteSpace: "nowrap" }}>
              {stravaToast === "connected" ? "✓ Strava erfolgreich verbunden" : "Strava-Verbindung fehlgeschlagen"}
            </div>, document.body
          )}
          {settings && <SettingsModal targets={targets} profile={profile} voiceLang={voiceLang} onSave={(t, p, vl) => updateSettings(t, p, vl)} onClose={() => setSettings(false)} onDeleteAccount={handleDeleteAccount} theme={theme} onThemeChange={(t) => { store.set("mk_theme", t); setTheme(t); }} />}
          {editingEntry && <EditEntryModal entry={editingEntry} onSave={editEntry} onClose={() => setEditingEntry(null)} />}
          {paywall !== null && <PaywallModal feature={paywall} onClose={closePaywall} onSubscribe={handleSubscribe} />}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("./sw.js", { scope: "./" }).catch(() => {});
    }
  </script>
</body>
</html>
