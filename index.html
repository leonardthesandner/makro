                <div style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, marginBottom: 20 }}>
                  Pro 100g: {Math.round(scannedProduct.kcal_100)} kcal · {Math.round(scannedProduct.protein_100 * 10) / 10}g E · {Math.round(scannedProduct.carbs_100 * 10) / 10}g KH · {Math.round(scannedProduct.fat_100 * 10) / 10}g F
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                  <div style={{ fontFamily: "Syne", fontSize: 12, color: C.muted }}>Wie viel hast du gegessen?</div>
                  {scannedProduct.serving_g && (
                    <button onClick={() => setBarcodeWeight(String(scannedProduct.serving_g))}
                      style={{ fontFamily: "Syne", fontSize: 11, fontWeight: 700, padding: "3px 10px", borderRadius: 20, background: parseFloat(barcodeWeight) === scannedProduct.serving_g ? C.accent : C.soft, color: parseFloat(barcodeWeight) === scannedProduct.serving_g ? "#000" : C.muted, border: `1px solid ${C.border}`, cursor: "pointer" }}>
                      {scannedProduct.serving_g}g (1 Portion)
                    </button>
                  )}
                </div>
                <div style={{ display: "flex", gap: 10, alignItems: "center", marginBottom: 16 }}>
                  <input type="text" inputMode="decimal" value={barcodeWeight} onChange={e => setBarcodeWeight(e.target.value)} autoFocus
                    style={{ flex: 1, background: C.input, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", color: C.text, fontFamily: "Inter", fontSize: 18, outline: "none", textAlign: "center" }} />
                  <span style={{ fontFamily: "Syne", fontSize: 16, color: C.muted }}>g</span>
                </div>
                {barcodeWeight && parseFloat(barcodeWeight) > 0 && (
                  <div style={{ background: "#34d39910", borderRadius: 8, padding: "8px 12px", fontFamily: "Syne", fontSize: 12, color: C.carbs, marginBottom: 14 }}>
                    = {Math.round(scannedProduct.kcal_100 * parseFloat(barcodeWeight) / 100)} kcal · {Math.round(scannedProduct.protein_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g E · {Math.round(scannedProduct.carbs_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g KH · {Math.round(scannedProduct.fat_100 * parseFloat(barcodeWeight) / 100 * 10) / 10}g F
                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn onClick={addBarcodeItem} disabled={!barcodeWeight || parseFloat(barcodeWeight) <= 0} style={{ flex: 1 }}>Hinzufügen →</Btn>
                  <Btn onClick={() => setScannedProduct(null)} variant="ghost">Abbrechen</Btn>
                </div>
              </div>
            </div>
          )}
          {breakdownModal && (() => {
            const { itemIdx, scaledItems } = breakdownModal;
            const updateScaled = (si, field, val) => {
              const newVal = parseFloat(val) || 0;
              setBreakdownModal(p => ({ ...p, scaledItems: p.scaledItems.map((it, idx) => {
                if (idx !== si) return it;
                if (field === "weight_g") {
                  if (newVal <= 0) return { ...it, weight_g: newVal }; // nur Gramm auf 0, Makros unangetastet
                  if (it.kcal_100 != null) {
                    // per-100g vorhanden → immer korrekt skalieren, auch nach Null-Zustand
                    return { ...it, weight_g: newVal, kcal: Math.round((it.kcal_100||0)*newVal/100*10)/10, protein: Math.round((it.protein_100||0)*newVal/100*10)/10, carbs: Math.round((it.carbs_100||0)*newVal/100*10)/10, fat: Math.round((it.fat_100||0)*newVal/100*10)/10 };
                  }
                  if (it.weight_g > 0) {
                    const ratio = newVal / it.weight_g;
                    return { ...it, weight_g: newVal, kcal: Math.round((it.kcal||0)*ratio*10)/10, protein: Math.round((it.protein||0)*ratio*10)/10, carbs: Math.round((it.carbs||0)*ratio*10)/10, fat: Math.round((it.fat||0)*ratio*10)/10 };
                  }
                  return { ...it, weight_g: newVal };
                }
                return { ...it, [field]: newVal };
              }) }));
            };
            const applyBreakdown = () => {
              const t = scaledItems.reduce((a, it) => ({ kcal: a.kcal+(it.kcal||0), protein: a.protein+(it.protein||0), carbs: a.carbs+(it.carbs||0), fat: a.fat+(it.fat||0) }), {kcal:0,protein:0,carbs:0,fat:0});
              setItems(p => p.map((it, idx) => idx === itemIdx ? { ...it, kcal: Math.round(t.kcal*10)/10, protein: Math.round(t.protein*10)/10, carbs: Math.round(t.carbs*10)/10, fat: Math.round(t.fat*10)/10 } : it));
              setBreakdownModal(null);
            };
            const bInStyle = { width: "100%", background: C.input, border: `1px solid ${C.border}`, borderRadius: 5, padding: "5px 6px", fontFamily: "Inter", fontSize: 12, outline: "none" };
            return (
              <div onClick={() => setBreakdownModal(null)} style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", zIndex: 190 }}>
                <div onClick={e => e.stopPropagation()} style={{ background: C.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 500, margin: "0 auto", border: `1px solid ${C.border}`, maxHeight: "85vh", display: "flex", flexDirection: "column", paddingBottom: "env(safe-area-inset-bottom)" }}>
                  <div style={{ padding: "18px 16px 12px", borderBottom: `1px solid ${C.border}`, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text }}>Zutaten anteilig</span>
                    <button onClick={() => setBreakdownModal(null)} style={{ background: "none", border: "none", color: C.muted, fontSize: 20, cursor: "pointer" }}>✕</button>
                  </div>
                  <div style={{ overflowY: "auto", flex: 1, padding: "12px 16px", display: "flex", flexDirection: "column", gap: 8 }}>
                    {scaledItems.map((si, idx) => (
                      <div key={idx} style={{ background: C.card, borderRadius: 8, padding: "10px 12px", border: `1px solid ${C.border}` }}>
                        <div style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: C.text, marginBottom: 8 }}>{si.name_de || si.name}</div>
                        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 5 }}>
                          <div>
                            <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", marginBottom: 2 }}>Gramm</div>
                            <input type="text" inputMode="decimal" value={si.weight_g} onChange={e => updateScaled(idx, "weight_g", e.target.value)} style={{ ...bInStyle, color: C.text }} />
                          </div>
                          {MACROS.map(m => (
                            <div key={m}>
                              <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", marginBottom: 2 }}>{m}</div>
                              <input type="text" inputMode="decimal" value={Math.round((si[m]||0)*10)/10} onChange={e => updateScaled(idx, m, e.target.value)} style={{ ...bInStyle, color: MC[m] }} />
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                  <div style={{ padding: "12px 16px", borderTop: `1px solid ${C.border}`, display: "flex", gap: 8 }}>
                    <Btn onClick={applyBreakdown} style={{ flex: 1 }}>Übernehmen →</Btn>
                    <Btn onClick={() => setBreakdownModal(null)} variant="ghost">Abbrechen</Btn>
                  </div>
                </div>
              </div>
            );
          })()}
        </>,
        document.body
      );

      return <>{mainContent}{portal}</>;
    }

    function EditEntryModal({ entry, onSave, onClose }) {
      const [items, setItems] = useState(() => (entry.items || []).map(it => ({ ...it })));
      const [saving, setSaving] = useState(false);
      const inputStyle = { background: C.input, border: `1px solid ${C.border}`, borderRadius: 6, padding: "6px 8px", color: C.text, fontFamily: "Inter", fontSize: 13, outline: "none", width: "100%" };

      const update = (i, field, val) => setItems(p => p.map((it, idx) => {
        if (idx !== i) return it;
        if (field === "weight_g") {
          const w = parseFloat(val) || 0;
          if (w > 0 && it.kcal_100 != null) {
            return { ...it, weight_g: w, kcal: Math.round(it.kcal_100 * w / 100), protein: Math.round(it.protein_100 * w / 100 * 10) / 10, carbs: Math.round(it.carbs_100 * w / 100 * 10) / 10, fat: Math.round(it.fat_100 * w / 100 * 10) / 10 };
          } else if (w > 0 && it.weight_g > 0) {
            const r = w / it.weight_g;
            return { ...it, weight_g: w, kcal: Math.round(it.kcal * r), protein: Math.round(it.protein * r * 10) / 10, carbs: Math.round(it.carbs * r * 10) / 10, fat: Math.round(it.fat * r * 10) / 10 };
          }
          return { ...it, weight_g: w };
        }
        return { ...it, [field]: parseFloat(val) || 0 };
      }));

      const totals = items.reduce((a, it) => ({
        kcal: a.kcal + (it.kcal || 0), protein: a.protein + (it.protein || 0),
        carbs: a.carbs + (it.carbs || 0), fat: a.fat + (it.fat || 0),
      }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

      const save = async () => {
        setSaving(true);
        try { await onSave({ ...entry, items, totals }); } finally { setSaving(false); }
      };

      return ReactDOM.createPortal(
        <div style={{ position: "fixed", inset: 0, background: "#000e", zIndex: 200, display: "flex", flexDirection: "column", maxWidth: 500, margin: "0 auto" }}>
          <div style={{ background: C.bg, borderBottom: `1px solid ${C.border}`, padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", paddingTop: "calc(12px + env(safe-area-inset-top))", flexShrink: 0 }}>
            <div style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: C.text }}>Eintrag bearbeiten</div>
            <button onClick={onClose} style={{ background: "none", border: "none", color: C.muted, fontSize: 22, padding: 4 }}>✕</button>
          </div>
          <div style={{ flex: 1, overflowY: "auto", WebkitOverflowScrolling: "touch", padding: 16, display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ fontFamily: "Syne", fontSize: 12, color: C.muted, lineHeight: 1.5, marginBottom: 2 }}>{entryLabel(entry)}</div>
            {items.map((item, i) => (
              <Card key={i} style={{ padding: "12px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text, flex: 1 }}>{item.name_de || item.name}</span>
                  <button onClick={() => setItems(p => p.filter((_, idx) => idx !== i))} style={{ background: "none", border: "none", color: "#f8717150", fontSize: 16, padding: "2px 4px" }}>✕</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr 1fr", gap: 8 }}>
                  <div>
                    <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>Gramm</div>
                    <input type="text" inputMode="decimal" value={item.weight_g} onChange={e => update(i, "weight_g", e.target.value)} style={{ ...inputStyle, color: C.text }} />
                  </div>
                  {MACROS.map(m => (
                    <div key={m}>
                      <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 3 }}>{m}</div>
                      <input type="text" inputMode="decimal" value={item[m] ? Math.round(item[m] * 10) / 10 : ""} placeholder="0" onChange={e => update(i, m, e.target.value)} style={{ ...inputStyle, color: MC[m] }} />
                    </div>
                  ))}
                </div>
              </Card>
            ))}
            <Card accent style={{ padding: "12px 14px" }}>
              <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
                {MACROS.map(m => (
                  <div key={m} style={{ textAlign: "center" }}>
                    <Mono size={18} color={MC[m]} bold>{Math.round(totals[m])}</Mono>
                    <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted, marginTop: 2 }}>{UNITS[m]}</div>
                  </div>
                ))}
              </div>
            </Card>
          </div>
          <div style={{ background: C.bg, borderTop: `1px solid ${C.border}`, padding: "12px 16px", paddingBottom: "calc(12px + env(safe-area-inset-bottom))", display: "flex", gap: 8, flexShrink: 0 }}>
            <Btn onClick={save} disabled={saving || items.length === 0} style={{ flex: 1 }}>{saving ? "Speichert…" : "Speichern ✓"}</Btn>
            <Btn onClick={onClose} variant="ghost">Abbrechen</Btn>
          </div>
        </div>,
        document.body
      );
    }

    function TodayTab({ entries, targets, onDelete, onEdit, burnedKcal, onSaveBurned, todayWeight, onSaveWeight, stravaActivities, onDeleteStrava }) {
      const [pendingDeleteId, setPendingDeleteId] = useState(null);
      const undoTimerRef = React.useRef(null);
      const visibleStrava = (stravaActivities || []).filter(a => a.strava_id !== pendingDeleteId);
      const pendingActivity = pendingDeleteId ? (stravaActivities || []).find(a => a.strava_id === pendingDeleteId) : null;
      const startDelete = (id) => {
        if (undoTimerRef.current) clearTimeout(undoTimerRef.current);
        setPendingDeleteId(id);
        undoTimerRef.current = setTimeout(() => { onDeleteStrava && onDeleteStrava(id); setPendingDeleteId(null); }, 5000);
      };
      const undoDelete = () => { if (undoTimerRef.current) clearTimeout(undoTimerRef.current); setPendingDeleteId(null); };
      const totals = sumEntries(entries);
      const stravaBurned = visibleStrava.reduce((s, a) => s + (a.calories || 0), 0);
      const burned = (burnedKcal || 0) + stravaBurned;
      const netKcal = totals.kcal - burned;
      const kcalRest = targets.kcal - netKcal;
      const rest = Object.fromEntries(MACROS.map(m => [m, m === "kcal" ? kcalRest : targets[m] - totals[m]]));
      const [burnedInput, setBurnedInput] = useState(burned > 0 ? String(burned) : "");
      const [burnedSaving, setBurnedSaving] = useState(false);
      const [burnedSaved, setBurnedSaved] = useState(false);
      const [weightInput, setWeightInput] = useState(todayWeight > 0 ? String(todayWeight) : "");
      const [weightSaving, setWeightSaving] = useState(false);
      const [weightSaved, setWeightSaved] = useState(false);
      const saveBurned = async () => {
        const v = parseFloat(burnedInput) || 0;
        setBurnedSaving(true);
        try { await onSaveBurned(v); setBurnedSaved(true); setTimeout(() => setBurnedSaved(false), 2000); } catch {}
        setBurnedSaving(false);
      };
      const saveWeight = async () => {
        const v = parseFloat(weightInput);
        if (!v) return;
        setWeightSaving(true);
        try { await onSaveWeight(v); setWeightSaved(true); setTimeout(() => setWeightSaved(false), 2000); } catch {}
        setWeightSaving(false);
      };
      const inputStyle = { background: C.input, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: "Inter", fontSize: 15, outline: "none", width: 90 };
      return (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 14 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <Card style={{ padding: "12px 14px" }}>
              <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Körpergewicht</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <input type="text" inputMode="decimal" value={weightInput} onChange={e => { setWeightInput(e.target.value); setWeightSaved(false); }} placeholder="– –" style={inputStyle} />
                <span style={{ fontFamily: "Syne", fontSize: 13, color: C.muted }}>kg</span>
                <Btn small onClick={saveWeight} disabled={!weightInput || weightSaving}>{weightSaving ? "…" : "Speichern"}</Btn>
                {weightSaved && <Mono size={11} color={C.carbs}>✓</Mono>}
              </div>
            </Card>
            <Card style={{ padding: "12px 14px" }}>
              <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Aktiv verbrannt</div>
              <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
                <input type="text" inputMode="decimal" value={burnedInput} onChange={e => { setBurnedInput(e.target.value); setBurnedSaved(false); }} placeholder="0" style={inputStyle} />
                <span style={{ fontFamily: "Syne", fontSize: 13, color: C.muted }}>kcal</span>
                <Btn small onClick={saveBurned} disabled={burnedSaving}>{burnedSaving ? "…" : "Speichern"}</Btn>
                {burnedSaved && <Mono size={11} color={C.carbs}>✓</Mono>}
              </div>
            </Card>
          </div>
          <Card style={{ padding: 16 }}>
            <SectionLabel>Tagesfortschritt</SectionLabel>
            {MACROS.map(m => <MacroBar key={m} label={LABELS[m]} current={m === "kcal" ? netKcal : totals[m]} target={targets[m]} color={MC[m]} unit={UNITS[m]} />)}
            {burned > 0 && (
              <div style={{ display: "flex", justifyContent: "flex-end", marginTop: 8, gap: 6, alignItems: "center" }}>
                <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted }}>gegessen</span>
                <Mono size={11} color={C.kcal}>{Math.round(totals.kcal)}</Mono>
                <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted }}>− verbrannt</span>
                <Mono size={11} color={C.carbs}>{Math.round(burned)}</Mono>
                <span style={{ fontFamily: "Syne", fontSize: 11, color: C.muted }}>= netto</span>
                <Mono size={11} color={C.text} bold>{Math.round(netKcal)}</Mono>
              </div>
            )}
          </Card>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {MACROS.map(m => (
              <Card key={m} style={{ padding: "10px 12px" }}>
                <div style={{ fontFamily: "Syne", fontSize: 9, color: C.muted, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 4 }}>Rest {LABELS[m]}</div>
                <Mono size={20} color={rest[m] < 0 ? C.danger : MC[m]} bold>{rest[m] > 0 ? "+" : ""}{Math.round(rest[m])}</Mono>
                <Mono size={10} color={C.muted}> {UNITS[m]}</Mono>
              </Card>
            ))}
          </div>
          {visibleStrava.length > 0 && (
            <div>
              <SectionLabel>Strava-Aktivitäten</SectionLabel>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {visibleStrava.map(a => {
                  const distKm = a.distance_m ? (a.distance_m / 1000).toFixed(1) : null;
                  const dur = a.duration_s ? `${Math.floor(a.duration_s / 60)} min` : null;
                  return (
                    <Card key={a.strava_id} style={{ padding: "10px 14px", display: "flex", alignItems: "center", gap: 12 }}>
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fc4c02" style={{ flexShrink: 0 }}><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.599h4.172L10.463 0l-7 13.828h4.169"/></svg>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: C.text }}>{a.name || a.type || "Aktivität"}</div>
                        <div style={{ fontFamily: "Inter", fontSize: 11, color: C.muted, marginTop: 2 }}>
                          {[a.type, distKm ? distKm + " km" : null, dur].filter(Boolean).join(" · ")}
                        </div>
                      </div>
                      <div style={{ textAlign: "right", marginRight: 4 }}>
                        <Mono size={15} color="#fc4c02" bold>{a.calories}</Mono>
                        <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>kcal</div>
                      </div>
                      <button onClick={() => startDelete(a.strava_id)} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 18, padding: 4, cursor: "pointer", flexShrink: 0 }}>✕</button>
                    </Card>
                  );
                })}
              </div>
            </div>
          )}
          {pendingActivity && ReactDOM.createPortal(
            <div style={{ position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)", background: C.toast, border: `1px solid ${C.border}`, borderRadius: 12, padding: "10px 16px", display: "flex", alignItems: "center", gap: 12, zIndex: 300, whiteSpace: "nowrap", boxShadow: "0 4px 20px #0008" }}>
              <span style={{ fontFamily: "Syne", fontSize: 13, color: C.muted }}>„{pendingActivity.name || pendingActivity.type || "Aktivität"}" gelöscht</span>
              <button onClick={undoDelete} style={{ background: "#fc4c02", border: "none", borderRadius: 8, padding: "5px 12px", color: "#fff", fontFamily: "Syne", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Rückgängig</button>
            </div>,
            document.body
          )}
          <div>
            <SectionLabel>Einträge heute ({entries.length})</SectionLabel>
            {entries.length === 0
              ? <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.8 }}>Noch keine Einträge.<br />Geh zur Eingabe ✦</div>
              : <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {[...entries].reverse().map(e => (
                    <Card key={e.id} onClick={() => onEdit(e)} style={{ padding: "12px 14px", cursor: "pointer" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                        <div style={{ flex: 1, marginRight: 8 }}>
                          <div style={{ fontFamily: "Syne", fontSize: 13, color: C.text, marginBottom: 3, lineHeight: 1.4 }}>{entryLabel(e)}</div>
                          <Mono size={11} color={C.muted}>{new Date(e.timestamp).toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" })} Uhr</Mono>
                        </div>
                        <button onClick={ev => { ev.stopPropagation(); onDelete(e.id); }} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 18, padding: 4 }}>✕</button>
                      </div>
                      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                        {MACROS.map(m => (
                          <div key={m} style={{ textAlign: "center" }}>
                            <Mono size={13} color={MC[m]} bold>{Math.round(e.totals[m])}</Mono>
                            <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>{UNITS[m]}</div>
                          </div>
                        ))}
                      </div>
                    </Card>
                  ))}
                </div>
            }
          </div>
        </div>
      );
    }

    function AnalyzingIndicator() {
      return (
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "28px 0", gap: 14 }}>
          {/* Drei pulsierende Punkte */}
          <div style={{ display: "flex", gap: 7 }}>
            {[0, 1, 2].map(i => (
              <div key={i} style={{
                width: 6, height: 6, borderRadius: "50%",
                background: "#f97316",
                animation: `analyzeDot 1.2s ease-in-out ${i * 0.2}s infinite`,
              }} />
            ))}
          </div>
          {/* Branding */}
          <div style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 800, letterSpacing: 0.5, color: "#fff" }}>
            makro<span style={{ color: "#f97316" }}>.</span>
            <span style={{ fontWeight: 400, fontSize: 13, color: "#444", marginLeft: 6, letterSpacing: 0 }}>analysiert</span>
          </div>
          <style>{`
            @keyframes analyzeDot {
              0%, 80%, 100% { transform: scale(0.6); opacity: 0.25; }
              40%            { transform: scale(1.15); opacity: 1; }
            }
          `}</style>
        </div>
      );
    }

    function MealprepTab({ recipes, onAdd, onEdit, onDelete, onArchive, archive, voiceLang, userFoods }) {
      const STEP = { idle: "idle", entering: "entering", analyzing: "analyzing", naming: "naming", editing: "editing" };
      const [step, setStep] = useState(STEP.idle);
      const [editingRecipe, setEditingRecipe] = useState(null); // { recipe, items, name, cookedWeight }
      const [editSaving, setEditSaving] = useState(false);
      const [subTab, setSubTab] = useState("aktiv");
      const [ingredientText, setIngredientText] = useState("");
      const mpTextareaRef = useRef(null);
      const [items, setItems] = useState([]);
      const [mealName, setMealName] = useState("");
      const [cookedWeight, setCookedWeight] = useState("");
      const [portionWeight, setPortionWeight] = useState("");
      const [err, setErr] = useState(null);
      const [mpListening, setMpListening] = useState(false);
      const [mpTranscribing, setMpTranscribing] = useState(false);
      const mpMediaRecorderRef = useRef(null);
      const mpChunksRef = useRef([]);
      const [mpScanning, setMpScanning] = useState(false);
      const [mpBarcodeLoading, setMpBarcodeLoading] = useState(false);
      const [mpBarcodeErr, setMpBarcodeErr] = useState(null);
      const [mpScannedProduct, setMpScannedProduct] = useState(null);
      const [mpBarcodeWeight, setMpBarcodeWeight] = useState("100");
      const [addIngOpen, setAddIngOpen] = useState(false);
      const [addIngText, setAddIngText] = useState("");
      const [addIngItems, setAddIngItems] = useState(null);
      const [addIngLoading, setAddIngLoading] = useState(false);
      const [mpImageAnalyzing, setMpImageAnalyzing] = useState(false);
      const mpImageInputRef = useRef(null);
      const inputStyle = { background: C.input, border: `1px solid ${C.border}`, borderRadius: 6, padding: "9px 10px", color: C.text, fontFamily: "Syne", fontSize: 14, outline: "none", width: "100%" };

      const getMpWord = () => {
        const el = mpTextareaRef.current;
        if (!el) return "";
        const before = ingredientText.slice(0, el.selectionStart);
        const match = before.match(/([a-zA-ZäöüÄÖÜß]+)$/);
        return match ? match[1] : "";
      };
      const mpAcWord = step === STEP.entering && !mpTranscribing && userFoods ? getMpWord() : "";
      const mpSuggestions = mpAcWord.length >= 2
        ? userFoods.filter(f => f.name.toLowerCase().startsWith(mpAcWord.toLowerCase())).slice(0, 5)
        : [];
      const applyMpSuggestion = (food) => {
        const el = mpTextareaRef.current;
        if (!el) return;
        const pos = el.selectionStart;
        const before = ingredientText.slice(0, pos);
        const after = ingredientText.slice(pos);
        const newBefore = before.replace(/([a-zA-ZäöüÄÖÜß]+)$/, food.name);
        setIngredientText(newBefore + after);
        setTimeout(() => { el.focus(); el.setSelectionRange(newBefore.length, newBefore.length); }, 0);
      };

      const analyze = async () => {
        if (!ingredientText.trim()) return;
        setStep(STEP.analyzing); setErr(null);
        try {
          const data = await analyzeRecipe(ingredientText);
          setItems(data.items);
          setCookedWeight(String(Math.round(data.raw_weight_g * 0.85)));
          setStep(STEP.naming);
        } catch (e) { setErr("Die Zutaten konnten nicht analysiert werden. Bitte prüfe deine Internetverbindung und versuche es erneut."); setStep(STEP.entering); }
      };

      const updateItem = (i, field, val) => setItems(p => p.map((it, idx) => idx === i ? { ...it, [field]: val } : it));
      const totals = items.reduce((a, it) => ({ kcal: a.kcal + (it.kcal || 0), protein: a.protein + (it.protein || 0), carbs: a.carbs + (it.carbs || 0), fat: a.fat + (it.fat || 0) }), { kcal: 0, protein: 0, carbs: 0, fat: 0 });

      const saveMealprep = () => {
        if (!mealName.trim() || !cookedWeight) return;
        const tw = parseFloat(cookedWeight);
        const r = { id: Date.now(), name: mealName.trim(), total_weight: tw, kcal_total: Math.round(totals.kcal), protein_total: Math.round(totals.protein * 10) / 10, carbs_total: Math.round(totals.carbs * 10) / 10, fat_total: Math.round(totals.fat * 10) / 10, ingredients: ingredientText, items };
        r.kcal_100 = r.kcal_total / tw * 100; r.protein_100 = r.protein_total / tw * 100;
        r.carbs_100 = r.carbs_total / tw * 100; r.fat_100 = r.fat_total / tw * 100;
        if (portionWeight) r.portion_g = parseFloat(portionWeight);
        onAdd(r);
        setStep(STEP.idle); setIngredientText(""); setItems([]); setMealName(""); setCookedWeight(""); setPortionWeight("");
      };

      const startEditRecipe = (r) => {
        const storedItems = r.items ? (typeof r.items === "string" ? JSON.parse(r.items) : r.items) : [];
        setEditingRecipe({ recipe: r, items: storedItems, name: r.name, cookedWeight: String(parseFloat(r.total_weight)), portionWeight: r.portion_g ? String(parseFloat(r.portion_g)) : "" });
        setStep(STEP.editing);
        setSubTab("aktiv");
      };

      const saveEditRecipe = async () => {
        if (!editingRecipe || !editingRecipe.name.trim() || !editingRecipe.cookedWeight) return;
        setEditSaving(true);
        const tw = parseFloat(editingRecipe.cookedWeight);

        // Wenn items vorhanden → Makros neu berechnen; sonst Original-Totals behalten
        const hasItems = editingRecipe.items && editingRecipe.items.length > 0;
        let kcal_total, protein_total, carbs_total, fat_total;
        if (hasItems) {
          const t = editingRecipe.items.reduce(
            (a, it) => ({ kcal: a.kcal + (it.kcal||0), protein: a.protein + (it.protein||0), carbs: a.carbs + (it.carbs||0), fat: a.fat + (it.fat||0) }),
            { kcal:0, protein:0, carbs:0, fat:0 }
          );
          kcal_total    = Math.round(t.kcal);
          protein_total = Math.round(t.protein * 10) / 10;
          carbs_total   = Math.round(t.carbs * 10) / 10;
          fat_total     = Math.round(t.fat * 10) / 10;
        } else {
          // Älteres Rezept ohne Items: Original-Totals beibehalten
          kcal_total    = parseFloat(editingRecipe.recipe.kcal_total)    || 0;
          protein_total = parseFloat(editingRecipe.recipe.protein_total) || 0;
          carbs_total   = parseFloat(editingRecipe.recipe.carbs_total)   || 0;
          fat_total     = parseFloat(editingRecipe.recipe.fat_total)     || 0;
        }

        const data = {
          name:          editingRecipe.name.trim(),
          total_weight:  tw,
          kcal_total, protein_total, carbs_total, fat_total,
          // Direkt mitberechnen als Fallback für Offline-Modus
          kcal_100:    tw > 0 ? kcal_total    / tw * 100 : 0,
          protein_100: tw > 0 ? protein_total / tw * 100 : 0,
          carbs_100:   tw > 0 ? carbs_total   / tw * 100 : 0,
          fat_100:     tw > 0 ? fat_total     / tw * 100 : 0,
          ingredients: editingRecipe.recipe.ingredients,
          items:       editingRecipe.items,
          portion_g:   editingRecipe.portionWeight ? parseFloat(editingRecipe.portionWeight) : null,
        };

        await onEdit(editingRecipe.recipe.id, data);
        setEditSaving(false);
        setEditingRecipe(null);
        setStep(STEP.idle);
      };

      const cancel = () => { setStep(STEP.idle); setIngredientText(""); setItems([]); setErr(null); setMealName(""); setPortionWeight(""); };

      const handleMpImageCapture = async (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        e.target.value = "";
        setMpImageAnalyzing(true); setErr(null);
        try {
          const data = await analyzeRecipeImage(file);
          if (data.text) {
            setIngredientText(p => p.trim() ? p.trim() + "\n" + data.text : data.text);
          }
        } catch (e) { setErr("Das Rezeptfoto konnte nicht gelesen werden. Bitte ein deutlicheres Foto machen oder die Zutaten manuell eingeben."); }
        setMpImageAnalyzing(false);
      };

      const analyzeAddIngredient = async () => {
        if (!addIngText.trim()) return;
        setAddIngLoading(true);
        try {
          const data = await analyzeRecipe(addIngText);
          setAddIngItems(data.items || []);
        } catch (e) { setErr("Die Zutat konnte nicht analysiert werden. Bitte erneut versuchen."); }
        setAddIngLoading(false);
      };

      const confirmAddIngredient = () => {
        if (!addIngItems?.length) return;
        setEditingRecipe(p => ({ ...p, items: [...(p.items || []), ...addIngItems] }));
        setAddIngItems(null);
        setAddIngText("");
        setAddIngOpen(false);
      };

      const recookFromArchive = (archived) => {
        setSubTab("aktiv");
        setIngredientText(archived.ingredients || "");
        setMealName(archived.name);
        setStep(STEP.entering);
      };

      const toggleMpVoice = async () => {
        if (mpListening) { mpMediaRecorderRef.current?.stop(); setMpListening(false); return; }
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const mime = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/mp4";
          const recorder = new MediaRecorder(stream, { mimeType: mime });
          mpChunksRef.current = [];
          recorder.ondataavailable = e => { if (e.data.size > 0) mpChunksRef.current.push(e.data); };
          recorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            const blob = new Blob(mpChunksRef.current, { type: mime });
            setMpTranscribing(true);
            try {
              const auth = getAuth();
              const form = new FormData();
              const ext = mime.includes("mp4") ? "mp4" : "webm";
              form.append("audio", blob, `rec.${ext}`);
              form.append("language", voiceLang || "de");
              const res = await fetch(BACKEND_URL + "/api/transcribe", {
                method: "POST",
                headers: auth?.token ? { "Authorization": `Bearer ${auth.token}` } : {},
                body: form,
              });
              const data = await res.json();
              if (data.text) setIngredientText(p => p.trim() ? p.trim() + "\n" + data.text : data.text);
              else if (data.error) setErr("Spracherkennung fehlgeschlagen. Bitte noch einmal versuchen.");
            } catch { setErr("Sprachaufnahme konnte nicht verarbeitet werden. Bitte noch einmal versuchen."); }
            setMpTranscribing(false);
          };
          mpMediaRecorderRef.current = recorder;
          recorder.start();
          setMpListening(true);
        } catch { setErr("Kein Mikrofon-Zugriff. Bitte erlaube den Mikrofonzugriff in den Browser-Einstellungen."); }
      };

      const handleMpBarcodeScan = async (barcode) => {
        setMpScanning(false); setMpBarcodeLoading(true);
        try {
          const data = await lookupBarcode(barcode);
          if (data.found) {
            setMpScannedProduct(data);
            setMpBarcodeWeight(data.serving_g ? String(data.serving_g) : "100");
          } else {
            setMpBarcodeErr(`Produkt nicht gefunden (${barcode})`);
          }
        } catch (e) { setMpBarcodeErr("Produkt konnte nicht gefunden werden. Bitte prüfe die Internetverbindung und versuche es erneut."); }
        setMpBarcodeLoading(false);
      };

      const addMpBarcodeItem = () => {
        if (!mpScannedProduct) return;
        const w = parseFloat(mpBarcodeWeight);
        if (!w || w <= 0) return;
        const line = `${w}g ${mpScannedProduct.name_de}`;
        setIngredientText(p => p.trim() ? p.trim() + "\n" + line : line);
        setMpScannedProduct(null);
        setMpBarcodeWeight("100");
      };

      const mpContent = (
        <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", gap: 0, background: C.card, borderRadius: 10, padding: 3, border: `1px solid ${C.border}` }}>
            {[["aktiv", "Aktiv"], ["archiv", `Archiv (${archive.length})`]].map(([id, label]) => (
              <button key={id} onClick={() => setSubTab(id)} style={{ flex: 1, padding: "7px 0", borderRadius: 8, border: "none", background: subTab === id ? C.accent : "transparent", color: subTab === id ? "#000" : C.muted, fontFamily: "Syne", fontSize: 12, fontWeight: 700, cursor: "pointer", textTransform: "uppercase", letterSpacing: 0.5 }}>
                {label}
              </button>
            ))}
          </div>

          {subTab === "aktiv" && <>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <SectionLabel>Aktive Mealpreps ({recipes.length})</SectionLabel>
              {step === STEP.idle && <Btn onClick={() => setStep(STEP.entering)} small variant="ghost">+ Neu kochen</Btn>}
            </div>

            {step === STEP.entering && (
              <Card accent style={{ display: "flex", flexDirection: "column" }}>
                <div style={{ padding: "12px 14px 0", display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                  <span style={{ fontFamily: "Syne", fontSize: 12, color: C.accent }}>Zutaten eingeben (roh, vor dem Kochen)</span>
                  <span style={{ fontFamily: "Inter", fontSize: 10, color: ingredientText.length > 450 ? C.danger : C.muted }}>{ingredientText.length}/500</span>
                </div>
                <textarea ref={mpTextareaRef} value={ingredientText} onChange={e => setIngredientText(e.target.value.slice(0, 500))}
                  placeholder={"1000g rohes Hühnchen\n1 Dose gehackte Tomaten\n1 EL Olivenöl\n1 Packung Sahne 20%\nSalz, Pfeffer, Knoblauch"}
                  maxLength={500}
                  style={{ width: "100%", minHeight: 140, background: "transparent", border: "none", outline: "none", padding: "8px 14px 12px", color: C.text, fontFamily: "Syne", fontSize: 15, lineHeight: 1.7 }} />
                {mpSuggestions.length > 0 && (
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap", padding: "0 12px 10px" }}>
                    {mpSuggestions.map(f => (
                      <button key={f.id} onMouseDown={e => { e.preventDefault(); applyMpSuggestion(f); }}
                        style={{ fontFamily: "Syne", fontSize: 12, fontWeight: 600, padding: "4px 10px", borderRadius: 16, background: "#1a1a2e", border: `1px solid ${C.accent}44`, color: C.accent, cursor: "pointer" }}>
                        {f.name}
                        <span style={{ fontFamily: "Inter", fontSize: 10, color: C.muted, marginLeft: 5 }}>{Math.round(parseFloat(f.kcal_100))} kcal</span>
                      </button>
                    ))}
                  </div>
                )}
                {mpTranscribing && <div style={{ padding: "2px 14px 6px", fontFamily: "Syne", fontSize: 13, color: C.muted, fontStyle: "italic" }} className="pulsing">Whisper erkennt Sprache…</div>}
                {mpImageAnalyzing && <div style={{ padding: "2px 14px 6px", fontFamily: "Syne", fontSize: 13, color: C.muted, fontStyle: "italic" }} className="pulsing">Rezept wird erkannt…</div>}
                <div style={{ padding: "8px 12px 12px", display: "flex", justifyContent: "space-between", alignItems: "center", borderTop: `1px solid ${C.border}`, gap: 8 }}>
                  <div style={{ display: "flex", gap: 8, flexShrink: 0 }}>
                    <button onClick={toggleMpVoice} disabled={mpTranscribing} style={{ background: mpListening ? "#f8717122" : mpTranscribing ? "#f59e0b22" : "transparent", border: `1px solid ${mpListening ? C.danger : mpTranscribing ? C.accent : C.border}`, borderRadius: 8, padding: "8px 12px", color: mpListening ? C.danger : mpTranscribing ? C.accent : C.muted, display: "flex", alignItems: "center", gap: 6 }}>
                      <svg className={mpListening || mpTranscribing ? "pulsing" : ""} width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 11a7 7 0 0 0 14 0" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round"/><line x1="12" y1="18" x2="12" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/><line x1="8" y1="22" x2="16" y2="22" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/></svg>
                      {mpListening && <Mono size={11} color={C.danger}>Aufnahme…</Mono>}
                      {mpTranscribing && <Mono size={11} color={C.accent}>Erkennt…</Mono>}
                    </button>
                    {/* Rezept-Foto / Screenshot */}
                    <button onClick={() => mpImageInputRef.current?.click()} disabled={mpImageAnalyzing}
                      style={{ background: mpImageAnalyzing ? "#f59e0b22" : "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: mpImageAnalyzing ? C.accent : C.muted, display: "flex", alignItems: "center" }}
                      title="Rezept-Foto oder Screenshot hochladen">
                      {mpImageAnalyzing
                        ? <span className="pulsing" style={{ fontSize: 16 }}>◈</span>
                        : <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                      }
                    </button>
                    <input ref={mpImageInputRef} type="file" accept="image/*" onChange={handleMpImageCapture} style={{ display: "none" }} />
                    <button onClick={() => setMpScanning(true)} disabled={mpBarcodeLoading} style={{ background: mpBarcodeLoading ? "#f59e0b22" : "transparent", border: `1px solid ${C.border}`, borderRadius: 8, padding: "8px 12px", color: C.muted, display: "flex", alignItems: "center" }}>
                      {mpBarcodeLoading
                        ? <span className="pulsing" style={{ fontSize: 16 }}>⬛</span>
                        : <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="1" y="4" width="2" height="16"/><rect x="5" y="4" width="1" height="16"/><rect x="8" y="4" width="2" height="16"/><rect x="12" y="4" width="1" height="16"/><rect x="15" y="4" width="2" height="16"/><rect x="19" y="4" width="1" height="16"/><rect x="22" y="4" width="1" height="16"/></svg>
                      }
                    </button>
                  </div>
                  <Btn onClick={analyze} disabled={!ingredientText.trim()} small>Makros berechnen →</Btn>
                </div>
              </Card>
            )}

            {step === STEP.analyzing && <AnalyzingIndicator />}
            {err && <div style={{ background: "#f8717112", border: `1px solid #f8717128`, borderRadius: 8, padding: "10px 14px", color: C.danger, fontFamily: "Syne", fontSize: 13 }}>{err}</div>}

            {step === STEP.naming && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <SectionLabel>Erkannte Zutaten — tippen zum Korrigieren</SectionLabel>
                {items.map((item, i) => (
                  <Card key={i} style={{ padding: "10px 12px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: C.text }}>{item.name_de || item.name}</span>
                      <Mono size={11} color={C.muted}>{item.weight_g}g</Mono>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
                      {MACROS.map(m => (
                        <div key={m}>
                          <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", marginBottom: 2 }}>{m}</div>
                          <MacroInput value={item[m]} onChange={val => updateItem(i, m, val)} color={MC[m]} style={{ ...inputStyle, fontFamily: "Inter", fontSize: 13, color: MC[m], padding: "6px 8px" }} />
                        </div>
                      ))}
                    </div>
                  </Card>
                ))}
                <Card accent style={{ padding: "14px" }}>
                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
                  <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 14 }}>
                    {MACROS.map(m => (
                      <div key={m} style={{ textAlign: "center" }}>
                        <Mono size={18} color={MC[m]} bold>{Math.round(totals[m])}</Mono>
                        <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted, marginTop: 2 }}>{UNITS[m]}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{ borderTop: `1px solid ${C.accent}25`, paddingTop: 12, display: "flex", flexDirection: "column", gap: 10 }}>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 4 }}>Name des Mealpreps</div>
                      <input placeholder="z.B. Hähnchen-Tomaten-Sahnesoße" value={mealName} onChange={e => setMealName(e.target.value)} style={inputStyle} />
                    </div>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 4 }}>Fertig gekochtes Gesamtgewicht (g) — bitte abwiegen!</div>
                      <input type="text" inputMode="decimal" placeholder="z.B. 1400" value={cookedWeight} onChange={e => setCookedWeight(e.target.value)} style={inputStyle} />
                    </div>
                    <div>
                      <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 4 }}>Portionsgröße (g) — optional</div>
                      <input type="text" inputMode="decimal" placeholder="z.B. 350" value={portionWeight} onChange={e => setPortionWeight(e.target.value)} style={inputStyle} />
                    </div>
                  </div>
                </Card>
                {cookedWeight && mealName && (
                  <div style={{ background: "#34d39910", borderRadius: 8, padding: "10px 14px", fontFamily: "Syne", fontSize: 12, color: C.carbs }}>
                    Pro 100g: {Math.round(totals.kcal / parseFloat(cookedWeight) * 100)} kcal · {Math.round(totals.protein / parseFloat(cookedWeight) * 100 * 10) / 10}g E · {Math.round(totals.carbs / parseFloat(cookedWeight) * 100 * 10) / 10}g KH · {Math.round(totals.fat / parseFloat(cookedWeight) * 100 * 10) / 10}g F
                  </div>
                )}
                <div style={{ display: "flex", gap: 8 }}>
                  <Btn onClick={saveMealprep} disabled={!mealName.trim() || !cookedWeight} style={{ flex: 1 }}>Mealprep speichern</Btn>
                  <Btn onClick={cancel} variant="ghost">Abbrechen</Btn>
                </div>
              </div>
            )}

            {step === STEP.idle && recipes.length === 0 && (
              <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.9 }}>
                Noch keine Mealpreps.<br />Koch ein Gericht vor und trag die Zutaten ein –<br />dann kannst du z.B. „300g Hähnchen-Soße"<br />in der täglichen Eingabe tracken.
              </div>
            )}

            {step === STEP.editing && editingRecipe && (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                  <button onClick={() => { setStep(STEP.idle); setEditingRecipe(null); }} style={{ background: "none", border: "none", color: C.muted, padding: "4px 0", display: "flex", alignItems: "center", gap: 5, fontFamily: "Syne", fontSize: 13, cursor: "pointer" }}>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
                    Zurück
                  </button>
                  <span style={{ fontFamily: "Syne", fontSize: 14, fontWeight: 700, color: C.text }}>Mealprep bearbeiten</span>
                </div>
                <SectionLabel>Zutaten — tippen zum Korrigieren</SectionLabel>
                {editingRecipe.items.length === 0 && (
                  <div style={{ textAlign: "center", padding: 20, fontFamily: "Syne", fontSize: 13, color: C.muted }}>Keine gespeicherten Zutaten (älteres Rezept).<br/>Nur Name und Gewicht bearbeitbar.</div>
                )}
                {editingRecipe.items.map((item, i) => (
                  <Card key={i} style={{ padding: "10px 12px" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <span style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: C.text }}>{item.name_de || item.name}</span>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <Mono size={11} color={C.muted}>{item.weight_g}g</Mono>
                        <button onClick={() => setEditingRecipe(p => ({ ...p, items: p.items.filter((_,idx) => idx !== i) }))}
                          style={{ background: "none", border: "none", color: "#f8717150", fontSize: 15, padding: "2px 2px", cursor: "pointer", lineHeight: 1 }}>✕</button>
                      </div>
                    </div>
                    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
                      {MACROS.map(m => (
                        <div key={m}>
                          <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", marginBottom: 2 }}>{m}</div>
                          <MacroInput value={item[m]} onChange={val => setEditingRecipe(p => ({ ...p, items: p.items.map((it,idx) => idx===i ? { ...it, [m]: val } : it) }))} style={{ ...inputStyle, fontFamily: "Inter", fontSize: 13, color: MC[m], padding: "6px 8px" }} />
                        </div>
                      ))}
                    </div>
                  </Card>
                ))}
                {/* ── Zutat nachträglich hinzufügen ── */}
                <div>
                  <button onClick={() => { setAddIngOpen(p => !p); setAddIngItems(null); setAddIngText(""); }}
                    style={{ width: "100%", background: addIngOpen ? "#f97316" + "18" : C.card, border: `1px solid ${addIngOpen ? C.accent + "60" : C.border}`, borderRadius: 10, padding: "10px 14px", color: addIngOpen ? C.accent : C.muted, fontFamily: "Syne", fontSize: 13, fontWeight: 700, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                    <span>➕ Zutat nachträglich hinzufügen</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{ transform: addIngOpen ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}><polyline points="6 9 12 15 18 9"/></svg>
                  </button>

                  {addIngOpen && (
                    <Card style={{ padding: "12px 14px", marginTop: 6 }}>
                      {addIngItems === null ? (
                        <>
                          <div style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, marginBottom: 8 }}>Zutat mit Menge eingeben, z.B. „200g Kartoffeln roh" oder „1 EL Olivenöl"</div>
                          <textarea value={addIngText} onChange={e => setAddIngText(e.target.value)}
                            placeholder={"200g Kartoffeln roh\n1 EL Olivenöl"}
                            style={{ ...inputStyle, minHeight: 70, resize: "none", lineHeight: 1.6 }} />
                          <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                            <Btn onClick={analyzeAddIngredient} disabled={!addIngText.trim() || addIngLoading} style={{ flex: 1 }}>
                              {addIngLoading ? <span className="pulsing">Analysiert…</span> : "Makros berechnen →"}
                            </Btn>
                            <Btn onClick={() => setAddIngOpen(false)} variant="ghost">Abbrechen</Btn>
                          </div>
                        </>
                      ) : (
                        <>
                          <div style={{ fontFamily: "Syne", fontSize: 11, color: C.accent, marginBottom: 8 }}>Erkannte Zutaten — tippen zum Korrigieren</div>
                          {addIngItems.map((item, i) => (
                            <div key={i} style={{ marginBottom: 8 }}>
                              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                                <span style={{ fontFamily: "Syne", fontSize: 13, fontWeight: 700, color: C.text }}>{item.name_de || item.name}</span>
                                <Mono size={11} color={C.muted}>{item.weight_g}g</Mono>
                              </div>
                              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 6 }}>
                                {MACROS.map(m => (
                                  <div key={m}>
                                    <div style={{ fontFamily: "Syne", fontSize: 9, color: MC[m], textTransform: "uppercase", marginBottom: 2 }}>{m}</div>
                                    <MacroInput value={item[m]} onChange={val => setAddIngItems(p => p.map((it,idx) => idx===i ? { ...it, [m]: val } : it))} style={{ ...inputStyle, fontFamily: "Inter", fontSize: 13, color: MC[m], padding: "6px 8px" }} />
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))}
                          <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
                            <Btn onClick={confirmAddIngredient} style={{ flex: 1 }}>Zum Mealprep hinzufügen ✓</Btn>
                            <Btn onClick={() => { setAddIngItems(null); setAddIngText(""); }} variant="ghost">Nochmal</Btn>
                          </div>
                        </>
                      )}
                    </Card>
                  )}
                </div>

                <Card accent style={{ padding: 14 }}>
                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.accent, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>Gesamt</div>
                  {(() => { const t = editingRecipe.items.reduce((a,it) => ({ kcal:a.kcal+(it.kcal||0), protein:a.protein+(it.protein||0), carbs:a.carbs+(it.carbs||0), fat:a.fat+(it.fat||0) }), {kcal:0,protein:0,carbs:0,fat:0}); return (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, marginBottom: 14 }}>
                      {MACROS.map(m => <div key={m} style={{ textAlign:"center" }}><Mono size={18} color={MC[m]} bold>{Math.round(t[m])}</Mono><div style={{ fontFamily:"Inter", fontSize:9, color:C.muted, marginTop:2 }}>{UNITS[m]}</div></div>)}
                    </div>
                  ); })()}
                  <div style={{ borderTop:`1px solid ${C.accent}25`, paddingTop:12, display:"flex", flexDirection:"column", gap:10 }}>
                    <div>
                      <div style={{ fontFamily:"Syne", fontSize:10, color:C.muted, marginBottom:4 }}>Name</div>
                      <input value={editingRecipe.name} onChange={e => setEditingRecipe(p => ({ ...p, name: e.target.value }))} style={inputStyle} />
                    </div>
                    <div>
                      <div style={{ fontFamily:"Syne", fontSize:10, color:C.muted, marginBottom:4 }}>Fertig gekochtes Gewicht (g)</div>
                      <input type="text" inputMode="decimal" value={editingRecipe.cookedWeight} onChange={e => setEditingRecipe(p => ({ ...p, cookedWeight: e.target.value }))} style={inputStyle} />
                    </div>
                    <div>
                      <div style={{ fontFamily:"Syne", fontSize:10, color:C.muted, marginBottom:4 }}>Portionsgröße (g) — optional</div>
                      <input type="text" inputMode="decimal" placeholder="z.B. 350" value={editingRecipe.portionWeight || ""} onChange={e => setEditingRecipe(p => ({ ...p, portionWeight: e.target.value }))} style={inputStyle} />
                    </div>
                    {editingRecipe.portionWeight && parseFloat(editingRecipe.portionWeight) > 0 && parseFloat(editingRecipe.cookedWeight) > 0 && (() => {
                      const hasItems = editingRecipe.items && editingRecipe.items.length > 0;
                      const t = hasItems
                        ? editingRecipe.items.reduce((a,it) => ({ kcal:a.kcal+(it.kcal||0), protein:a.protein+(it.protein||0), carbs:a.carbs+(it.carbs||0), fat:a.fat+(it.fat||0) }), {kcal:0,protein:0,carbs:0,fat:0})
                        : { kcal: parseFloat(editingRecipe.recipe.kcal_total)||0, protein: parseFloat(editingRecipe.recipe.protein_total)||0, carbs: parseFloat(editingRecipe.recipe.carbs_total)||0, fat: parseFloat(editingRecipe.recipe.fat_total)||0 };
                      const tw = parseFloat(editingRecipe.cookedWeight);
                      const pw = parseFloat(editingRecipe.portionWeight);
                      const f = pw / tw;
                      return (
                        <div style={{ background: "#34d39910", borderRadius: 8, padding: "8px 12px", fontFamily: "Syne", fontSize: 12, color: C.carbs }}>
                          Portion ({pw}g): {Math.round(t.kcal * f)} kcal · {Math.round(t.protein * f * 10) / 10}g E · {Math.round(t.carbs * f * 10) / 10}g KH · {Math.round(t.fat * f * 10) / 10}g F
                        </div>
                      );
                    })()}
                  </div>
                </Card>
                <div style={{ display:"flex", gap:8 }}>
                  <Btn onClick={saveEditRecipe} disabled={editSaving || !editingRecipe.name.trim() || !editingRecipe.cookedWeight} style={{ flex:1 }}>{editSaving ? "…" : "Änderungen speichern"}</Btn>
                  <Btn onClick={() => { setStep(STEP.idle); setEditingRecipe(null); }} variant="ghost">Abbrechen</Btn>
                </div>
              </div>
            )}

            {step === STEP.idle && recipes.map(r => (
              <Card key={r.id} style={{ padding: "12px 14px" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 10 }}>
                  <div style={{ flex: 1 }}>
                    <button onClick={() => startEditRecipe(r)} style={{ background: "none", border: "none", padding: 0, color: C.text, fontFamily: "Syne", fontSize: 15, fontWeight: 700, cursor: "pointer", textAlign: "left", textDecoration: "underline", textDecorationColor: C.border }}>
                      {r.name}
                    </button>
                    <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginTop: 2 }}>
                      Gesamtgewicht: {r.total_weight}g{r.portion_g ? ` · Portion: ${r.portion_g}g` : ""}
                    </div>
                  </div>
                  <button onClick={() => onDelete(r.id)} style={{ background: "none", border: "none", color: "#f8717140", fontSize: 16, padding: 4 }}>✕</button>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginBottom: 8 }}>
                  {MACROS.map(m => (
                    <div key={m} style={{ textAlign: "center" }}>
                      <Mono size={14} color={MC[m]} bold>{Math.round(r[`${m}_total`])}</Mono>
                      <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>gesamt</div>
                    </div>
                  ))}
                </div>
                {r.portion_g && parseFloat(r.kcal_100) > 0 && (() => {
                  const f = parseFloat(r.portion_g) / 100;
                  return (
                    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6, marginBottom: 8, background: C.soft, borderRadius: 8, padding: "8px 6px" }}>
                      {MACROS.map(m => (
                        <div key={m} style={{ textAlign: "center" }}>
                          <Mono size={13} color={MC[m]} bold>{Math.round(parseFloat(r[`${m}_100`]) * f * (m === "kcal" ? 1 : 10) / (m === "kcal" ? 1 : 10))}</Mono>
                          <div style={{ fontFamily: "Inter", fontSize: 9, color: C.muted }}>/{r.portion_g}g</div>
                        </div>
                      ))}
                    </div>
                  );
                })()}
                <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, borderTop: `1px solid ${C.border}`, paddingTop: 8, marginBottom: 10 }}>
                  Pro 100g: {Math.round(r.kcal_100)} kcal · {Math.round(r.protein_100 * 10) / 10}g E · {Math.round(r.carbs_100 * 10) / 10}g KH · {Math.round(r.fat_100 * 10) / 10}g F
                </div>
                {r.ingredients && <div style={{ fontFamily: "Syne", fontSize: 10, color: "#444", borderTop: `1px solid ${C.border}`, paddingTop: 8, marginBottom: 10, lineHeight: 1.5 }}>{r.ingredients}</div>}
                {!r.items && <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, fontStyle: "italic", marginBottom: 8 }}>Für Bearbeitung & Aufschlüsselung bitte neu anlegen.</div>}
                <Btn onClick={() => onArchive(r)} full variant="ghost" small>Aufgegessen ✓</Btn>
              </Card>
            ))}
          </>}

          {subTab === "archiv" && <>
            <SectionLabel>Archiv — aufgegessene Mealpreps</SectionLabel>
            {archive.length === 0 ? (
              <div style={{ textAlign: "center", padding: 40, color: C.muted, fontFamily: "Syne", fontSize: 14, lineHeight: 1.9 }}>
                Noch nichts im Archiv.<br />Wenn ein Mealprep aufgegessen ist,<br />klick auf „Aufgegessen ✓".
              </div>
            ) : [...archive].reverse().map((r, i) => (
              <Card key={i} style={{ padding: "12px 14px", opacity: 0.85 }}>
                <div style={{ marginBottom: 6 }}>
                  <span style={{ fontFamily: "Syne", fontSize: 15, fontWeight: 700, color: C.text }}>{r.name}</span>
                  <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginTop: 2 }}>
                    {new Date(r.archived_at).toLocaleDateString("de-DE", { day: "numeric", month: "short", year: "numeric" })} · {r.total_weight}g
                  </div>
                </div>
                <div style={{ fontFamily: "Syne", fontSize: 10, color: C.muted, marginBottom: 12 }}>
                  Pro 100g: {Math.round(r.kcal_100)} kcal · {Math.round(r.protein_100 * 10) / 10}g E · {Math.round(r.carbs_100 * 10) / 10}g KH · {Math.round(r.fat_100 * 10) / 10}g F
                </div>
                <Btn onClick={() => recookFromArchive(r)} full small>Neu kochen →</Btn>
              </Card>
            ))}
          </>}
        </div>
      );

      const mpPortal = ReactDOM.createPortal(
        <>
          {mpScanning && <BarcodeScanner onScan={handleMpBarcodeScan} onClose={() => setMpScanning(false)} />}

          {mpBarcodeLoading && (
            <div style={{ position: "fixed", inset: 0, background: "#000d", zIndex: 190, display: "flex", alignItems: "center", justifyContent: "center" }}>
              <div className="pulsing" style={{ fontFamily: "Syne", fontSize: 15, color: C.accent }}>Produkt wird gesucht…</div>
            </div>
          )}

          {mpBarcodeErr && (
            <div style={{ position: "fixed", inset: 0, background: "#000d", zIndex: 190, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32, gap: 16 }}>
              <div style={{ fontFamily: "Syne", fontSize: 14, color: C.danger, textAlign: "center" }}>{mpBarcodeErr}</div>
              <Btn onClick={() => setMpBarcodeErr(null)} small>OK</Btn>
            </div>
          )}

          {mpScannedProduct && (
            <div onClick={() => setMpScannedProduct(null)} style={{ position: "fixed", inset: 0, background: "#000c", display: "flex", alignItems: "flex-end", zIndex: 190 }}>
              <div onClick={e => e.stopPropagation()} style={{ background: C.surface, borderRadius: "20px 20px 0 0", padding: "20px 16px", width: "100%", maxWidth: 500, margin: "0 auto", border: `1px solid ${C.border}`, paddingBottom: "calc(20px + env(safe-area-inset-bottom))" }}>
                <div style={{ fontFamily: "Syne", fontSize: 16, fontWeight: 700, color: C.text, marginBottom: 4 }}>{mpScannedProduct.name_de}</div>
                <div style={{ fontFamily: "Syne", fontSize: 11, color: C.muted, marginBottom: 20 }}>

                  <input type="text" inputMode="decimal" value={mpBarcodeWeight} onChange={e => setMpBarcodeWeight(e.target.value)} autoFocus
                    style={{ flex: 1, background: C.input, border: `1px solid ${C.border}`, borderRadius: 8, padding: "12px 14px", color: C.text, fontFamily: "Inter", fontSize: 18, outline: "none", textAlign: "center" }} />
                  <span style={{ fontFamily: "Syne", fontSize: 16, color: C.muted }}>g</span>
                </div>
                {mpBarcodeWeight && parseFloat(mpBarcodeWeight) > 0 && (
